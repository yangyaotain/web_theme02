<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏管理 - 运营中心 - 龙岗数据聚合服务平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/admin-common.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="js/global-dialog.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .ds-cms-layout { display:flex; height:calc(100vh - 64px); min-height:620px; }
        .ds-screen-list { width:180px; flex:none; overflow-y:auto; background:#fff; border-right:1px solid #e4e7ed; }
        .ds-screen-list-title { padding:16px 16px 8px; color:#909399; font-size:13px; font-weight:600; letter-spacing:.03em; }
        .ds-screen-item { display:block; width:100%; padding:10px 16px; border:0; border-left:3px solid transparent; background:transparent; color:#606266; font:13px/20px inherit; text-align:left; cursor:pointer; transition:.15s; }
        .ds-screen-item:hover { color:var(--forest-green); background:#f5f7fa; }
        .ds-screen-item.active { color:var(--forest-green); font-weight:600; background:#e8f5e9; border-left-color:var(--forest-green); }
        .ds-workspace { flex:1; min-width:0; overflow-y:auto; padding:24px 28px; background:#f5f7fa; }
        .ds-page { min-height:100%; color:var(--text-primary, #1f2b28); }
        .ds-page-head { display:flex; align-items:flex-start; justify-content:space-between; gap:20px; margin-bottom:18px; }
        .ds-page-title { margin:0; font-size:20px; line-height:30px; font-weight:700; color:var(--text-primary, #1f2b28); }
        .ds-page-desc { margin:4px 0 0; font-size:13px; line-height:20px; color:var(--text-tertiary, #919b96); }

        .ds-filter-bar {
            display:flex; align-items:center; flex-wrap:wrap; gap:10px; padding:16px;
            margin-bottom:16px; background:#fff; border:1px solid var(--border-divider, #ebeefd);
            border-radius:6px; box-shadow:var(--shadow-sm);
        }
        .ds-input, .ds-select {
            height:34px; box-sizing:border-box; border:1px solid var(--border-default, #d1d9d6);
            border-radius:4px; background:#fff; color:var(--text-primary, #1f2b28);
            font-size:13px; font-family:inherit; outline:none; transition:.15s;
        }
        .ds-input { width:240px; padding:0 11px; }
        .ds-select { min-width:146px; padding:0 30px 0 10px; cursor:pointer; }
        .ds-input:focus, .ds-select:focus { border-color:var(--forest-green); box-shadow:0 0 0 2px rgba(32,165,101,.08); }
        .ds-btn {
            height:34px; padding:0 15px; border:1px solid var(--border-default, #d1d9d6); border-radius:4px;
            background:#fff; color:var(--text-secondary, #5c6863); display:inline-flex; align-items:center;
            justify-content:center; gap:6px; font-size:13px; font-family:inherit; cursor:pointer; transition:.15s;
        }
        .ds-btn:hover { border-color:var(--forest-green); color:var(--forest-green); }
        .ds-btn.primary { background:var(--forest-green); border-color:var(--forest-green); color:#fff; }
        .ds-btn.primary:hover { background:#188b53; border-color:#188b53; }
        .ds-btn svg { width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:1.8; }

        .ds-table-card { background:#fff; border:1px solid var(--border-divider, #ebeefd); border-radius:6px; box-shadow:var(--shadow-sm); overflow:hidden; }
        .ds-table-summary { height:46px; padding:0 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border-divider, #ebeefd); }
        .ds-table-summary strong { font-size:14px; color:var(--text-primary, #1f2b28); }
        .ds-table-summary span { font-size:12px; color:var(--text-tertiary, #919b96); }
        .ds-table-wrap { overflow:auto; }
        .ds-table { width:100%; min-width:820px; border-collapse:collapse; table-layout:fixed; font-size:13px; }
        .ds-table th { height:44px; padding:0 18px; text-align:left; background:#fafbfc; color:var(--text-secondary, #5c6863); font-weight:600; border-bottom:1px solid var(--border-divider, #ebeefd); white-space:nowrap; }
        .ds-table td { height:56px; padding:0 18px; color:var(--text-secondary, #5c6863); border-bottom:1px solid #f0f2f1; vertical-align:middle; }
        .ds-table tbody tr:hover td { background:#fbfdfc; }
        .ds-table tbody tr:last-child td { border-bottom:none; }
        .ds-name-cell { min-width:0; }
        .ds-name-main { display:flex; align-items:center; gap:8px; min-width:0; }
        .ds-name-text { color:var(--text-primary, #1f2b28); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .ds-type-text { color:var(--text-secondary, #5c6863); font-size:13px; }
        .ds-screen-tag { display:inline-flex; align-items:center; padding:3px 9px; border-radius:3px; color:#3f6255; background:#f0f6f3; font-size:12px; }
        .ds-year { font-family:'Inter','Noto Sans SC',sans-serif; color:var(--text-primary, #1f2b28); }

        .ds-status { display:flex; align-items:center; gap:8px; white-space:nowrap; }
        .ds-switch { position:relative; width:38px; height:20px; padding:0; border:0; border-radius:10px; background:#c8cfcc; cursor:pointer; transition:.2s; }
        .ds-switch::after { content:""; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.2); transition:.2s; }
        .ds-switch.on { background:var(--forest-green); }
        .ds-switch.on::after { transform:translateX(18px); }
        .ds-status-text { font-size:12px; color:var(--text-tertiary, #919b96); }
        .ds-switch.on + .ds-status-text { color:var(--forest-green); }
        .ds-op-btn { border:0; padding:5px 7px; background:transparent; color:var(--forest-green); display:inline-flex; align-items:center; gap:5px; border-radius:4px; font-size:13px; font-family:inherit; cursor:pointer; }
        .ds-op-btn:hover { background:#edf8f2; }
        .ds-op-btn svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:1.8; }
        .ds-empty { padding:72px 20px; text-align:center; color:var(--text-tertiary, #919b96); }

        .ds-pagination { min-height:58px; padding:10px 16px; display:flex; align-items:center; justify-content:space-between; gap:16px; border-top:1px solid var(--border-divider, #ebeefd); }
        .ds-page-total { font-size:12px; color:var(--text-tertiary, #919b96); }
        .ds-page-list { display:flex; align-items:center; gap:6px; }
        .ds-page-btn { min-width:30px; height:30px; padding:0 9px; border:1px solid var(--border-default, #d1d9d6); border-radius:4px; background:#fff; color:var(--text-secondary, #5c6863); font-size:12px; cursor:pointer; }
        .ds-page-btn:hover:not(:disabled), .ds-page-btn.active { border-color:var(--forest-green); color:var(--forest-green); background:#edf8f2; }
        .ds-page-btn:disabled { color:#c5cbc8; cursor:not-allowed; }
        .ds-page-ellipsis { color:#a5ada9; font-size:12px; }

        .ds-drawer-mask { position:fixed; top:64px; left:180px; right:0; bottom:0; z-index:260; background:rgba(15,23,42,.2); opacity:0; pointer-events:none; transition:opacity .2s; }
        .ds-drawer-mask.show { opacity:1; pointer-events:auto; }
        .ds-drawer { position:absolute; top:8px; right:8px; bottom:8px; width:min(980px, calc(100vw - 220px)); display:flex; flex-direction:column; overflow:hidden; background:#fff; border-radius:8px; box-shadow:-8px 0 32px rgba(15,23,42,.18); transform:translateX(calc(100% + 18px)); transition:transform .24s; }
        .ds-drawer-mask.show .ds-drawer { transform:translateX(0); }
        .ds-drawer-head { flex:none; min-height:62px; padding:0 22px; border-bottom:1px solid var(--border-divider, #ebeefd); display:flex; align-items:center; gap:12px; }
        .ds-drawer-close { width:28px; height:28px; padding:0; border:0; border-radius:4px; background:transparent; color:#909399; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .ds-drawer-close:hover { color:#303133; background:#f5f7fa; }
        .ds-drawer-close svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2; }
        .ds-drawer-heading { min-width:0; flex:1; }
        .ds-drawer-title { font-size:16px; line-height:24px; font-weight:700; color:var(--text-primary, #1f2b28); }
        .ds-drawer-meta { margin-top:2px; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-tertiary, #919b96); }
        .ds-meta-dot { width:3px; height:3px; border-radius:50%; background:#b8c0bc; }
        .ds-drawer-body { flex:1; min-height:0; overflow:auto; padding:20px 22px 28px; background:#f6f8f7; }
        .ds-drawer-foot { flex:none; height:64px; padding:0 22px; border-top:1px solid var(--border-divider, #ebeefd); display:flex; align-items:center; justify-content:flex-end; gap:10px; background:#fff; }

        .ds-edit-section { margin-bottom:16px; background:#fff; border:1px solid var(--border-divider, #ebeefd); border-radius:6px; overflow:hidden; }
        .ds-edit-section:last-child { margin-bottom:0; }
        .ds-section-head { min-height:46px; padding:0 16px; display:flex; align-items:center; justify-content:space-between; gap:16px; border-bottom:1px solid var(--border-divider, #ebeefd); }
        .ds-section-head h3 { margin:0; padding-left:9px; border-left:3px solid var(--forest-green); font-size:14px; color:var(--text-primary, #1f2b28); }
        .ds-section-head span { font-size:12px; color:var(--text-tertiary, #919b96); }
        .ds-section-body { padding:16px; }
        .ds-preview-shell { min-height:286px; padding:18px; box-sizing:border-box; border-radius:6px; background:#07130f; border:1px solid #2a493d; }
        .ds-cockpit-panel { width:100%; }
        .ds-preview-head { min-height:32px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
        .ds-preview-title { margin:0; color:#fff; font-size:15px; font-weight:700; }
        .ds-preview-select { height:30px; min-width:128px; padding:0 28px 0 10px; border:1px solid #2a493d; border-radius:4px; outline:none; background:#142b23; color:#d7dfdb; font:12px inherit; cursor:pointer; }
        .ds-preview-chart { position:relative; width:100%; height:250px; }
        .ds-preview-chart canvas { width:100% !important; height:100% !important; }
        .ds-preview-fallback { color:#9ca8a3; font-size:13px; }

        .ds-metric-card { width:min(430px, 100%); min-height:168px; box-sizing:border-box; padding:22px; border-radius:12px; background:#142b23; border:1px solid #2a493d; box-shadow:0 0 18px rgba(32,165,101,.18); color:#fff; }
        .ds-metric-label { font-size:14px; color:#9ca8a3; margin-bottom:8px; }
        .ds-metric-value-line { display:flex; align-items:baseline; gap:7px; }
        .ds-metric-prefix { font-size:20px; font-weight:700; }
        .ds-metric-value { font-family:'Inter','Noto Sans SC',sans-serif; font-size:34px; line-height:42px; font-weight:700; }
        .ds-metric-unit { font-size:14px; color:#d7dfdb; }
        .ds-metric-trend { margin-top:14px; display:flex; align-items:center; gap:6px; color:#f7af1d; font-size:13px; }
        .ds-metric-trend.down { color:#f56c6c; }
        .ds-metric-trend svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2; }

        .ds-form-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px 18px; }
        .ds-form-item { min-width:0; }
        .ds-form-item.full { grid-column:1 / -1; }
        .ds-form-label { display:block; margin-bottom:7px; color:var(--text-secondary, #5c6863); font-size:13px; }
        .ds-form-label.required::before { content:"*"; margin-right:4px; color:#f56c6c; }
        .ds-form-control { width:100%; height:36px; box-sizing:border-box; padding:0 11px; border:1px solid var(--border-default, #d1d9d6); border-radius:4px; color:var(--text-primary, #1f2b28); font-size:13px; font-family:inherit; outline:none; }
        .ds-form-control:focus { border-color:var(--forest-green); box-shadow:0 0 0 2px rgba(32,165,101,.08); }
        .ds-form-control[readonly] { background:#f7f9f8; color:#7e8984; }

        .ds-data-toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:12px; }
        .ds-data-hint { font-size:12px; color:var(--text-tertiary, #919b96); }
        .ds-excel-actions { display:flex; align-items:center; justify-content:flex-end; flex-wrap:wrap; gap:8px; }
        .ds-excel-actions .ds-btn { height:30px; padding:0 10px; font-size:12px; }
        .ds-excel-actions .ds-btn:disabled { border-color:#e2e6e4; background:#f5f7f6; color:#b8bfbc; cursor:not-allowed; }
        .ds-import-input { display:none; }
        .ds-edit-table-wrap { width:100%; max-height:360px; overflow:auto; border:1px solid #cfd6d2; border-radius:4px; background:#fff; }
        .ds-edit-table { width:100%; min-width:680px; border-collapse:separate; border-spacing:0; table-layout:fixed; font-size:12px; }
        .ds-edit-table th { position:sticky; top:0; z-index:2; height:46px; padding:4px 9px; background:#eef1ef; color:var(--text-secondary, #5c6863); font-weight:600; text-align:left; border-right:1px solid #cfd6d2; border-bottom:1px solid #cfd6d2; white-space:nowrap; }
        .ds-edit-table td { height:36px; padding:0; background:#fff; border-right:1px solid #dfe4e1; border-bottom:1px solid #dfe4e1; }
        .ds-edit-table tr:last-child td { border-bottom:0; }
        .ds-edit-table th:last-child, .ds-edit-table td:last-child { border-right:0; }
        .ds-row-index { position:sticky; left:0; z-index:1; width:42px; min-width:42px; background:#f3f5f4 !important; color:#7b8581; text-align:center; font-family:'Inter',sans-serif; }
        .ds-edit-table th.ds-row-index { z-index:3; }
        .ds-column-letter { display:block; margin-bottom:2px; color:#939c98; font:10px/12px 'Inter',sans-serif; }
        .ds-column-name { display:block; overflow:hidden; text-overflow:ellipsis; }
        .ds-cell-input { width:100%; min-width:108px; height:36px; box-sizing:border-box; padding:0 8px; border:2px solid transparent; border-radius:0; background:transparent; color:var(--text-primary, #1f2b28); font-size:12px; font-family:inherit; outline:none; }
        .ds-cell-input:hover { background:#f8fbf9; }
        .ds-cell-input:focus { position:relative; z-index:1; border-color:var(--forest-green); background:#fff; box-shadow:inset 0 0 0 1px var(--forest-green); }
        .ds-cell-input.selected { background:#e8f5e9; box-shadow:inset 0 0 0 1px rgba(32,165,101,.44); }
        .ds-cell-input.selected:focus { border-color:var(--forest-green); box-shadow:inset 0 0 0 1px var(--forest-green); }
        .ds-excel-tip { display:flex; align-items:center; gap:6px; color:#7c8782; font-size:12px; }
        .ds-excel-tip kbd { padding:1px 5px; border:1px solid #d4dad7; border-bottom-width:2px; border-radius:3px; background:#fff; color:#52605a; font:11px 'Inter',sans-serif; }

        .ds-rank-preview { width:100%; max-height:250px; overflow:auto; display:flex; flex-direction:column; gap:7px; }
        .ds-rank-row { padding:9px 11px; display:grid; grid-template-columns:28px minmax(0,1fr) auto; align-items:center; gap:10px; border-radius:6px; background:#142b23; border:1px solid #2a493d; }
        .ds-rank-index { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; background:#2a493d; font-size:11px; }
        .ds-rank-row:first-child .ds-rank-index { background:#20a565; }
        .ds-rank-name { color:#e5ebe8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px; }
        .ds-rank-value { color:#f7af1d; font-family:'Inter','Noto Sans SC',sans-serif; font-size:12px; }
        .ds-rank-table { width:100%; border-collapse:collapse; color:#d7dfdb; font-size:12px; }
        .ds-rank-table th, .ds-rank-table td { padding:9px 8px; border-bottom:1px solid #2a493d; text-align:left; }
        .ds-rank-table th { color:#9ca8a3; font-weight:500; }
        .ds-rank-table th:last-child, .ds-rank-table td:last-child { text-align:right; }
        .ds-rank-table td:first-child { width:44px; color:#20a565; font-weight:700; }

        .ds-toast { position:fixed; left:50%; top:82px; z-index:500; min-width:220px; max-width:420px; padding:11px 16px; border-radius:5px; color:#fff; background:#27352f; box-shadow:0 8px 24px rgba(15,23,42,.2); font-size:13px; text-align:center; opacity:0; pointer-events:none; transform:translate(-50%,-8px); transition:.2s; }
        .ds-toast.show { opacity:1; transform:translate(-50%,0); }
        .ds-toast.error { background:#b94a48; }

        @media (max-width: 1200px) {
            .ds-form-grid { grid-template-columns:1fr; }
            .ds-form-item.full { grid-column:auto; }
            .ds-input { width:200px; }
        }
        @media (max-width: 900px) {
            .ds-drawer-mask { left:0; }
            .ds-drawer { width:calc(100vw - 16px); }
            .ds-screen-list { width:150px; }
            .ds-workspace { padding:20px 18px; }
            .ds-filter-bar { align-items:stretch; }
            .ds-input, .ds-select { width:100%; }
        }
    </style>
</head>
<body>
    <div data-admin-topbar data-active="operation"></div>

    <div class="admin-layout">
        <aside class="admin-sidebar" data-operation-sidebar></aside>

        <main class="admin-content" style="padding:0;">
            <div class="ds-cms-layout">
                <nav class="ds-screen-list" aria-label="大屏列表">
                    <div class="ds-screen-list-title">大屏列表</div>
                    <button class="ds-screen-item active" type="button" data-screen-nav="综合分析">综合分析</button>
                    <button class="ds-screen-item" type="button" data-screen-nav="数据资源">数据资源</button>
                    <button class="ds-screen-item" type="button" data-screen-nav="数据产品">数据产品</button>
                    <button class="ds-screen-item" type="button" data-screen-nav="数据咨询">数据咨询</button>
                    <button class="ds-screen-item" type="button" data-screen-nav="行业方案">行业方案</button>
                    <button class="ds-screen-item" type="button" data-screen-nav="需求大厅">需求大厅</button>
                </nav>
                <div class="ds-workspace">
                <div class="ds-page">
                <div class="ds-page-head">
                    <div>
                        <h1 class="ds-page-title">大屏管理</h1>
                        <p class="ds-page-desc">维护全要素展示驾驶舱 6 块大屏的年度指标、图表和排行数据</p>
                    </div>
                </div>

                <div class="ds-filter-bar">
                    <input class="ds-input" id="dsNameFilter" type="text" placeholder="请输入名称">
                    <select class="ds-select" id="dsYearFilter">
                        <option value="">全部年度</option>
                        <option value="2026" selected>2026年度</option>
                        <option value="2025">2025年度</option>
                        <option value="2024">2024年度</option>
                    </select>
                    <select class="ds-select" id="dsStatusFilter">
                        <option value="">全部状态</option>
                        <option value="enabled">启用</option>
                        <option value="disabled">未启用</option>
                    </select>
                    <button class="ds-btn primary" id="dsSearchBtn" type="button">
                        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4-4"></path></svg>
                        <span>查询</span>
                    </button>
                    <button class="ds-btn" id="dsResetBtn" type="button">
                        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v6h6"></path></svg>
                        <span>重置</span>
                    </button>
                </div>

                <div class="ds-table-card">
                    <div class="ds-table-summary">
                        <strong>大屏数据维护</strong>
                        <span id="dsResultSummary">共 0 条数据</span>
                    </div>
                    <div class="ds-table-wrap">
                        <table class="ds-table">
                            <colgroup>
                                <col style="width:30%">
                                <col style="width:12%">
                                <col style="width:16%">
                                <col style="width:13%">
                                <col style="width:17%">
                                <col style="width:12%">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>名称</th>
                                    <th>类型</th>
                                    <th>所属大屏</th>
                                    <th>统计年度</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="dsTableBody"></tbody>
                        </table>
                    </div>
                    <div class="ds-pagination">
                        <span class="ds-page-total" id="dsPageTotal">共 0 条</span>
                        <div class="ds-page-list" id="dsPageList"></div>
                    </div>
                </div>
                </div>
                </div>
            </div>
        </main>
    </div>

    <div class="ds-drawer-mask" id="dsEditDrawer" aria-hidden="true">
        <aside class="ds-drawer" role="dialog" aria-modal="true" aria-labelledby="dsDrawerTitle">

                data.trend = Number((Number(data.trend) * (1 - ((1 - factor) * 0.25))).toFixed(1));
            } else {
                data.datasets.forEach(function (dataset) {
                    dataset.data = dataset.data.map(function (value) { return roundBySource(value, factor); });

            return data;

                if (keyword && record.name.toLowerCase().indexOf(keyword) < 0) return false;
                if (filters.year && String(record.year) !== filters.year) return false;
                if (filters.status === 'enabled' && !record.enabled) return false;
                if (filters.status === 'disabled' && record.enabled) return false;
                return true;
            });
        }

        function pageTokens(totalPages, page) {
            if (totalPages <= 7) return Array.from({ length: totalPages }, function (_, index) { return index + 1; });
            var tokens = [1];
            var start = Math.max(2, page - 1);
            var end = Math.min(totalPages - 1, page + 1);
            if (start > 2) tokens.push('ellipsis-left');
            for (var i = start; i <= end; i++) tokens.push(i);
            if (end < totalPages - 1) tokens.push('ellipsis-right');
            tokens.push(totalPages);
            return tokens;
        }

        function renderPagination(total) {
            var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;
            var html = '<button class="ds-page-btn" data-page="' + (currentPage - 1) + '" ' + (currentPage === 1 ? 'disabled' : '') + '>上一页</button>';
            pageTokens(totalPages, currentPage).forEach(function (token) {
                if (typeof token === 'string') html += '<span class="ds-page-ellipsis">…</span>';
                else html += '<button class="ds-page-btn ' + (token === currentPage ? 'active' : '') + '" data-page="' + token + '">' + token + '</button>';
            });
            html += '<button class="ds-page-btn" data-page="' + (currentPage + 1) + '" ' + (currentPage === totalPages ? 'disabled' : '') + '>下一页</button>';
            pageList.innerHTML = html;
            pageTotal.textContent = '共 ' + total + ' 条，第 ' + currentPage + ' / ' + totalPages + ' 页';
        }

        function renderTable() {
            var list = filteredRecords();
            var start = (currentPage - 1) * PAGE_SIZE;
            var pageRows = list.slice(start, start + PAGE_SIZE);
            resultSummary.textContent = activeScreen + ' · 共 ' + list.length + ' 条数据';
            if (!pageRows.length) {
                body.innerHTML = '<tr><td colspan="6"><div class="ds-empty">暂无符合条件的数据</div></td></tr>';
                renderPagination(list.length);
                return;
            }
            body.innerHTML = pageRows.map(function (record) {
                var typeText = record.type === 'metric' ? '指标卡' : '仪表盘';
                return [
                    '<tr data-record-id="' + record.id + '">',
                    '  <td><div class="ds-name-cell"><div class="ds-name-main"><span class="ds-name-text" title="' + escapeHtml(record.name) + '">' + escapeHtml(record.name) + '</span></div></div></td>',
                    '  <td><span class="ds-type-text">' + typeText + '</span></td>',
                    '  <td><span class="ds-screen-tag">' + escapeHtml(record.screen) + '</span></td>',
                    '  <td><span class="ds-year">' + record.year + '年度</span></td>',
                    '  <td><div class="ds-status"><button type="button" class="ds-switch ' + (record.enabled ? 'on' : '') + '" data-action="toggle" aria-pressed="' + record.enabled + '" aria-label="切换状态"></button><span class="ds-status-text">' + (record.enabled ? '启用' : '未启用') + '</span></div></td>',
                    '  <td><button type="button" class="ds-op-btn" data-action="edit"><svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"></path></svg><span>编辑</span></button></td>',
                    '</tr>'
                ].join('');
            }).join('');
            renderPagination(list.length);
        }

        function showToast(message, type) {
            var toast = document.getElementById('dsToast');
            toast.textContent = message;
            toast.className = 'ds-toast show' + (type === 'error' ? ' error' : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function () { toast.className = 'ds-toast'; }, 2200);
        }

        function applyFilters() {
            filters.name = document.getElementById('dsNameFilter').value;
            filters.year = document.getElementById('dsYearFilter').value;
            filters.status = document.getElementById('dsStatusFilter').value;
            currentPage = 1;
            renderTable();
        }

        function resetFilters() {
            document.getElementById('dsNameFilter').value = '';
            document.getElementById('dsYearFilter').value = '2026';
            document.getElementById('dsStatusFilter').value = '';
            applyFilters();
        }

        function renderDrawerMeta(record) {
            drawerMeta.innerHTML = [
                '<span>' + escapeHtml(record.screen) + '</span>',
                '<span class="ds-meta-dot"></span>',
                '<span>' + record.year + '年度</span>',
                '<span class="ds-meta-dot"></span>',
                '<span>' + (record.type === 'metric' ? '指标卡' : '仪表盘') + '</span>'
            ].join('');
        }

        function metricPreviewHtml() {
            var data = editDraft.data;
            var directionClass = data.direction === 'down' ? ' down' : '';
            var directionIcon = data.direction === 'down' ? '<path d="m5 8 7 7 7-7"></path>' : '<path d="m5 16 7-7 7 7"></path>';
            return [
                '<div class="ds-preview-shell">',
                '  <div class="ds-metric-card">',
                '    <div class="ds-metric-label">' + escapeHtml(editDraft.name) + '</div>',
                '    <div class="ds-metric-value-line">',
                data.prefix ? '      <span class="ds-metric-prefix">' + escapeHtml(data.prefix) + '</span>' : '',
                '      <span class="ds-metric-value">' + formatNumber(data.value, Number(data.decimals) || 0) + '</span>',
                data.unit ? '      <span class="ds-metric-unit">' + escapeHtml(data.unit) + '</span>' : '',
                '    </div>',
                '    <div class="ds-metric-trend' + directionClass + '"><svg viewBox="0 0 24 24">' + directionIcon + '</svg><span>' + escapeHtml(data.trend) + '% ' + escapeHtml(data.compareText) + '</span></div>',
                '  </div>',
                '</div>'
            ].join('');

        function renderMetricEditor() {
            drawerBody.innerHTML = [
                '<section class="ds-edit-section">',
                '  <div class="ds-section-head"><h3>指标预览</h3><span>与全要素展示驾驶舱指标卡保持一致</span></div>',
                '  <div class="ds-section-body" id="dsPreviewArea">' + metricPreviewHtml() + '</div>',
                '</section>',
                '<section class="ds-edit-section">',
                '  <div class="ds-section-head"><h3>指标数据</h3><span>修改后实时更新上方预览</span></div>',
                '  <div class="ds-section-body">',
                '    <div class="ds-form-grid">',
                '      <div class="ds-form-item full"><label class="ds-form-label">指标名称</label><input class="ds-form-control" value="' + escapeHtml(editDraft.name) + '" readonly></div>',
                '      <div class="ds-form-item"><label class="ds-form-label required">指标值</label><input class="ds-form-control" type="number" step="any" data-metric-field="value" value="' + escapeHtml(editDraft.data.value) + '"></div>',
                '      <div class="ds-form-item"><label class="ds-form-label">单位</label><input class="ds-form-control" data-metric-field="unit" value="' + escapeHtml(editDraft.data.unit) + '" placeholder="如：万元、条、%"></div>',
                '      <div class="ds-form-item"><label class="ds-form-label required">趋势值（%）</label><input class="ds-form-control" type="number" step="0.1" data-metric-field="trend" value="' + escapeHtml(editDraft.data.trend) + '"></div>',
                '      <div class="ds-form-item"><label class="ds-form-label required">趋势方向</label><select class="ds-form-control" data-metric-field="direction"><option value="up" ' + (editDraft.data.direction === 'up' ? 'selected' : '') + '>上升</option><option value="down" ' + (editDraft.data.direction === 'down' ? 'selected' : '') + '>下降</option></select></div>',
                '    </div>',
                '  </div>',
                '</section>'
            ].join('');
        }

        function chartColors(index, alpha) {
            var palette = [
                [32,165,101], [79,110,247], [247,175,29], [15,198,194],
                [239,111,108], [120,154,143], [92,140,206], [161,127,214]
            ];
            var rgb = palette[index % palette.length];
            return 'rgba(' + rgb.join(',') + ',' + alpha + ')';
        }

        function destroyPreviewChart() {
            if (previewChart) { previewChart.destroy(); previewChart = null; }
        }

        function renderChartPreview() {
            destroyPreviewChart();
            var area = document.getElementById('dsPreviewArea');
            if (!area || !editDraft) return;
            var data = editDraft.data;
            var selectorHtml = '';
            if (data.selector) {
                selectorHtml = '<select class="ds-preview-select" id="dsPreviewSeriesSelect" aria-label="行业筛选">' + data.datasets.map(function (dataset, index) {
                    return '<option value="' + index + '" ' + (index === Number(data.previewDataset || 0) ? 'selected' : '') + '>' + escapeHtml(dataset.label) + '</option>';
                }).join('') + '</select>';
            }
            var previewHead = '<div class="ds-preview-head"><h4 class="ds-preview-title">' + escapeHtml(editDraft.name) + '</h4>' + selectorHtml + '</div>';
            if (data.previewType === 'ranking') {
                var values = data.datasets[0] ? data.datasets[0].data : [];
                var rankingContent;
                if (data.rankingStyle === 'table') {
                    rankingContent = '<div class="ds-rank-preview"><table class="ds-rank-table"><thead><tr><th>排名</th><th>' + escapeHtml(data.nameHeader || '名称') + '</th><th>' + escapeHtml(data.datasets[0].label) + '</th></tr></thead><tbody>' + data.labels.map(function (label, index) {
                        return '<tr><td>' + (index + 1) + '</td><td>' + escapeHtml(label) + '</td><td>' + formatNumber(values[index] || 0, Number.isInteger(Number(values[index])) ? 0 : 1) + '</td></tr>';
                    }).join('') + '</tbody></table></div>';
                } else {
                    rankingContent = '<div class="ds-rank-preview">' + data.labels.map(function (label, index) {
                        return '<div class="ds-rank-row"><span class="ds-rank-index">' + (index + 1) + '</span><span class="ds-rank-name">' + escapeHtml(label) + '</span><span class="ds-rank-value">' + formatNumber(values[index] || 0, Number.isInteger(Number(values[index])) ? 0 : 1) + '</span></div>';
                    }).join('') + '</div>';
                }
                area.innerHTML = '<div class="ds-preview-shell"><div class="ds-cockpit-panel">' + previewHead + rankingContent + '</div></div>';
                return;
            }
            area.innerHTML = '<div class="ds-preview-shell"><div class="ds-cockpit-panel">' + previewHead + '<div class="ds-preview-chart"><canvas id="dsPreviewCanvas"></canvas></div></div></div>';
            if (!window.Chart) {
                area.innerHTML = '<div class="ds-preview-shell"><span class="ds-preview-fallback">图表组件加载失败</span></div>';
                return;
            }
            var isCircle = data.chartType === 'pie' || data.chartType === 'doughnut';
            var sourceDatasets = data.selector ? [data.datasets[Number(data.previewDataset || 0)] || data.datasets[0]] : data.datasets;
            var datasets = sourceDatasets.map(function (dataset, index) {
                var target = {
                    label: dataset.previewLabel || dataset.label,
                    data: dataset.data.slice(),
                    borderWidth: isCircle ? 2 : 1,
                    borderRadius: data.chartType === 'bar' ? 4 : 0
                };
                if (isCircle) {
                    target.backgroundColor = data.labels.map(function (_, colorIndex) { return chartColors(colorIndex, .78); });
                    target.borderColor = '#142b23';
                } else {
                    target.backgroundColor = chartColors(index, data.chartType === 'line' || dataset.type === 'line' ? .18 : .68);
                    target.borderColor = chartColors(index, .95);
                    target.tension = .35;
                    target.fill = data.chartType === 'line' || dataset.type === 'line';
                }
                if (dataset.type) target.type = dataset.type;
                if (dataset.stack) target.stack = dataset.stack;
                if (dataset.yAxisID) target.yAxisID = dataset.yAxisID;
                return target;
            });
            var options = {
                responsive:true, maintainAspectRatio:false, indexAxis:data.indexAxis || 'x',
                plugins:{
                    legend:{ position:'bottom', labels:{ color:'rgba(255,255,255,.72)', boxWidth:10, boxHeight:10, font:{ size:10 }, padding:12 } },
                    tooltip:{ backgroundColor:'rgba(7,19,15,.95)', borderColor:'#2a493d', borderWidth:1, titleColor:'#fff', bodyColor:'#d7dfdb' }
                },
                animation:{ duration:350 }
            };
            if (!isCircle) {
                options.scales = {
                    x:{ stacked:!!data.stacked, grid:{ color:'rgba(255,255,255,.05)' }, ticks:{ color:'rgba(255,255,255,.62)', font:{ size:10 } } },
                    y:{ stacked:!!data.stacked, beginAtZero:true, position:'left', grid:{ color:'rgba(255,255,255,.06)' }, ticks:{ color:'rgba(255,255,255,.62)', font:{ size:10 } } }
                };
                if (data.indexAxis === 'y') {
                    options.scales.x.beginAtZero = true;
                    delete options.scales.y.beginAtZero;
                }
                if (data.dualAxis) {
                    options.scales.y1 = {
                        position:'right', beginAtZero:true,
                        grid:{ drawOnChartArea:false },
                        ticks:{ color:'rgba(247,175,29,.86)', font:{ size:10 }, callback:function (value) { return value + ' 万元'; } }
                    };
                }
            } else if (data.chartType === 'doughnut') options.cutout = '62%';
            previewChart = new Chart(document.getElementById('dsPreviewCanvas').getContext('2d'), {
                type:data.chartType, data:{ labels:data.labels.slice(), datasets:datasets }, options:options
            });
        }

        function excelColumnName(index) {
            var name = '';
            var value = index + 1;
            while (value > 0) {
                value -= 1;
                name = String.fromCharCode(65 + (value % 26)) + name;
                value = Math.floor(value / 26);
            }
            return name;
        }

        function normalizedSelection() {
            if (!selectionRange) return null;
            return {
                startRow:Math.min(selectionRange.startRow, selectionRange.endRow),
                endRow:Math.max(selectionRange.startRow, selectionRange.endRow),
                startCol:Math.min(selectionRange.startCol, selectionRange.endCol),
                endCol:Math.max(selectionRange.startCol, selectionRange.endCol)
            };
        }

        function isSelectedCell(row, col) {
            var range = normalizedSelection();
            return range && row >= range.startRow && row <= range.endRow && col >= range.startCol && col <= range.endCol;
        }

        function dashboardTableHtml() {
            var data = editDraft.data;
            var headers = '<th class="ds-row-index"></th><th><span class="ds-column-letter">A</span><span class="ds-column-name">维度 / 分类</span></th>' + data.datasets.map(function (dataset, index) {
                return '<th><span class="ds-column-letter">' + excelColumnName(index + 1) + '</span><span class="ds-column-name" title="' + escapeHtml(dataset.label || '数值') + '">' + escapeHtml(dataset.label || '数值') + '</span></th>';
            }).join('');
            var rows = data.labels.map(function (label, rowIndex) {
                var cells = '<th class="ds-row-index" scope="row">' + (rowIndex + 1) + '</th><td><input class="ds-cell-input ' + (isSelectedCell(rowIndex, 0) ? 'selected' : '') + '" data-table-role="label" data-row="' + rowIndex + '" data-col="0" value="' + escapeHtml(label) + '"></td>';
                data.datasets.forEach(function (dataset, seriesIndex) {
                    cells += '<td><input class="ds-cell-input ' + (isSelectedCell(rowIndex, seriesIndex + 1) ? 'selected' : '') + '" data-table-role="value" data-row="' + rowIndex + '" data-col="' + (seriesIndex + 1) + '" data-series="' + seriesIndex + '" value="' + escapeHtml(dataset.data[rowIndex] == null ? '' : dataset.data[rowIndex]) + '"></td>';
                });
                return '<tr>' + cells + '</tr>';
            }).join('');
            return '<div class="ds-edit-table-wrap"><table class="ds-edit-table"><thead><tr>' + headers + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
        }

        function selectionCellCount() {
            var range = normalizedSelection();
            return range ? (range.endRow - range.startRow + 1) * (range.endCol - range.startCol + 1) : 0;
        }

        function updateExcelToolbar() {
            var undoButton = drawerBody.querySelector('[data-excel-action="undo"]');
            var redoButton = drawerBody.querySelector('[data-excel-action="redo"]');
            var deleteButton = drawerBody.querySelector('[data-excel-action="delete"]');
            if (undoButton) undoButton.disabled = dashboardHistoryIndex <= 0;
            if (redoButton) redoButton.disabled = dashboardHistoryIndex < 0 || dashboardHistoryIndex >= dashboardHistory.length - 1;
            if (deleteButton) deleteButton.disabled = !selectionRange;
        }

        function applySelectionClasses() {
            drawerBody.querySelectorAll('.ds-cell-input').forEach(function (cell) {
                var row = Number(cell.getAttribute('data-row'));
                var col = Number(cell.getAttribute('data-col'));
                cell.classList.toggle('selected', !!isSelectedCell(row, col));
            });
            updateExcelToolbar();
        }

        function resetDashboardHistory() {
            clearTimeout(historyTimer);
            historyTimer = null;
            dashboardHistory = editDraft && editDraft.type === 'dashboard' ? [clone(editDraft.data)] : [];
            dashboardHistoryIndex = dashboardHistory.length ? 0 : -1;
        }

        function commitDashboardHistory() {
            if (!editDraft || editDraft.type !== 'dashboard') return;
            var snapshot = clone(editDraft.data);
            var current = dashboardHistory[dashboardHistoryIndex];
            if (current && JSON.stringify(current) === JSON.stringify(snapshot)) {
                updateExcelToolbar();
                return;
            }
            dashboardHistory = dashboardHistory.slice(0, dashboardHistoryIndex + 1);
            dashboardHistory.push(snapshot);
            if (dashboardHistory.length > 50) dashboardHistory.shift();
            dashboardHistoryIndex = dashboardHistory.length - 1;
            updateExcelToolbar();
        }

        function scheduleDashboardHistory() {
            clearTimeout(historyTimer);
            historyTimer = setTimeout(function () {
                historyTimer = null;
                commitDashboardHistory();
            }, 320);
        }

        function flushDashboardHistory() {
            if (!historyTimer) return;
            clearTimeout(historyTimer);
            historyTimer = null;
            commitDashboardHistory();
        }

        function clampSelectionToData() {
            if (!selectionRange || !editDraft || !editDraft.data.labels.length) return;
            var maxRow = editDraft.data.labels.length - 1;
            var maxCol = editDraft.data.datasets.length;
            selectionRange.startRow = Math.min(selectionRange.startRow, maxRow);
            selectionRange.endRow = Math.min(selectionRange.endRow, maxRow);
            selectionRange.startCol = Math.min(selectionRange.startCol, maxCol);
            selectionRange.endCol = Math.min(selectionRange.endCol, maxCol);
            selectionAnchor = { row:selectionRange.startRow, col:selectionRange.startCol };
        }

        function restoreDashboardHistory(message) {
            editDraft.data = clone(dashboardHistory[dashboardHistoryIndex]);
            clampSelectionToData();
            renderDashboardEditor();
            showToast(message);
        }

        function undoDashboard() {
            flushDashboardHistory();
            if (dashboardHistoryIndex <= 0) {
                updateExcelToolbar();
                return;
            }
            dashboardHistoryIndex -= 1;
            restoreDashboardHistory('已撤销上一步操作');
        }

        function redoDashboard() {
            flushDashboardHistory();
            if (dashboardHistoryIndex < 0 || dashboardHistoryIndex >= dashboardHistory.length - 1) {
                updateExcelToolbar();
                return;
            }
            dashboardHistoryIndex += 1;
            restoreDashboardHistory('已恢复下一步操作');
        }

        function clearSelectedCells() {
            var range = normalizedSelection();
            if (!range || !editDraft || editDraft.type !== 'dashboard') return;
            flushDashboardHistory();
            for (var row = range.startRow; row <= range.endRow; row++) {
                for (var col = range.startCol; col <= range.endCol; col++) {
                    if (col === 0) editDraft.data.labels[row] = '';
                    else editDraft.data.datasets[col - 1].data[row] = '';
                }
            }
            commitDashboardHistory();
            renderDashboardEditor();
            showToast('已删除选中的 ' + selectionCellCount() + ' 个单元格');
        }

        function selectedRangeText() {
            var range = normalizedSelection();
            if (!range || !editDraft || editDraft.type !== 'dashboard') return '';
            var rows = [];
            for (var row = range.startRow; row <= range.endRow; row++) {
                var cells = [];
                for (var col = range.startCol; col <= range.endCol; col++) {
                    var value = col === 0 ? editDraft.data.labels[row] : editDraft.data.datasets[col - 1].data[row];
                    cells.push(value == null ? '' : String(value));
                }
                rows.push(cells.join('\t'));
            }
            return rows.join('\n');
        }

        function renderDashboardEditor() {
            drawerBody.innerHTML = [
                '<section class="ds-edit-section">',
                '  <div class="ds-section-head"><h3>仪表盘预览</h3><span>数据修改后实时刷新预览</span></div>',
                '  <div class="ds-section-body" id="dsPreviewArea"></div>',
                '</section>',
                '<section class="ds-edit-section">',
                '  <div class="ds-section-head"><h3>表格数据维护</h3><span>首列为维度，其余列为数据系列</span></div>',
                '  <div class="ds-section-body">',
                '    <div class="ds-data-toolbar">',
                '      <span class="ds-excel-tip">鼠标拖拽框选；支持 <kbd>Ctrl+C</kbd>/<kbd>Ctrl+V</kbd>、<kbd>Delete</kbd>、<kbd>Ctrl+Z</kbd>/<kbd>Ctrl+Y</kbd></span>',
                '      <div class="ds-excel-actions">',
                '        <button class="ds-btn" type="button" data-excel-action="undo" title="撤销（Ctrl+Z）"><svg viewBox="0 0 24 24"><path d="M9 7 4 12l5 5"></path><path d="M4 12h9a6 6 0 0 1 6 6"></path></svg><span>撤销</span></button>',
                '        <button class="ds-btn" type="button" data-excel-action="redo" title="恢复（Ctrl+Y）"><svg viewBox="0 0 24 24"><path d="m15 7 5 5-5 5"></path><path d="M20 12h-9a6 6 0 0 0-6 6"></path></svg><span>恢复</span></button>',
                '        <button class="ds-btn" type="button" data-excel-action="delete" title="删除选中单元格（Delete）"><svg viewBox="0 0 24 24"><path d="M4 7h16"></path><path d="M9 7V4h6v3"></path><path d="m7 7 1 13h8l1-13"></path></svg><span>删除</span></button>',
                '        <button class="ds-btn" type="button" data-excel-action="template"><svg viewBox="0 0 24 24"><path d="M12 4v12"></path><path d="m7 11 5 5 5-5"></path><path d="M5 20h14"></path></svg><span>下载模板</span></button>',
                '        <label class="ds-btn" for="dsImportInput"><svg viewBox="0 0 24 24"><path d="M12 16V4"></path><path d="m7 9 5-5 5 5"></path><path d="M5 20h14"></path></svg><span>导入表格</span></label>',
                '      </div>',
                '      <input class="ds-import-input" id="dsImportInput" type="file" accept=".xlsx,.xls,.csv">',
                '    </div>',
                dashboardTableHtml(),
                '  </div>',
                '</section>'
            ].join('');
            updateExcelToolbar();
            requestAnimationFrame(renderChartPreview);
        }

        function openDrawer(record) {
            editRecord = record;
            editDraft = clone(record);
            drawerTitle.textContent = record.name;
            selectionRange = null;
            selectionAnchor = null;
            dragSelecting = false;
            resetDashboardHistory();
            renderDrawerMeta(record);
            if (record.type === 'metric') renderMetricEditor();
            else renderDashboardEditor();
            drawer.classList.add('show');
            drawer.setAttribute('aria-hidden', 'false');
        }

        function closeDrawer() {
            destroyPreviewChart();
            clearTimeout(historyTimer);
            historyTimer = null;
            dashboardHistory = [];
            dashboardHistoryIndex = -1;
            selectionRange = null;
            selectionAnchor = null;
            dragSelecting = false;
            drawer.classList.remove('show');
            drawer.setAttribute('aria-hidden', 'true');
            editRecord = null;
            editDraft = null;
        }

        function saveDrawer() {
            if (!editRecord || !editDraft) return;
            flushDashboardHistory();
            if (editRecord.type === 'metric') {
                var metricValue = Number(editDraft.data.value);
                var metricTrend = Number(editDraft.data.trend);
                if (!Number.isFinite(metricValue) || !Number.isFinite(metricTrend)) {
                    showToast('请填写有效的指标值和趋势值', 'error');
                    return;
                }
                editDraft.data.value = metricValue;
                editDraft.data.trend = metricTrend;
            } else if (!editDraft.data.labels.length || editDraft.data.labels.some(function (label) { return !String(label).trim(); })) {
                showToast('维度 / 分类不能为空', 'error');
                return;
            }
            editRecord.data = clone(editDraft.data);
            showToast('数据保存成功，已更新 ' + editRecord.name);
            closeDrawer();
        }

        function parseCellNumber(value) {
            var numeric = Number(String(value).replace(/,/g, '').trim());
            return Number.isFinite(numeric) ? numeric : 0;
        }

        function parseCsvLine(line) {
            var result = [], current = '', quoted = false;
            for (var i = 0; i < line.length; i++) {
                var char = line[i];
                if (char === '"' && line[i + 1] === '"' && quoted) { current += '"'; i += 1; }
                else if (char === '"') quoted = !quoted;
                else if (char === ',' && !quoted) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            return result;
        }

        function clipboardRows(text) {
            var lines = String(text || '').replace(/\r/g, '').split('\n');
            if (lines.length > 1 && lines[lines.length - 1] === '') lines.pop();
            return lines.map(function (line) { return line.split('\t'); });
        }

        function ensureDashboardRow(rowIndex) {
            while (editDraft.data.labels.length <= rowIndex) {
                editDraft.data.labels.push('');
                editDraft.data.datasets.forEach(function (dataset) { dataset.data.push(0); });
            }
        }

        function pasteDashboardCells(target, text) {
            var grid = clipboardRows(text);
            if (!grid.length || !grid[0].length) return;
            flushDashboardHistory();
            var selected = normalizedSelection();
            var startRow = selected ? selected.startRow : Number(target.getAttribute('data-row'));
            var startCol = selected ? selected.startCol : Number(target.getAttribute('data-col'));
            var maxCol = editDraft.data.datasets.length;
            var applied = 0;
            var endRow = startRow;
            var endCol = startCol;
            grid.forEach(function (sourceRow, rowOffset) {
                var targetRow = startRow + rowOffset;
                ensureDashboardRow(targetRow);
                sourceRow.forEach(function (cell, colOffset) {
                    var targetCol = startCol + colOffset;
                    if (targetCol > maxCol) return;
                    if (targetCol === 0) editDraft.data.labels[targetRow] = cell;
                    else editDraft.data.datasets[targetCol - 1].data[targetRow] = parseCellNumber(cell);
                    applied += 1;
                    endRow = Math.max(endRow, targetRow);
                    endCol = Math.max(endCol, targetCol);
                });
            });
            selectionRange = { startRow:startRow, startCol:startCol, endRow:endRow, endCol:endCol };
            selectionAnchor = { row:startRow, col:startCol };
            commitDashboardHistory();
            renderDashboardEditor();
            showToast('已批量粘贴 ' + applied + ' 个单元格');
        }

        function safeFilePart(value) {
            return String(value || '').replace(/[\\/:*?"<>|]/g, '-').replace(/\s+/g, '').slice(0, 50);
        }

        function downloadExcelTemplate() {
            if (!editDraft || editDraft.type !== 'dashboard') return;
            if (!window.XLSX) {
                showToast('Excel组件未加载，暂时无法下载模板', 'error');
                return;
            }
            try {
                var data = editDraft.data;
                var rows = [['维度 / 分类'].concat(data.datasets.map(function (dataset) { return dataset.label || '数值'; }))];
                data.labels.forEach(function (label, rowIndex) {
                    rows.push([label].concat(data.datasets.map(function (dataset) {
                        return dataset.data[rowIndex] == null ? '' : dataset.data[rowIndex];
                    })));
                });
                var dataSheet = XLSX.utils.aoa_to_sheet(rows);
                dataSheet['!cols'] = [{ wch:26 }].concat(data.datasets.map(function (dataset) {
                    return { wch:Math.min(34, Math.max(16, String(dataset.label || '数值').length * 2)) };
                }));
                var instructionSheet = XLSX.utils.aoa_to_sheet([
                    ['填写说明'],
                    ['1. 第一行为字段名称，请勿删除或修改列顺序。'],
                    ['2. 第一列填写维度 / 分类，其余列填写对应数据系列的数值。'],
                    ['3. 可以增加或删除数据行，不要新增或删除数据系列列。'],
                    ['4. 填写完成后，可直接通过“导入表格”上传本文件。']
                ]);
                instructionSheet['!cols'] = [{ wch:72 }];
                var workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, dataSheet, '数据维护模板');
                XLSX.utils.book_append_sheet(workbook, instructionSheet, '填写说明');
                var fileName = [safeFilePart(editDraft.screen), safeFilePart(editDraft.name), editDraft.year + '年度', '数据维护模板'].join('-') + '.xlsx';
                XLSX.writeFile(workbook, fileName);
                showToast('Excel模板已生成，包含对应格式和示例数据');
            } catch (error) {
                showToast('Excel模板生成失败', 'error');
            }
        }

        function csvRows(file) {
            return file.text().then(function (text) {
                return text.split(/\r?\n/).filter(function (line) { return line.trim(); }).map(parseCsvLine);
            });
        }

        function workbookRows(file) {
            if (!window.XLSX) {
                if (/\.csv$/i.test(file.name)) return csvRows(file);
                return Promise.reject(new Error('表格解析组件未加载，请改用 CSV 文件'));
            }
            return file.arrayBuffer().then(function (buffer) {
                var workbook = XLSX.read(buffer, { type:'array' });
                var firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                return XLSX.utils.sheet_to_json(firstSheet, { header:1, raw:true, defval:'' });
            });
        }

        function applyImportedRows(rows) {
            var validRows = rows.filter(function (row) { return row && row.some(function (cell) { return String(cell).trim() !== ''; }); });
            if (validRows.length < 2 || validRows[0].length < 2) throw new Error('表格至少需要一行表头和一行数据');
            flushDashboardHistory();
            var headers = validRows[0];
            var bodyRows = validRows.slice(1).filter(function (row) { return String(row[0]).trim() !== ''; });
            if (!bodyRows.length) throw new Error('未读取到有效数据行');
            editDraft.data.labels = bodyRows.map(function (row) { return String(row[0]).trim(); });
            editDraft.data.datasets = headers.slice(1).map(function (header, seriesIndex) {
                var original = editDraft.data.datasets[seriesIndex] || {};
                return {
                    label:String(header || ('系列' + (seriesIndex + 1))).trim(),
                    data:bodyRows.map(function (row) { return parseCellNumber(row[seriesIndex + 1]); }),
                    type:original.type || '', stack:original.stack || '',
                    yAxisID:original.yAxisID || '', previewLabel:original.previewLabel || ''
                };
            });
            editDraft.data.previewDataset = 0;
            selectionRange = null;
            selectionAnchor = null;
            commitDashboardHistory();
            renderDashboardEditor();
            showToast('表格导入成功，请确认预览后保存');
        }

        document.getElementById('dsSearchBtn').addEventListener('click', applyFilters);
        document.getElementById('dsResetBtn').addEventListener('click', resetFilters);
        document.getElementById('dsNameFilter').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') applyFilters();
        });
        ['dsYearFilter','dsStatusFilter'].forEach(function (id) {
            document.getElementById(id).addEventListener('change', applyFilters);
        });

        screenNavItems.forEach(function (item) {
            item.addEventListener('click', function () {
                activeScreen = item.getAttribute('data-screen-nav');
                screenNavItems.forEach(function (navItem) { navItem.classList.toggle('active', navItem === item); });
                currentPage = 1;
                renderTable();
            });
        });

        body.addEventListener('click', function (event) {
            var action = event.target.closest('[data-action]');
            if (!action) return;
            var row = action.closest('tr[data-record-id]');
            var record = records.find(function (item) { return item.id === row.getAttribute('data-record-id'); });
            if (!record) return;
            if (action.getAttribute('data-action') === 'toggle') {
                record.enabled = !record.enabled;
                renderTable();
                showToast(record.name + '已' + (record.enabled ? '启用' : '设为未启用'));
            } else {
                openDrawer(record);
            }
        });

        pageList.addEventListener('click', function (event) {
            var button = event.target.closest('[data-page]');
            if (!button || button.disabled) return;
            currentPage = Number(button.getAttribute('data-page'));
            renderTable();
        });

        drawer.addEventListener('click', function (event) {
            if (event.target === drawer || event.target.closest('[data-drawer-close]') || event.target.closest('[data-drawer-cancel]')) closeDrawer();
            if (event.target.closest('[data-drawer-save]')) saveDrawer();
        });

        drawerBody.addEventListener('input', function (event) {
            if (!editDraft) return;
            var metricField = event.target.getAttribute('data-metric-field');
            if (metricField) {
                editDraft.data[metricField] = event.target.value;
                document.getElementById('dsPreviewArea').innerHTML = metricPreviewHtml();
                return;
            }
            var role = event.target.getAttribute('data-table-role');
            if (!role) return;
            var rowIndex = Number(event.target.getAttribute('data-row'));
            if (role === 'label') editDraft.data.labels[rowIndex] = event.target.value;
            else {
                var seriesIndex = Number(event.target.getAttribute('data-series'));
                editDraft.data.datasets[seriesIndex].data[rowIndex] = parseCellNumber(event.target.value);
            }
            scheduleDashboardHistory();
            renderChartPreview();
        });

        drawerBody.addEventListener('mousedown', function (event) {
            var cell = event.target.closest('.ds-cell-input');
            if (!cell || event.button !== 0 || !editDraft || editDraft.type !== 'dashboard') return;
            var row = Number(cell.getAttribute('data-row'));
            var col = Number(cell.getAttribute('data-col'));
            if (!event.shiftKey || !selectionAnchor) selectionAnchor = { row:row, col:col };
            selectionRange = {
                startRow:selectionAnchor.row, startCol:selectionAnchor.col,
                endRow:row, endCol:col
            };
            dragSelecting = true;
            applySelectionClasses();
        });

        drawerBody.addEventListener('mouseover', function (event) {
            if (!dragSelecting || !selectionAnchor) return;
            var cell = event.target.closest('.ds-cell-input');
            if (!cell) return;
            selectionRange = {
                startRow:selectionAnchor.row, startCol:selectionAnchor.col,
                endRow:Number(cell.getAttribute('data-row')),
                endCol:Number(cell.getAttribute('data-col'))
            };
            applySelectionClasses();
        });

        drawerBody.addEventListener('click', function (event) {
            var action = event.target.closest('[data-excel-action]');
            if (!action || action.disabled) return;
            var type = action.getAttribute('data-excel-action');
            if (type === 'undo') undoDashboard();
            else if (type === 'redo') redoDashboard();
            else if (type === 'delete') clearSelectedCells();
            else if (type === 'template') downloadExcelTemplate();
        });

        drawerBody.addEventListener('copy', function (event) {
            if (!selectionRange || !editDraft || editDraft.type !== 'dashboard') return;
            var text = selectedRangeText();
            if (!event.clipboardData || text === '') return;
            event.preventDefault();
            event.clipboardData.setData('text/plain', text);
            showToast('已复制 ' + selectionCellCount() + ' 个单元格');
        });

        drawerBody.addEventListener('paste', function (event) {
            var target = event.target.closest('.ds-cell-input');
            if (!target || !editDraft || editDraft.type !== 'dashboard') return;
            var text = event.clipboardData && event.clipboardData.getData('text/plain');
            if (text == null) return;
            event.preventDefault();
            pasteDashboardCells(target, text);
        });

        drawerBody.addEventListener('change', function (event) {
            if (event.target.id === 'dsPreviewSeriesSelect') {
                editDraft.data.previewDataset = Number(event.target.value) || 0;
                renderChartPreview();
                return;
            }
            if (event.target.getAttribute('data-metric-field') === 'direction') {
                editDraft.data.direction = event.target.value;
                document.getElementById('dsPreviewArea').innerHTML = metricPreviewHtml();
                return;
            }
            if (event.target.id !== 'dsImportInput') return;
            var file = event.target.files && event.target.files[0];
            if (!file) return;
            workbookRows(file).then(applyImportedRows).catch(function (error) {
                showToast(error.message || '表格导入失败', 'error');
            });
        });

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && drawer.classList.contains('show')) {
                closeDrawer();
                return;
            }
            if (!drawer.classList.contains('show') || !editDraft || editDraft.type !== 'dashboard') return;
            var key = event.key.toLowerCase();
            var shortcut = event.ctrlKey || event.metaKey;
            if (shortcut && key === 'z') {
                event.preventDefault();
                if (event.shiftKey) redoDashboard();
                else undoDashboard();
                return;
            }
            if (shortcut && key === 'y') {
                event.preventDefault();
                redoDashboard();
                return;
            }
            if ((event.key === 'Delete' || event.key === 'Backspace') && selectionRange) {
                event.preventDefault();
                clearSelectedCells();
            }
        });

        document.addEventListener('mouseup', function () { dragSelecting = false; });

        renderTable();
    })();
    </script>
    <script src="js/operation-sidebar.js"></script>
    <script src="js/admin-topbar.js"></script>
</body>
</html>
