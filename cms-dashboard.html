<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏管理 - 运营中心 - 龙岗数据聚合服务平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/admin-common.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="js/global-dialog.js"></script>
    <style>
    .ds-content {
        flex: 1; overflow-y: auto; background: var(--bg-main, #f4f7f6); padding: 24px 28px;
    }
    .ds-section { margin-bottom: 24px; }
    .ds-section-header {
        display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .ds-section-title {
        font-size: 15px; font-weight: 700; color: var(--text-primary, #1F2B28);
        letter-spacing: .03em;
    }
    .ds-section-hint {
        font-size: 12px; color: var(--text-tertiary, #919B96);
    }
    .ds-grid {
        display: grid; gap: 12px;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    }

    /* 指标卡片 */
    .ds-card {
        background: #fff; border-radius: var(--radius-sm, 6px); padding: 14px 16px;
        position: relative; border-left: 3px solid var(--forest-green);
        transition: .15s; box-shadow: var(--shadow-sm);
    }
    .ds-card:hover { box-shadow: var(--shadow-md); background: var(--bg-hover, #f2f9f1); }
    .ds-card-label {
        font-size: 12px; color: var(--text-secondary, #5C6863); margin-bottom: 8px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ds-card-value {
        font-size: 22px; font-weight: 700; color: var(--text-primary, #1F2B28);
        font-family: 'Inter', 'Noto Sans SC', sans-serif;
        letter-spacing: -.02em; line-height: 1.2;
    }
    .ds-card-trend {
        margin-top: 8px; font-size: 11px; color: var(--text-tertiary, #919B96);
        display: flex; align-items: center; gap: 4px;
    }
    .ds-card-trend .up { color: var(--color-success, #20A565); }
    .ds-card-trend .down { color: var(--color-error, #F56C6C); }
    .ds-card-edit {
        position: absolute; top: 10px; right: 10px;
        width: 22px; height: 22px; border: none; background: none;
        color: var(--text-tertiary, #919B96); cursor: pointer; padding: 0;
        display: flex; align-items: center; justify-content: center;
        border-radius: 4px; transition: .15s;
    }
    .ds-card-edit:hover { color: var(--forest-green); background: var(--forest-green-50, #f0fdf6); }
    .ds-card-edit svg { width: 14px; height: 14px; }
    /* 各模块颜色 */
    .ds-card.c-blue { border-left-color: var(--cls-api, #4F6EF7); }
    .ds-card.c-purple { border-left-color: var(--cls-service, #8B5CF6); }
    .ds-card.c-cyan { border-left-color: #06b6d4; }
    .ds-card.c-green { border-left-color: var(--forest-green); }
    .ds-card.c-orange { border-left-color: var(--accent-orange, #F7AF1D); }
    .ds-card.c-pink { border-left-color: #ec4899; }
    .ds-card.c-teal { border-left-color: #14b8a6; }

    /* 编辑弹窗 */
    .ds-edit-mask {
        display: none; position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,.45); justify-content: center; align-items: center;
    }
    .ds-edit-mask.show { display: flex; }
    .ds-edit-box {
        width: 480px; background: #fff; border-radius: 8px;
        box-shadow: 0 12px 40px rgba(0,0,0,.18);
    }
    .ds-edit-header {
        padding: 20px 24px 16px; border-bottom: 1px solid var(--border-divider, #EBEEED);
    }
    .ds-edit-title { font-size: 18px; font-weight: 700; color: var(--text-primary, #1F2B28); }
    .ds-edit-body {
        padding: 24px;
        display: grid; grid-template-columns: auto 1fr;
        gap: 18px 12px; align-items: center;
    }
    .ds-edit-row { display: contents; }
    .ds-edit-label {
        text-align: left; font-size: 14px; color: var(--text-primary, #1F2B28);
        white-space: nowrap;
    }
    .ds-edit-input {
        width: 100%; padding: 8px 12px; font-size: 14px;
        border: 1px solid var(--border-default, #D1D9D6);
        border-radius: 4px; outline: none; color: var(--text-primary, #1F2B28);
        box-sizing: border-box;
    }
    .ds-edit-input:focus { border-color: var(--forest-green); }
    .ds-edit-footer {
        display: flex; justify-content: center; gap: 12px;
        padding: 0 24px 24px;
    }
    .ds-edit-btn {
        padding: 8px 28px; font-size: 14px; border-radius: 4px; cursor: pointer;
        border: 1px solid var(--border-default, #D1D9D6);
        background: #fff; color: var(--text-secondary, #5C6863); transition: .15s;
    }
    .ds-edit-btn:hover { color: var(--forest-green); border-color: var(--forest-green); }
    .ds-edit-btn.primary { background: var(--forest-green); color: #fff; border-color: var(--forest-green); }
    .ds-edit-btn.primary:hover { opacity: .88; }
    </style>
</head>
<body>
    <header class="admin-topbar">
        <div class="topbar-left">
            <a href="index.html" class="topbar-logo">
                <img src="images/logo.png" alt="龙岗数据">
                龙岗数据聚合服务平台
            </a>
            <nav class="topbar-nav">
                <a href="operation-center.html" class="topbar-nav-item active">运营中心</a>
                <a href="maintenance-center.html" class="topbar-nav-item">运维中心</a>
                <a href="smart-report.html" class="topbar-nav-item" target="_blank">智能报告</a>
            </nav>
        </div>
        <div id="adminUserArea" class="topbar-right"></div>
    </header>

    <div class="admin-layout">
        <aside class="admin-sidebar" data-operation-sidebar></aside>

        <main class="admin-content" style="padding:0;">
            <div class="ds-content" id="dsContent"></div>
        </main>
    </div>

    <!-- 编辑弹窗 -->
    <div class="ds-edit-mask" id="dsEditModal">
        <div class="ds-edit-box">
            <div class="ds-edit-header">
                <div class="ds-edit-title">指标配置</div>
            </div>
            <div class="ds-edit-body">
                <div class="ds-edit-row">
                    <span class="ds-edit-label" id="dsEditLabel1">数据资源：</span>
                    <input type="text" class="ds-edit-input" id="dsEditVal">
                </div>
                <div class="ds-edit-row">
                    <span class="ds-edit-label">较上月：</span>
                    <input type="text" class="ds-edit-input" id="dsEditTrend">
                </div>
            </div>
            <div class="ds-edit-footer">
                <button class="ds-edit-btn primary" id="dsEditOk">确定</button>
                <button class="ds-edit-btn" id="dsEditCancel">取消</button>
            </div>
        </div>
    </div>

    <script>
    var EDIT_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    

    var sections = [
        { title: '综合分析', hint: '有配置，展示配置数据；没有配置系统赋值，没数据显示--*', color: 'c-blue', cards: [
            { label: '数据资源', value: '128,643', trend: '12.5%', dir: 'up' },
            { label: '数据产品', value: '86,421', trend: '9.8%', dir: 'up' },
            { label: '数据咨询', value: '42,857', trend: '7.3%', dir: 'up' },
            { label: '行业方案', value: '28,943', trend: '11.2%', dir: 'up' },
            { label: '数商总数', value: '3,842', trend: '8.3%', dir: 'up' },
            { label: '需求响应率', value: '78.3%', trend: '3.2%', dir: 'up' },
            { label: '总交易规模（万元）', value: '2,648', trend: '15.7%', dir: 'up' }
        ]},
        { title: '数据资源', color: 'c-purple', cards: [
            { label: '资源总量（记录数）', value: '156,892', trend: '8.2%', dir: 'up' },
            { label: '公共数据（记录数）', value: '78,450', trend: '5.6%', dir: 'up' },
            { label: '行业数据（记录数）', value: '45,320', trend: '12.1%', dir: 'up' },
            { label: '企业数据（记录数）', value: '33,122', trend: '9.8%', dir: 'up' },
            { label: '应用场景数', value: '189', trend: '21.5%', dir: 'up' },
            { label: '总授权申请量', value: '28,765', trend: '15.3%', dir: 'up' }
        ]},
        { title: '数据产品', color: 'c-cyan', cards: [
            { label: '数据产品总量', value: '289,568', trend: '15.7%', dir: 'up' },
            { label: '数据集', value: '89,780', trend: '12.3%', dir: 'up' },
            { label: '数据产品', value: '125,640', trend: '18.5%', dir: 'up' },
            { label: '数据报告', value: '45,890', trend: '9.8%', dir: 'up' },
            { label: 'RWA', value: '18,950', trend: '25.3%', dir: 'up' },
            { label: '数据模型', value: '9,308', trend: '32.1%', dir: 'up' },
            { label: '总交易金额(万元)', value: '8,975.6', trend: '19.2%', dir: 'up' }
        ]},
        { title: '数据咨询', color: 'c-green', cards: [
            { label: '咨询服务总量', value: '28,568', trend: '15.3%', dir: 'up' },
            { label: '数据治理与合规咨询', value: '6,890', trend: '12.8%', dir: 'up' },
            { label: '数据资产入表咨询', value: '5,420', trend: '9.6%', dir: 'up' },
            { label: '数据资源托管运营', value: '4,850', trend: '18.2%', dir: 'up' },
            { label: '数据资产融资咨询', value: '3,980', trend: '11.5%', dir: 'up' },
            { label: '数据资产全过程管理', value: '3,650', trend: '21.7%', dir: 'up' },
            { label: '企业数据产品孵化', value: '3,778', trend: '14.9%', dir: 'up' },
            { label: '总交易金额（万元）', value: '89,652', trend: '28.3%', dir: 'up' }
        ]},
        { title: '行业方案', color: 'c-orange', cards: [
            { label: '解决方案总量', value: '2,856', trend: '15.7%', dir: 'up' },
            { label: '浏览量', value: '896,542', trend: '22.3%', dir: 'up' },
            { label: '咨询量', value: '158,790', trend: '18.9%', dir: 'up' },
            { label: '成交金额（万元）', value: '6,892.5', trend: '26.4%', dir: 'up' }
        ]},
        { title: '需求大厅', color: 'c-pink', cards: [
            { label: '需求总量', value: '89,756', trend: '15.3%', dir: 'up' },
            { label: '数据需求', value: '42,890', trend: '18.7%', dir: 'up' },
            { label: '服务需求', value: '25,630', trend: '12.5%', dir: 'up' },
            { label: '应用需求', value: '18,245', trend: '9.8%', dir: 'up' },
            { label: '响应需求数', value: '76,892', trend: '11.2%', dir: 'up' },
            { label: '响应需求成功数', value: '70,586', trend: '13.7%', dir: 'up' }
        ]}
    ];

    function renderDashboard() {
        var container = document.getElementById('dsContent');
        var html = '';
        for (var s = 0; s < sections.length; s++) {
            var sec = sections[s];
            html += '<div class="ds-section">';
            html += '<div class="ds-section-header"><span class="ds-section-title">' + sec.title + '</span>';
            if (sec.hint) html += '<span class="ds-section-hint">' + sec.hint + '</span>';
            html += '</div>';
            html += '<div class="ds-grid">';
            for (var c = 0; c < sec.cards.length; c++) {
                var card = sec.cards[c];
                var arrow = card.dir === 'up' ? '↑' : '↓';
                var cls = card.dir === 'up' ? 'up' : 'down';
                html += '<div class="ds-card ' + sec.color + '" data-si="' + s + '" data-ci="' + c + '">';
                html += '<div class="ds-card-label">' + card.label + '</div>';
                html += '<div class="ds-card-value">' + card.value + '</div>';
                html += '<div class="ds-card-trend"><span class="' + cls + '">' + arrow + ' ' + card.trend + '</span> 较上月</div>';
                html += '<button class="ds-card-edit" title="编辑">' + EDIT_SVG + '</button>';
                html += '</div>';
            }
            html += '</div></div>';
        }
        container.innerHTML = html;
    }

    renderDashboard();

    // 编辑弹窗
    var editModal = document.getElementById('dsEditModal');
    var editLabel1 = document.getElementById('dsEditLabel1');
    var editVal = document.getElementById('dsEditVal');
    var editTrend = document.getElementById('dsEditTrend');
    var editSi = -1, editCi = -1;

    function openEdit(si, ci) {
        var card = sections[si].cards[ci];
        editSi = si; editCi = ci;
        editLabel1.textContent = card.label + '：';
        editVal.value = card.value;
        editTrend.value = card.trend;
        editModal.classList.add('show');
    }
    function closeEdit() { editModal.classList.remove('show'); }

    document.getElementById('dsContent').addEventListener('click', function(e) {
        var btn = e.target.closest('.ds-card-edit');
        if (!btn) return;
        var card = btn.closest('.ds-card');
        openEdit(parseInt(card.dataset.si), parseInt(card.dataset.ci));
    });

    document.getElementById('dsEditOk').addEventListener('click', function() {
        if (editSi >= 0 && editCi >= 0) {
            sections[editSi].cards[editCi].value = editVal.value;
            sections[editSi].cards[editCi].trend = editTrend.value;
            renderDashboard();
        }
        closeEdit();
    });
    document.getElementById('dsEditCancel').addEventListener('click', closeEdit);
    editModal.addEventListener('click', function(e) { if (e.target === editModal) closeEdit(); });
    </script>
    <script src="js/operation-sidebar.js"></script>
    <script src="js/admin-topbar.js"></script>
</body>
</html>
