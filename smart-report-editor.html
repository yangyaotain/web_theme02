<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑智能报告 - 龙岗数据聚合服务平台</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/admin-common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #303133;
            background: #f0f2f5;
            font-family: "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            font-size: 13px;
        }

        .icon,
        .icon-stroke {
            width: 16px;
            height: 16px;
            flex: 0 0 auto;
        }

        .icon {
            fill: currentColor;
        }

        .icon-stroke {
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .report-editor {
            height: 100vh;
            display: grid;
            grid-template-columns: 248px minmax(0, 1fr);
            background: #fff;
            overflow: hidden;
        }

        .editor-sidebar {
            min-width: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #dcdfe6;
            background: #fff;
        }

        .side-head {
            height: 58px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            border-bottom: 1px solid #ebeef5;
            font-weight: 700;
            font-size: 15px;
        }

        .side-head .side-icon {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--forest-green);
            background: var(--forest-green-50);
            border-radius: 4px;
        }

        .report-meta-panel {
            padding: 14px 14px 12px;
            border-bottom: 1px solid #ebeef5;
        }

        .meta-label {
            margin-bottom: 6px;
            color: #909399;
            font-size: 12px;
        }

        .meta-title {
            margin-bottom: 8px;
            color: #303133;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.45;
        }

        .meta-line {
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 22px;
            color: #606266;
            font-size: 12px;
        }

        .section-head {
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            color: #303133;
            font-weight: 700;
            border-bottom: 1px solid #ebeef5;
        }

        .section-list {
            flex: 1;
            min-height: 0;
            padding: 8px 8px 14px;
            overflow: auto;
        }

        .section-link {
            width: 100%;
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            color: #606266;
            background: transparent;
            border: 0;
            border-radius: 3px;
            font-family: inherit;
            font-size: 13px;
            line-height: 1.35;
            text-align: left;
            cursor: pointer;
        }

        .section-link:hover,
        .section-link.active {
            color: var(--forest-green);
            background: var(--forest-green-50);
            font-weight: 700;
        }

        .editor-main {
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: #f0f2f5;
            overflow: hidden;
        }

        .editor-topbar {
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 16px;
            background: #fff;
            border-bottom: 1px solid #dcdfe6;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1 1 auto;
            min-width: 0;
        }

        .editor-name {
            flex: 0 1 240px;
            min-width: 150px;
        }

        .editor-name strong {
            display: block;
            color: #303133;
            font-size: 15px;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .editor-name span {
            display: block;
            margin-top: 2px;
            color: #909399;
            font-size: 12px;
            line-height: 1.2;
        }

        .topbar-actions {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .schedule-bar {
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            flex: 1 1 auto;
            min-width: 0;
            padding-left: 12px;
            border-left: 1px solid #ebeef5;
        }

        .schedule-summary {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: nowrap;
            overflow: hidden;
            color: #606266;
            font-size: 12px;
            line-height: 1.5;
        }

        .schedule-summary > span {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .schedule-summary strong {
            color: #303133;
            font-weight: 700;
        }

        .schedule-setting {
            flex: 0 0 auto;
            color: var(--forest-green);
            background: transparent;
            border: 0;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .schedule-setting:hover {
            text-decoration: underline;
        }

        .ed-btn,
        .ed-icon-btn,
        .ed-select,
        .ed-input {
            height: 32px;
            color: #303133;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }

        .ed-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .ed-icon-btn {
            width: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }

        .ed-btn:hover,
        .ed-icon-btn:hover,
        .ed-select:hover,
        .ed-input:focus,
        .ed-select:focus {
            color: var(--forest-green);
            border-color: var(--forest-green);
        }

        .ed-btn.primary {
            color: #fff;
            background: var(--forest-green);
            border-color: var(--forest-green);
            box-shadow: var(--shadow-green-glow);
        }

        .ed-btn.primary:hover {
            color: #fff;
            background: var(--forest-green-600);
            border-color: var(--forest-green-600);
        }

        .ed-select {
            min-width: 86px;
            padding: 0 28px 0 10px;
            cursor: pointer;
        }

        .ed-input {
            padding: 0 10px;
        }

        .word-input {
            display: none;
        }

        .editor-toolbar {
            min-height: 46px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 7px 12px;
            background: #fff;
            border-bottom: 1px solid #dcdfe6;
        }

        .toolbar-group {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0 4px;
        }

        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: #e4e7ed;
        }

        .toolbar-btn {
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            color: #606266;
            background: #fff;
            border: 1px solid transparent;
            border-radius: 3px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
        }

        .toolbar-btn:hover,
        .toolbar-btn.active {
            color: var(--forest-green);
            background: var(--forest-green-50);
            border-color: var(--forest-green-200);
        }

        .toolbar-btn.wide {
            width: auto;
            padding: 0 10px;
            font-weight: 700;
        }

        .toolbar-color {
            width: 28px;
            height: 28px;
            padding: 3px;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
            background: #fff;
            cursor: pointer;
        }

        .editor-canvas {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 18px 24px 42px;
            background: #f0f2f5;
        }

        .report-paper {
            max-width: 960px;
            min-height: calc(100vh - 190px);
            margin: 0 auto;
            padding: 34px 42px 58px;
            color: #303133;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            outline: none;
        }

        .report-paper:focus,
        .report-paper:focus-within {
            border-color: rgba(32, 165, 101, 0.45);
            box-shadow: 0 0 0 3px rgba(32, 165, 101, 0.10);
        }

        .report-paper h1 {
            margin: 0 0 8px;
            color: #303133;
            font-size: 24px;
            line-height: 1.35;
            font-weight: 700;
        }

        .report-paper h2 {
            margin: 26px 0 12px;
            padding-left: 10px;
            color: #303133;
            border-left: 4px solid var(--forest-green);
            font-size: 18px;
            line-height: 1.4;
            font-weight: 700;
        }

        .report-paper h3 {
            margin: 18px 0 8px;
            color: #303133;
            font-size: 15px;
            line-height: 1.45;
            font-weight: 700;
        }

        .report-paper p,
        .report-paper li {
            color: #606266;
            font-size: 14px;
            line-height: 1.85;
        }

        .report-paper p {
            margin: 8px 0;
        }

        .metric-token {
            color: #1683e8;
            font-weight: 600;
            white-space: nowrap;
        }

        .report-paper ul,
        .report-paper ol {
            margin: 8px 0 8px 22px;
            padding: 0;
        }

        .report-meta {
            color: #909399 !important;
            font-size: 12px !important;
        }

        .tag-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0 18px;
        }

        .tag-row .tag {
            display: inline-flex;
            align-items: center;
            height: 24px;
            padding: 0 8px;
            color: var(--forest-green);
            background: var(--forest-green-50);
            border: 1px solid var(--forest-green-200);
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
        }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin: 14px 0;
        }

        .kpi-card {
            min-width: 0;
            padding: 12px;
            background: #fafafa;
            border: 1px solid #ebeef5;
            border-radius: 4px;
        }

        .kpi-card .lbl {
            color: #909399;
            font-size: 12px;
        }

        .kpi-card .val {
            margin-top: 5px;
            color: #303133;
            font-size: 22px;
            line-height: 1.2;
            font-weight: 700;
        }

        .kpi-card .delta {
            margin-top: 6px;
            color: #606266;
            font-size: 12px;
        }

        .kpi-card .delta.up {
            color: var(--forest-green);
        }

        .kpi-card .delta.warn {
            color: #e6a23c;
        }

        .report-paper blockquote {
            margin: 12px 0;
            padding: 10px 14px;
            color: #606266;
            background: #f5f7fa;
            border-left: 3px solid var(--forest-green);
            border-radius: 3px;
        }

        .report-paper table {
            width: 100%;
            margin: 12px 0;
            border-collapse: collapse;
            font-size: 13px;
        }

        .report-paper th,
        .report-paper td {
            padding: 9px 10px;
            color: #606266;
            border: 1px solid #ebeef5;
            line-height: 1.6;
            text-align: left;
        }

        .report-paper th {
            color: #303133;
            background: #fafafa;
            font-weight: 700;
        }

        .num {
            text-align: right !important;
        }

        .chart-block,
        .dashboard-embed {
            margin: 14px 0;
            padding: 12px;
            background: #fff;
            border: 1px solid #ebeef5;
            border-radius: 4px;
        }

        .chart-head,
        .dashboard-embed-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            color: #303133;
            font-weight: 700;
        }

        .chart-tag,
        .dashboard-tag {
            display: inline-flex;
            align-items: center;
            height: 22px;
            padding: 0 7px;
            color: var(--forest-green);
            background: var(--forest-green-50);
            border: 1px solid var(--forest-green-200);
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
        }

        .chart-bars {
            height: 142px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 14px 12px 22px;
            background: repeating-linear-gradient(to top, #fff 0, #fff 34px, #f0f2f5 35px);
            border: 1px solid #ebeef5;
            border-radius: 3px;
        }

        .chart-bars span {
            position: relative;
            flex: 1;
            min-width: 12px;
            height: var(--h);
            background: linear-gradient(180deg, var(--forest-green), #8fd3b1);
            border-radius: 3px 3px 0 0;
        }

        .chart-bars span::after {
            content: attr(data-label);
            position: absolute;
            left: 50%;
            bottom: -20px;
            color: #909399;
            font-size: 11px;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .dashboard-embed-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .dashboard-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .dashboard-metric {
            min-width: 0;
            padding: 10px;
            background: #fafafa;
            border: 1px solid #ebeef5;
            border-radius: 3px;
        }

        .dashboard-metric span {
            display: block;
            color: #909399;
            font-size: 12px;
        }

        .dashboard-metric strong {
            display: block;
            margin-top: 4px;
            color: #303133;
            font-size: 18px;
            line-height: 1.2;
        }

        .mini-line {
            height: 112px;
            padding: 10px;
            background: #fafafa;
            border: 1px solid #ebeef5;
            border-radius: 3px;
        }

        .mini-line svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .modal-mask {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.35);
        }

        .dashboard-modal {
            position: fixed;
            left: 50%;
            top: 50%;
            z-index: 2010;
            width: min(1060px, calc(100vw - 48px));
            height: min(720px, calc(100vh - 58px));
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 18px 48px rgba(0,0,0,0.22);
            transform: translate(-50%, -50%);
            overflow: hidden;
        }

        .schedule-modal {
            position: fixed;
            left: 50%;
            top: 50%;
            z-index: 2010;
            width: min(660px, calc(100vw - 48px));
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 18px 48px rgba(0,0,0,0.22);
            transform: translate(-50%, -50%);
            overflow: hidden;
        }

        .schedule-modal .modal-body {
            padding: 22px 28px 20px;
        }

        .schedule-form {
            display: grid;
            gap: 18px;
        }

        .schedule-row {
            display: grid;
            grid-template-columns: 118px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
        }

        .schedule-row.group-start {
            margin-top: 2px;
        }

        .schedule-label {
            color: #303133;
            font-weight: 700;
            text-align: right;
        }

        .schedule-controls {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .schedule-controls .ed-select,
        .schedule-controls .ed-input {
            width: 98px;
            min-width: 0;
        }

        .schedule-controls .schedule-dynamic {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .schedule-controls .schedule-day-select {
            width: 62px;
        }

        .schedule-controls .schedule-wide-select {
            width: 112px;
        }

        .schedule-controls .time-field {
            position: relative;
            display: inline-flex;
            width: 132px;
            flex: 0 0 auto;
        }

        .schedule-controls .time-field .time-input {
            width: 100%;
            padding-right: 30px;
        }

        .schedule-controls .time-icon {
            position: absolute;
            top: 50%;
            right: 8px;
            width: 16px;
            height: 16px;
            color: #909399;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .modal-head,
        .modal-foot {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #ebeef5;
        }

        .modal-foot {
            border-top: 1px solid #ebeef5;
            border-bottom: 0;
        }

        .modal-title h3 {
            margin: 0;
            color: #303133;
            font-size: 16px;
            line-height: 1.4;
        }

        .modal-title p {
            margin: 3px 0 0;
            color: #909399;
            font-size: 12px;
        }

        .modal-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 14px 16px;
            overflow: hidden;
        }

        .dashboard-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .dashboard-search {
            flex: 1;
            min-width: 260px;
        }

        .filter-tabs {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px;
            background: #f5f7fa;
            border: 1px solid #ebeef5;
            border-radius: 4px;
        }

        .filter-tab {
            height: 26px;
            padding: 0 10px;
            color: #606266;
            background: transparent;
            border: 0;
            border-radius: 3px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        .filter-tab:hover,
        .filter-tab.active {
            color: var(--forest-green);
            background: #fff;
            font-weight: 700;
        }

        .dashboard-grid {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            overflow: auto;
            padding: 2px 2px 8px;
        }

        .dashboard-card {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            background: #fff;
            border: 1px solid #ebeef5;
            border-radius: 4px;
            font-family: inherit;
            text-align: left;
            cursor: pointer;
        }

        .dashboard-card:hover,
        .dashboard-card.selected {
            border-color: var(--forest-green);
            box-shadow: 0 0 0 3px rgba(32, 165, 101, 0.10);
        }

        .dashboard-card.selected {
            background: var(--forest-green-50);
        }

        .card-thumb {
            height: 92px;
            padding: 8px;
            background: #fafafa;
            border: 1px solid #ebeef5;
            border-radius: 3px;
        }

        .thumb-bars {
            height: 100%;
            display: flex;
            align-items: flex-end;
            gap: 5px;
        }

        .thumb-bars span {
            flex: 1;
            min-width: 4px;
            height: var(--h);
            background: linear-gradient(180deg, var(--forest-green), #8fd3b1);
            border-radius: 2px 2px 0 0;
        }

        .card-name {
            color: #303133;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.35;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: #909399;
            font-size: 12px;
        }

        .card-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 260px;
            color: #909399;
            border: 1px dashed #dcdfe6;
            border-radius: 4px;
        }

        .picked-count {
            margin-right: auto;
            color: #606266;
        }

        .picked-count strong {
            color: var(--forest-green);
        }

        .find-bar {
            position: fixed;
            top: 70px;
            right: 22px;
            z-index: 1200;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            z-index: 2200;
            padding: 8px 14px;
            color: var(--forest-green-700);
            background: var(--forest-green-50);
            border: 1px solid var(--forest-green-200);
            border-radius: 4px;
            box-shadow: var(--shadow-md);
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: 700;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1180px) {
            .dashboard-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .kpi-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 860px) {
            .report-editor {

                range.insertNode(span);
                selection.removeAllRanges();

                nextRange.selectNodeContents(span);

                saveSelection();

                    const selected = pickedDashboards.has(item.id) ? ' selected' : '';
                    return '<button class="dashboard-card' + selected + '" type="button" data-id="' + item.id + '"><div class="card-thumb">' + dashboardThumb(item) + '</div><div class="card-name">' + escapeHtml(item.name) + '</div><div class="card-meta"><span class="dashboard-tag">' + escapeHtml(item.category) + '</span><span>' + escapeHtml(item.updated.slice(5, 16)) + '</span></div></button>';
                }).join('');
                empty.classList.toggle('hidden', rows.length > 0);
                grid.classList.toggle('hidden', rows.length === 0);
                updatePickedCount();
            }

            function updatePickedCount() {
                const count = pickedDashboards.size;
                document.getElementById('pickedCount').textContent = count;
                document.getElementById('confirmInsertDashboard').disabled = count === 0;
            }

            function openDashboardModal() {
                saveSelection();
                pickedDashboards.clear();
                document.getElementById('dashboardSearch').value = '';
                document.getElementById('dashboardMask').classList.remove('hidden');
                document.getElementById('dashboardModal').classList.remove('hidden');
                document.getElementById('dashboardModal').setAttribute('aria-hidden', 'false');
                renderDashboardGrid();
            }

            function closeDashboardModal() {
                document.getElementById('dashboardMask').classList.add('hidden');
                document.getElementById('dashboardModal').classList.add('hidden');
                document.getElementById('dashboardModal').setAttribute('aria-hidden', 'true');
                article.focus();
            }

            function getScheduleKey(cycle) {
                return scheduleCycleMap[cycle || scheduleState.cycle] || 'monthly';
            }

            function selectHtml(id, options, value, extraClass) {
                return '<select class="ed-select ' + (extraClass || '') + '" id="' + id + '">' + options.map(function (option) {
                    const selected = option === value ? ' selected' : '';
                    return '<option value="' + escapeHtml(option) + '"' + selected + '>' + escapeHtml(option) + '</option>';
                }).join('') + '</select>';
            }

            function timeInputHtml(id, value) {
                return '<span class="time-field"><input class="ed-input time-input" id="' + id + '" value="' + escapeHtml(value || '00:00:00') + '"><svg class="time-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>';
            }

            function renderRunFields(cycle) {
                const key = getScheduleKey(cycle);
                const data = scheduleState.run[key];
                let html = '';
                if (key === 'weekly') {
                    html += selectHtml('scheduleWeekDay', scheduleOptionSets.weekDays, data.weekDay, 'schedule-wide-select');
                } else if (key === 'monthly') {
                    html += selectHtml('scheduleDay', scheduleOptionSets.monthDays, data.day, 'schedule-day-select');
                } else if (key === 'quarterly') {
                    html += selectHtml('scheduleQuarterMonth', scheduleOptionSets.quarterMonths, data.quarterMonth, 'schedule-wide-select');
                    html += selectHtml('scheduleDay', scheduleOptionSets.monthDays, data.day, 'schedule-day-select');
                } else if (key === 'yearly') {
                    html += selectHtml('scheduleMonth', scheduleOptionSets.yearMonths, data.month, 'schedule-wide-select');
                    html += selectHtml('scheduleDay', scheduleOptionSets.monthDays, data.day, 'schedule-day-select');
                }
                html += timeInputHtml('scheduleTime', data.time);
                document.getElementById('scheduleRunFields').innerHTML = html;
            }

            function rangeOffsetOptions(key) {
                if (key === 'daily') return scheduleOptionSets.dailyOffsets;
                if (key === 'weekly') return scheduleOptionSets.weeklyOffsets;
                if (key === 'monthly') return scheduleOptionSets.monthlyOffsets;
                if (key === 'quarterly') return scheduleOptionSets.quarterlyOffsets;
                return scheduleOptionSets.yearlyOffsets;
            }

            function renderRangeControls(point, cycle) {
                const key = getScheduleKey(cycle);
                const data = scheduleState.range[key][point];
                const prefix = point === 'start' ? 'rangeStart' : 'rangeEnd';
                let html = selectHtml(prefix + 'Offset', rangeOffsetOptions(key), data.offset, 'schedule-wide-select');
                if (key === 'weekly') {
                    html += selectHtml(prefix + 'WeekDay', scheduleOptionSets.weekDays, data.weekDay, 'schedule-wide-select');
                } else if (key === 'monthly') {
                    html += selectHtml(prefix + 'Day', scheduleOptionSets.monthDays, data.day, 'schedule-day-select');
                } else if (key === 'quarterly') {
                    html += selectHtml(prefix + 'QuarterMonth', scheduleOptionSets.quarterMonths, data.quarterMonth, 'schedule-wide-select');
                    html += selectHtml(prefix + 'Day', scheduleOptionSets.monthDays, data.day, 'schedule-day-select');
                } else if (key === 'yearly') {
                    html += selectHtml(prefix + 'Month', scheduleOptionSets.yearMonths, data.month, 'schedule-wide-select');
                    html += selectHtml(prefix + 'Day', scheduleOptionSets.monthDays, data.day, 'schedule-day-select');
                }
                html += timeInputHtml(prefix + 'Time', data.time);
                document.getElementById(prefix + 'Controls').innerHTML = html;
            }

            function renderScheduleForm(cycle) {
                renderRunFields(cycle);
                renderRangeControls('start', cycle);
                renderRangeControls('end', cycle);
            }

            function runText(key) {
                const data = scheduleState.run[key];
                if (key === 'daily') return data.time;
                if (key === 'weekly') return data.weekDay + ' - ' + data.time;
                if (key === 'monthly') return data.day + ' - ' + data.time;
                if (key === 'quarterly') return data.quarterMonth + ' - ' + data.day + ' - ' + data.time;
                return data.month + ' - ' + data.day + ' - ' + data.time;
            }

            function rangePointText(key, point) {
                const data = scheduleState.range[key][point];
                if (key === 'daily') return data.offset + ' ' + data.time;
                if (key === 'weekly') return data.offset + ' ' + data.weekDay + ' ' + data.time;
                if (key === 'monthly') return data.offset + ' ' + data.day + ' ' + data.time;
                if (key === 'quarterly') return data.offset + ' ' + data.quarterMonth + ' ' + data.day + ' ' + data.time;
                return data.offset + ' ' + data.month + ' ' + data.day + ' ' + data.time;
            }

            function updateScheduleSummary() {
                const key = getScheduleKey();
                document.getElementById('scheduleSummary').textContent = scheduleState.cycle + ' - ' + runText(key);
                document.getElementById('rangeSummary').textContent = rangePointText(key, 'start') + ' - ' + rangePointText(key, 'end');
            }

            function fillScheduleForm() {
                document.getElementById('scheduleCycle').value = scheduleState.cycle;
                renderScheduleForm(scheduleState.cycle);
            }

            function getFieldValue(id, fallback) {
                const field = document.getElementById(id);
                return field ? field.value.trim() || fallback : fallback;
            }

            function openScheduleModal() {
                fillScheduleForm();
                document.getElementById('scheduleMask').classList.remove('hidden');
                document.getElementById('scheduleModal').classList.remove('hidden');
                document.getElementById('scheduleModal').setAttribute('aria-hidden', 'false');
            }

            function closeScheduleModal() {
                document.getElementById('scheduleMask').classList.add('hidden');
                document.getElementById('scheduleModal').classList.add('hidden');
                document.getElementById('scheduleModal').setAttribute('aria-hidden', 'true');
            }

            function applyScheduleSettings() {
                scheduleState.cycle = document.getElementById('scheduleCycle').value;
                const key = getScheduleKey();
                const run = scheduleState.run[key];
                run.time = getFieldValue('scheduleTime', run.time || '00:00:00');
                if (key === 'weekly') run.weekDay = getFieldValue('scheduleWeekDay', run.weekDay);
                if (key === 'monthly') run.day = getFieldValue('scheduleDay', run.day);
                if (key === 'quarterly') {
                    run.quarterMonth = getFieldValue('scheduleQuarterMonth', run.quarterMonth);
                    run.day = getFieldValue('scheduleDay', run.day);
                }
                if (key === 'yearly') {
                    run.month = getFieldValue('scheduleMonth', run.month);
                    run.day = getFieldValue('scheduleDay', run.day);
                }
                ['start', 'end'].forEach(function (point) {
                    const prefix = point === 'start' ? 'rangeStart' : 'rangeEnd';
                    const range = scheduleState.range[key][point];
                    range.offset = getFieldValue(prefix + 'Offset', range.offset);
                    range.time = getFieldValue(prefix + 'Time', range.time || '00:00:00');
                    if (key === 'weekly') range.weekDay = getFieldValue(prefix + 'WeekDay', range.weekDay);
                    if (key === 'monthly') range.day = getFieldValue(prefix + 'Day', range.day);
                    if (key === 'quarterly') {
                        range.quarterMonth = getFieldValue(prefix + 'QuarterMonth', range.quarterMonth);
                        range.day = getFieldValue(prefix + 'Day', range.day);
                    }
                    if (key === 'yearly') {
                        range.month = getFieldValue(prefix + 'Month', range.month);
                        range.day = getFieldValue(prefix + 'Day', range.day);
                    }
                });
                updateScheduleSummary();
                closeScheduleModal();
                showToast('执行机制设置已更新');
            }

            function showToast(text) {
                const old = document.querySelector('.toast');
                if (old) old.remove();
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = text;
                document.body.appendChild(toast);
                setTimeout(function () {
                    toast.remove();
                }, 1400);
            }

            function openFindBar() {
                const bar = document.getElementById('findBar');
                bar.classList.remove('hidden');
                document.getElementById('findInput').focus();
            }

            function runFind(backward) {
                const text = document.getElementById('findInput').value.trim();
                if (!text) return;
                article.focus();
                window.find(text, false, backward, true, false, false, false);
            }

            toolbar.addEventListener('mousedown', function (event) {
                if (event.target.closest('button')) {
                    saveSelection();
                    event.preventDefault();
                } else if (event.target.closest('select') || event.target.closest('input')) {
                    saveSelection();
                }
            });

            toolbar.addEventListener('click', function (event) {
                const cmdButton = event.target.closest('[data-cmd]');
                const actionButton = event.target.closest('[data-action]');
                if (cmdButton) {
                    exec(cmdButton.dataset.cmd);
                    return;
                }
                if (actionButton) {
                    handleAction(actionButton.dataset.action);
                }
            });

            document.getElementById('blockSelect').addEventListener('change', function () {
                exec('formatBlock', this.value);
                this.value = 'P';
            });

            document.getElementById('sizeSelect').addEventListener('change', function () {
                if (this.value) applyInlineStyle('font-size:' + this.value + ';');
                this.value = '';
            });

            document.getElementById('lineHeightSelect').addEventListener('change', function () {
                if (this.value) applyInlineStyle('line-height:' + this.value + ';');
                this.value = '';
            });

            document.getElementById('foreColor').addEventListener('change', function () {
                exec('foreColor', this.value);
            });

            document.getElementById('backColor').addEventListener('change', function () {
                exec('hiliteColor', this.value);
            });

            document.getElementById('btnImportWord').addEventListener('click', function () {
                const input = document.getElementById('wordFileInput');
                input.value = '';
                input.click();
            });
            document.getElementById('wordFileInput').addEventListener('change', function () {
                const file = this.files && this.files[0];
                if (!file) return;
                showToast('已选择 Word 文件：' + file.name);
            });
            document.getElementById('btnScheduleSetting').addEventListener('click', openScheduleModal);
            document.getElementById('scheduleCycle').addEventListener('change', function () {
                renderScheduleForm(this.value);
            });
            document.querySelectorAll('[data-schedule-close], #scheduleMask').forEach(function (item) {
                item.addEventListener('click', closeScheduleModal);
            });
            document.getElementById('scheduleConfirm').addEventListener('click', applyScheduleSettings);

            document.getElementById('btnInsertDashboard').addEventListener('click', openDashboardModal);
            document.getElementById('btnBack').addEventListener('click', function () {
                window.open('smart-report.html', '_self');
            });
            document.getElementById('btnPreview').addEventListener('click', function () {
                window.open('smart-report.html', '_blank', 'noopener');
            });
            document.getElementById('btnSave').addEventListener('click', function () {
                showToast('报告内容已保存');
            });
            document.getElementById('btnExit').addEventListener('click', function () {
                window.close();
                setTimeout(function () {
                    window.location.href = 'smart-report.html';
                }, 120);
            });

            sectionList.addEventListener('click', function (event) {
                const link = event.target.closest('.section-link');
                if (!link) return;
                sectionList.querySelectorAll('.section-link').forEach(function (item) {
                    item.classList.remove('active');
                });
                link.classList.add('active');
                const target = document.getElementById(link.dataset.target);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });

            article.addEventListener('input', function () {
                clearTimeout(article._sectionTimer);
                article._sectionTimer = setTimeout(rebuildSectionList, 500);
            });
            article.addEventListener('keyup', saveSelection);
            article.addEventListener('mouseup', saveSelection);
            article.addEventListener('click', saveSelection);

            document.addEventListener('selectionchange', saveSelection);

            document.getElementById('dashboardGrid').addEventListener('click', function (event) {
                const card = event.target.closest('.dashboard-card');
                if (!card) return;
                const id = card.dataset.id;
                if (pickedDashboards.has(id)) {
                    pickedDashboards.delete(id);
                } else {
                    pickedDashboards.add(id);
                }
                renderDashboardGrid();
            });

            document.getElementById('dashboardSearch').addEventListener('input', renderDashboardGrid);
            document.getElementById('dashboardFilters').addEventListener('click', function (event) {
                const button = event.target.closest('.filter-tab');
                if (!button) return;
                activeFilter = button.dataset.filter;
                document.querySelectorAll('.filter-tab').forEach(function (item) {
                    item.classList.toggle('active', item === button);
                });
                renderDashboardGrid();
            });

            document.querySelectorAll('[data-modal-close], #dashboardMask').forEach(function (item) {
                item.addEventListener('click', closeDashboardModal);
            });

            document.getElementById('confirmInsertDashboard').addEventListener('click', function () {
                const html = Array.from(pickedDashboards).map(function (id) {
                    return dashboardEmbed(dashboards.find(function (item) { return item.id === id; }));
                }).join('');
                insertHtml(html);
                closeDashboardModal();
                showToast('已插入 ' + pickedDashboards.size + ' 个仪表盘');
            });

            document.getElementById('findInput').addEventListener('keydown', function (event) {
                if (event.key === 'Enter') runFind(event.shiftKey);
                if (event.key === 'Escape') document.getElementById('findBar').classList.add('hidden');
            });
            document.getElementById('findPrev').addEventListener('click', function () { runFind(true); });
            document.getElementById('findNext').addEventListener('click', function () { runFind(false); });
            document.getElementById('findClose').addEventListener('click', function () {
                document.getElementById('findBar').classList.add('hidden');
            });

            try {
                document.execCommand('styleWithCSS', false, true);
            } catch (error) {}

            renderReport();
            updateScheduleSummary();
        })();
    </script>
</body>
</html>
