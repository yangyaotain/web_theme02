<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容预览 - 可信数据空间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <style>
        /* 预览提示条 */
        .preview-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: linear-gradient(135deg, #0B1A14 0%, #1a3a2a 100%);
            color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 10px 24px; font-size: 13px; font-weight: 500;
            box-shadow: 0 2px 12px rgba(0,0,0,.15);
        }
        .preview-bar svg { width: 18px; height: 18px; fill: currentColor; opacity: .7; }
        .preview-bar-badge { background: var(--forest-green); padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .preview-bar-close {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,.15); border: none; color: #fff; padding: 4px 14px;
            border-radius: 4px; font-size: 12px; cursor: pointer; transition: .15s;
        }
        .preview-bar-close:hover { background: rgba(255,255,255,.25); }

        body { padding-top: 42px; }

        /* 文章容器 */
        .article { background: #fff; border-radius: 16px; max-width: 960px; margin: 32px auto; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.06); }

        /* Hero Banner */
        .article-hero { position: relative; height: 400px; background-size: cover; background-position: center; }
        .article-hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%); }
        .article-hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 48px; color: white; }
        .article-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(32, 165, 101, 0.9); border-radius: var(--radius-md); font-size: 12px; font-weight: 600; margin-bottom: 16px; }
        .article-badge svg { width: 14px; height: 14px; fill: currentColor; }
        .article-title { font-size: 42px; font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 12px; text-shadow: 0 2px 20px rgba(0,0,0,0.3); }
        .article-subtitle { font-size: 18px; opacity: 0.9; max-width: 600px; line-height: 1.6; }

        /* Article Body */
        .article-body { padding: 48px; }

        /* Tabs */
        .space-detail-tabs { display: flex; align-items: center; gap: 0; border-bottom: 1px solid var(--border-subtle); margin-bottom: 24px; }
        .space-tab { padding: 12px 24px; font-size: 14px; font-weight: 500; color: var(--text-secondary); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 150ms ease; display: flex; align-items: center; gap: 8px; }
        .space-tab svg { width: 18px; height: 18px; fill: currentColor; }
        .space-tab:hover { color: var(--text-primary); }
        .space-tab.active { color: var(--forest-green); border-bottom-color: var(--forest-green); font-weight: 600; }

        /* Lead */
        .article-lead { font-size: 20px; line-height: 1.8; color: var(--text-secondary); border-left: 4px solid var(--forest-green); padding-left: 24px; margin-bottom: 48px; }

        /* Stats */
        .stats-banner { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; background: linear-gradient(135deg, var(--forest-green-50) 0%, rgba(32, 165, 101, 0.05) 100%); border-radius: var(--radius-xl); padding: 32px; margin-bottom: 48px; }
        .stat-card { text-align: center; }
        .stat-number { font-size: 48px; font-weight: 800; color: var(--forest-green); line-height: 1; margin-bottom: 8px; letter-spacing: -0.03em; }
        .stat-unit { font-size: 16px; font-weight: 400; }
        .stat-label { font-size: 13px; color: var(--text-tertiary); }

        /* Section */
        .article-section { margin-bottom: 48px; }
        .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .section-number { width: 48px; height: 48px; background: var(--forest-green); color: white; font-size: 20px; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .section-title { font-size: 24px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
        .section-content { font-size: 16px; color: var(--text-secondary); line-height: 1.9; margin-left: 64px; }

        /* Feature Grid */
        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-left: 64px; margin-top: 20px; }
        .feature-card { background: var(--surface-secondary); border-radius: var(--radius-xl); padding: 24px; display: flex; gap: 16px; box-shadow: var(--shadow-sm); }
        .feature-icon { width: 48px; height: 48px; background: var(--forest-green-100); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .feature-icon svg { width: 24px; height: 24px; fill: var(--forest-green); }
        .feature-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .feature-desc { font-size: 13px; color: var(--text-tertiary); line-height: 1.5; }

        /* 空数据资源/产品占位 */
        .tab-placeholder { padding: 60px 0; text-align: center; color: var(--text-tertiary); font-size: 14px; }
        .tab-placeholder svg { width: 48px; height: 48px; fill: #dcdfe6; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }

        .space-tab-content { display: none; }
        .space-tab-content.active { display: block; }

        @media (max-width: 768px) {
            .article-title { font-size: 28px; }
            .article-hero { height: 300px; }
            .article-hero-content { padding: 24px; }
            .article-body { padding: 24px; }
            .stats-banner { grid-template-columns: repeat(2, 1fr); }
            .feature-grid { grid-template-columns: 1fr; margin-left: 0; }
            .section-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <!-- 预览提示条 -->
    <div class="preview-bar">
        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        <span class="preview-bar-badge">预览</span>
        可信数据空间 — 内容预览模式
        <button class="preview-bar-close" onclick="window.close()">关闭预览</button>
    </div>

    <article class="article">
        <div class="article-hero" id="pvHero" style="background-image: url('images/space-hero.jpg');">
            <div class="article-hero-content">
                <span class="article-badge">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    <span id="pvBadge">龙岗区数据要素改革试点</span>
                </span>
                <h1 class="article-title" id="pvTitle">可信数据空间</h1>
                <p class="article-subtitle" id="pvSubtitle">以可信数据空间为基础，以数据交易为纽带，构建数据要素流通的完整生态闭环</p>
            </div>
        </div>
        <div class="article-body">
            <div class="space-detail-tabs">
                <button class="space-tab active" data-subtab="intro">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    空间介绍
                </button>
                <button class="space-tab" data-subtab="resources">
                    <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 10H6v-2h8v2zm4-4H6v-2h12v2z"/></svg>
                    数据资源
                </button>
                <button class="space-tab" data-subtab="products">
                    <svg viewBox="0 0 24 24"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.86 8.86l-3 3.87L9 13.14 6 17h12l-3.86-5.14z"/></svg>
                    数据产品
                </button>
            </div>

            <!-- Tab 1: 空间介绍 -->
            <div class="space-tab-content active" data-subtab="intro">
                <p class="article-lead" id="pvLead"></p>
                <div class="stats-banner" id="pvStats"></div>
                <div id="pvSections"></div>
            </div>

            <!-- Tab 2: 数据资源 -->
            <div class="space-tab-content" data-subtab="resources">
                <div class="tab-placeholder">
                    <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 10H6v-2h8v2zm4-4H6v-2h12v2z"/></svg>
                    数据资源内容将在发布后展示
                </div>
            </div>

            <!-- Tab 3: 数据产品 -->
            <div class="space-tab-content" data-subtab="products">
                <div class="tab-placeholder">
                    <svg viewBox="0 0 24 24"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.86 8.86l-3 3.87L9 13.14 6 17h12l-3.86-5.14z"/></svg>
                    数据产品内容将在发布后展示
                </div>
            </div>
        </div>
    </article>

    <script>
    (function () {
        var raw = localStorage.getItem('ds-preview-data');
        if (!raw) return;
        var d = JSON.parse(raw);

        if (d.heroImg) document.getElementById('pvHero').style.backgroundImage = "url('" + d.heroImg + "')";
        if (d.heroBadge) document.getElementById('pvBadge').textContent = d.heroBadge;
        if (d.heroTitle) document.getElementById('pvTitle').textContent = d.heroTitle;
        if (d.heroSubtitle) document.getElementById('pvSubtitle').textContent = d.heroSubtitle;
        if (d.lead) document.getElementById('pvLead').textContent = d.lead;

        document.title = (d.heroTitle || d.title || '可信数据空间') + ' - 内容预览';

        var statsHtml = '';
        if (d.stats && d.stats.length) {
            d.stats.forEach(function (s) {
                statsHtml += '<div class="stat-card"><div class="stat-number">' + s.value + '<span class="stat-unit">' + s.unit + '</span></div><div class="stat-label">' + s.label + '</div></div>';
            });
        }
        document.getElementById('pvStats').innerHTML = statsHtml;
        if (!statsHtml) document.getElementById('pvStats').style.display = 'none';

        var secHtml = '';
        var featureIcons = [
            '<svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M19 7c0-1.1-.9-2-2-2h-3v2h3v2.65L13.52 14H10V9H6c-2.21 0-4 1.79-4 4v3h2c0 1.66 1.34 3 3 3s3-1.34 3-3h4.48L19 10.35V7z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>'
        ];

        if (d.sections && d.sections.length) {
            d.sections.forEach(function (sec, i) {
                secHtml += '<section class="article-section">';
                secHtml += '<div class="section-header"><span class="section-number">' + (i + 1) + '</span><h2 class="section-title">' + sec.title + '</h2></div>';
                if (sec.content) {
                    secHtml += '<p class="section-content">' + sec.content + '</p>';
                }
                if (sec.features && sec.features.length) {
                    secHtml += '<div class="feature-grid">';
                    sec.features.forEach(function (f, fi) {
                        secHtml += '<div class="feature-card"><div class="feature-icon">' + (featureIcons[fi % featureIcons.length]) + '</div><div><div class="feature-title">' + f.title + '</div><div class="feature-desc">' + f.desc + '</div></div></div>';
                    });
                    secHtml += '</div>';
                }
                secHtml += '</section>';
            });
        }
        document.getElementById('pvSections').innerHTML = secHtml;

        /* Tab 切换 */
        var tabs = document.querySelectorAll('.space-tab');
        var contents = document.querySelectorAll('.space-tab-content');
        tabs.forEach(function (tab) {
            tab.addEventListener('click', function () {
                var target = tab.getAttribute('data-subtab');
                tabs.forEach(function (t) { t.classList.remove('active'); });
                contents.forEach(function (c) { c.classList.remove('active'); });
                tab.classList.add('active');
                document.querySelector('.space-tab-content[data-subtab="' + target + '"]').classList.add('active');
            });
        });
    })();
    </script>
</body>
</html>
