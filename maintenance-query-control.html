<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查询控件 - 仪表盘定制 - 龙岗数据聚合服务平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/admin-common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }
.maintenance-content {
            height: calc(100vh - 64px);
            padding: 0;
            overflow: hidden;
            background: #f0f2f5;
        }

        .qc-page {
            height: 100%;
            min-width: 0;
            padding: 8px;
            color: #303133;
            font-size: 13px;
        }

        .hidden {
            display: none !important;
        }

        .icon,
        .icon-stroke {
            width: 16px;
            height: 16px;
            flex: 0 0 auto;
        }

        .icon {
            fill: currentColor;
        }

        .icon-stroke {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .qc-btn {
            height: 32px;
            padding: 0 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #303133;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }

        .qc-btn:hover {
            color: var(--forest-green);
            border-color: var(--forest-green);
        }

        .qc-btn.primary {
            color: #fff;
            background: var(--forest-green);
            border-color: var(--forest-green);
            box-shadow: var(--shadow-green-glow);
        }

        .qc-btn.primary:hover {
            color: #fff;
            background: var(--forest-green-600);
            border-color: var(--forest-green-600);
        }

        .qc-input,
        .qc-select,
        .qc-textarea {
            width: 100%;
            box-sizing: border-box;
            min-width: 0;
            color: #303133;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .qc-input,
        .qc-select {
            height: 32px;
            padding: 0 10px;
        }

        .qc-textarea {
            min-height: 54px;
            padding: 8px 10px;
            resize: vertical;
        }

        .qc-input:focus,
        .qc-select:focus,
        .qc-textarea:focus {
            border-color: var(--forest-green);
            box-shadow: 0 0 0 3px rgba(32, 165, 101, 0.12);
        }

        .qc-shell {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            border: 1px solid #ebeef5;
            overflow: hidden;
        }

        .qc-head {
            height: 52px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #e4e7ed;
            color: #1f2d3d;
            font-size: 15px;
            font-weight: 700;
        }

        .list-view,
        .edit-view {
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .list-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 14px 16px 10px;
        }

        .list-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            width: 440px;
            max-width: 45vw;
        }

        .search-box .qc-input {
            padding-left: 32px;
        }

        .search-box .icon-stroke {
            position: absolute;
            left: 10px;
            top: 8px;
            color: #909399;
        }

        .view-switch {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #909399;
        }

        .view-btn {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #909399;
            background: transparent;
            border: 0;
            cursor: pointer;
        }

        .view-btn.active,
        .view-btn:hover {
            color: var(--forest-green);
            background: var(--forest-green-50);
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(216px, 216px));
            align-content: start;
            gap: 10px 12px;
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding-bottom: 16px;
        }

        .control-card {
            height: 150px;
            display: flex;
            flex-direction: column;
            background: #fff;
            border: 1px solid #dcdfe6;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .control-card:hover {
            border-color: var(--forest-green);
            box-shadow: var(--shadow-md);
        }

        .control-card.add-card {
            align-items: center;
            justify-content: center;
            color: var(--forest-green);
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .add-card .plus {
            font-size: 24px;
            line-height: 1;
            font-weight: 400;
        }

        .control-preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
        }

        .fake-control {
            width: 100%;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 0 10px;
            color: #a8abb2;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
        }

        .fake-control.search {
            justify-content: flex-start;
        }

        .fake-control.range {
            gap: 12px;
            color: #606266;
            border: 0;
            padding: 0;
        }

        .fake-control.range span {
            flex: 1;
            height: 32px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            color: #a8abb2;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
        }

        .fake-control.range b {
            color: #606266;
            font-weight: 400;
        }

        .control-name {
            height: 32px;
            padding: 0 10px;
            display: flex;
            align-items: center;
            color: #303133;
            background: #f2f6fc;
            font-weight: 600;
        }

        .pager {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            color: #303133;
        }

        .page-btn {
            min-width: 28px;
            height: 28px;
            color: #606266;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
            cursor: pointer;
        }

        .page-btn.active {
            color: var(--forest-green);
            border-color: var(--forest-green);
        }

        .edit-body {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(660px, 62%) minmax(320px, 1fr);
            overflow: hidden;
        }

        .form-panel {
            min-width: 0;
            overflow: auto;
            padding: 16px 28px 32px 24px;
        }

        .preview-panel {
            min-width: 0;
            border-left: 1px solid #dcdfe6;
            padding: 18px 24px;
            overflow: auto;
        }

        .form-row {
            display: grid;
            grid-template-columns: 146px minmax(0, 1fr);
            align-items: start;
            column-gap: 14px;
            margin-bottom: 18px;
        }

        .form-row > :not(.form-label) {
            min-width: 0;
            max-width: 100%;
        }

        .form-label {
            color: #303133;
            text-align: right;
            font-weight: 500;
            padding-top: 7px;
            line-height: 18px;
            white-space: normal;
            overflow-wrap: break-word;
        }

        .form-label.required::before {
            content: "*";
            margin-right: 4px;
            color: #f56c6c;
        }

        .radio-line,
        .check-line {
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 32px;
            min-width: 0;
            flex-wrap: wrap;
        }

        .radio-line label,
        .check-line label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            white-space: nowrap;
            cursor: pointer;
        }

        input[type="checkbox"],
        input[type="radio"] {
            accent-color: var(--forest-green);
        }

        .config-table {
            width: 100%;
            min-width: 0;
            border-collapse: collapse;
            table-layout: fixed;
            border: 1px solid #dcdfe6;
            font-size: 13px;
        }

        .config-table .qc-input,
        .config-table .qc-select {
            width: 100% !important;
            max-width: 100%;
            min-width: 0;
        }

        .config-table th,
        .config-table td {
            height: 38px;
            padding: 6px 12px;
            border-right: 1px solid #e4e7ed;
            border-bottom: 1px solid #e4e7ed;
            text-align: left;
            vertical-align: middle;
            overflow: hidden;
            word-break: break-all;
        }

        .config-table th {
            color: #303133;
            background: #f5f7fa;
            font-weight: 700;
        }

        .config-table tr:last-child td {
            border-bottom: 0;
        }

        .table-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--forest-green);
        }

        .danger {
            color: #f56c6c;
        }

        .muted-bar {
            height: 42px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            color: #606266;
            background: #f2f6fc;
        }

        .text-count {
            margin-top: 4px;
            color: #909399;
            text-align: right;
        }

        .form-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 160px;
        }

        .preview-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            color: #303133;
            font-weight: 700;
        }

        .preview-name {
            margin: 0 0 12px;
            color: #303133;
            font-weight: 700;
        }

        .preview-control {
            width: min(100%, 720px);
        }

        .preview-control.narrow {
            width: 210px;
        }

        .preview-control.range-preview {
            display: flex;
            align-items: center;
            gap: 22px;
            width: 520px;
        }

        .preview-control.range-preview .qc-input {
            width: 210px;
        }

        .inline-colon {
            margin: 0 10px 0 44px;
            color: #303133;
            font-weight: 700;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            z-index: 50;
            padding: 8px 14px;
            color: var(--forest-green-700);
            background: var(--forest-green-50);
            border: 1px solid var(--forest-green-200);
            border-radius: 4px;
            box-shadow: var(--shadow-md);
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div data-admin-topbar data-active="maintenance"></div>

    <div class="admin-layout">
        <aside class="admin-sidebar maintenance-sidebar" data-maintenance-sidebar></aside>

        <main class="admin-content maintenance-content">
            <section class="qc-page">
                <div class="qc-shell">
                    <div class="list-view" id="listView">
                        <div class="qc-head">
                            <svg class="icon-stroke" viewBox="0 0 24 24"><path d="m21 21-4.3-4.3"/><circle cx="11" cy="11" r="7"/></svg>
                            查询控件
                        </div>
                        <div class="list-body">
                            <div class="list-toolbar">
                                <div class="toolbar-left">
                                    <div class="search-box">
                                        <svg class="icon-stroke" viewBox="0 0 24 24"><path d="m21 21-4.3-4.3"/><circle cx="11" cy="11" r="7"/></svg>
                                        <input class="qc-input" id="keywordInput" placeholder="请输入">
                                    </div>
                                    <button class="qc-btn primary" type="button" id="btnQuery">查询</button>
                                    <button class="qc-btn" type="button" id="btnReset">重置</button>
                                </div>
                                <div class="toolbar-right view-switch">
                                    <button class="view-btn active" type="button" title="卡片视图">
                                        <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M4 4h6v6H4z"/><path d="M14 4h6v6h-6z"/><path d="M4 14h6v6H4z"/><path d="M14 14h6v6h-6z"/></svg>
                                    </button>
                                    <button class="view-btn" type="button" title="列表视图">
                                        <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="control-grid" id="controlGrid"></div>
                            <div class="pager">
                                <span>总共 <strong id="totalCount">0</strong> 条数据</span>
                                <button class="page-btn">&lt;</button>
                                <button class="page-btn active">1</button>
                                <button class="page-btn">&gt;</button>
                                <select class="qc-select" style="width:96px;height:28px;"><option>10 条/页</option><option>20 条/页</option></select>
                            </div>
                        </div>
                    </div>

                    <div class="edit-view hidden" id="editView">
                        <div class="qc-head">
                            <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 4v16"/><path d="M4 8h16"/></svg>
                            编辑查询控件
                        </div>
                        <div class="edit-body">
                            <div class="form-panel">
                                <div class="form-row">
                                    <label class="form-label required">名称</label>
                                    <input class="qc-input" id="controlName" value="区域参数">
                                </div>
                                <div class="form-row">
                                    <label class="form-label required">控件类型</label>
                                    <select class="qc-select" id="controlType">
                                        <option value="select">下拉单选</option>
                                        <option value="text">文本查询</option>
                                        <option value="cascade">下拉级联</option>
                                        <option value="range">范围查询</option>
                                        <option value="date">单日历</option>
                                        <option value="dateRange">双日历</option>
                                        <option value="linkage">联动查询</option>
                                    </select>
                                </div>
                                <div class="form-row">
                                    <label class="form-label required">参数</label>
                                    <input class="qc-input" id="controlParam" value="area_code">
                                </div>
                                <div id="typeConfig"></div>
                                <div class="form-row">
                                    <label class="form-label">控件名称显示</label>
                                    <div class="check-line">
                                        <label><input type="checkbox" id="showName" checked> </label>
                                    </div>
                                </div>
                                <div class="form-row top">
                                    <label class="form-label">提示文字</label>
                                    <div>
                                        <textarea class="qc-textarea" id="tipText" maxlength="100" placeholder="100个字符以内，允许输入中文、英文、数字和特殊字符"></textarea>
                                        <div class="text-count"><span id="tipCount">0</span> / 100</div>
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <button class="qc-btn primary" type="button" id="btnSave">保存</button>
                                    <button class="qc-btn" type="button" id="btnCancel">取消</button>
                                </div>
                            </div>
                            <div class="preview-panel">
                                <div class="preview-title">
                                    <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="3"/></svg>
                                    默认配置和预览
                                </div>
                                <div class="preview-name" id="previewName">区域参数</div>
                                <div id="previewArea"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/maintenance-sidebar.js"></script>
    <script src="js/admin-topbar.js"></script>
    <script>
    const controls = [
        { id: 1, name: '区域参数', type: 'linkage', param: 'area_code', dataset: '行政区划维表', placeholder: '请选择' },
        { id: 2, name: '资源名称', type: 'text', param: 'resource_name', dataset: '', placeholder: '模糊查询' },
        { id: 3, name: '发布日期', type: 'date', param: 'publish_date', dataset: '', placeholder: 'YYYY/MM/DD' },
        { id: 4, name: '资源目录', type: 'select', param: 'catalog_id', dataset: '资源目录维表', placeholder: '请选择' },
        { id: 5, name: '供需类型', type: 'cascade', param: 'supply_demand_type', dataset: '供需类型维表', placeholder: '请选择' },
        { id: 6, name: '审核状态', type: 'select', param: 'audit_status', dataset: '流程状态维表', placeholder: '请选择' }
    ];

    const typeNames = {
        select: '下拉单选',
        text: '文本查询',
        cascade: '下拉级联',
        range: '范围查询',
        date: '单日历',
        dateRange: '双日历',
        linkage: '联动查询'
    };

    const previewValues = {
        select: '公共数据资源',
        text: '',
        cascade: '数据资源 / 公共服务',
        range: '',
        date: '2026-05-14',
        dateRange: '',
        linkage: '龙岗区 / 坂田街道'
    };

    let activeControl = controls[0];

    function controlIcon(type) {
        if (type === 'text') {
            return '<svg class="icon-stroke" viewBox="0 0 24 24"><path d="m21 21-4.3-4.3"/><circle cx="11" cy="11" r="7"/></svg>';
        }
        if (type === 'date' || type === 'dateRange') {
            return '<svg class="icon-stroke" viewBox="0 0 24 24"><path d="M8 2v4"/><path d="M16 2v4"/><path d="M3 10h18"/><rect x="3" y="4" width="18" height="18" rx="2"/></svg>';
        }
        return '<svg class="icon-stroke" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>';
    }

    function cardPreview(control) {
        if (control.type === 'text') {
            return '<div class="fake-control search">' + controlIcon(control.type) + '<span>' + control.placeholder + '</span></div>';
        }
        if (control.type === 'range' || control.type === 'dateRange') {
            return '<div class="fake-control range"><span>开始</span><b>-</b><span>结束</span></div>';
        }
        return '<div class="fake-control"><span>' + control.placeholder + '</span>' + controlIcon(control.type) + '</div>';
    }

    function renderControls() {
        const keyword = document.getElementById('keywordInput').value.trim();
        const rows = controls.filter(item => !keyword || item.name.includes(keyword) || item.param.includes(keyword) || typeNames[item.type].includes(keyword));
        document.getElementById('totalCount').textContent = rows.length;
        document.getElementById('controlGrid').innerHTML = [
            '<div class="control-card add-card" id="addControl"><div class="plus">+</div><div>新建查询控件</div></div>',
            ...rows.map(item => '<div class="control-card" data-id="' + item.id + '"><div class="control-preview">' + cardPreview(item) + '</div><div class="control-name">' + item.name + '</div></div>')
        ].join('');
    }

    function showToast(text) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'toast hidden';
            document.body.appendChild(toast);
        }
        toast.textContent = text;
        toast.classList.remove('hidden');
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => toast.classList.add('hidden'), 1800);
    }

    function openEdit(control) {
        activeControl = control || { id: 0, name: '新增查询控件', type: 'select', param: 'resource_type', dataset: '资源目录维表', placeholder: '请选择' };
        document.getElementById('controlName').value = activeControl.name;
        document.getElementById('controlType').value = activeControl.type;
        document.getElementById('controlParam').value = activeControl.param;
        document.getElementById('tipText').value = '';
        document.getElementById('tipCount').textContent = '0';
        document.getElementById('listView').classList.add('hidden');
        document.getElementById('editView').classList.remove('hidden');
        renderTypeConfig();
        renderPreview();
    }

    function closeEdit() {
        document.getElementById('editView').classList.add('hidden');
        document.getElementById('listView').classList.remove('hidden');
    }

    function selectOptions(value) {
        const options = ['行政区划维表', '资源目录维表', '流程状态维表', '供需类型维表', '会员等级维表'];
        return '<select class="qc-select">' + options.map(item => '<option' + (item === value ? ' selected' : '') + '>' + item + '</option>').join('') + '</select>';
    }

    function fieldSelect(value) {
        const fields = ['id', 'name', 'parent_id', 'status_code', 'catalog_name', 'area_code'];
        return '<select class="qc-select">' + fields.map(item => '<option' + (item === value ? ' selected' : '') + '>' + item + '</option>').join('') + '</select>';
    }

    function dataConfig(includeParent) {
        return [
            '<div class="form-row"><label class="form-label required">数据输入方式</label><div class="radio-line"><label><input type="radio" name="inputMode"> 维度数据</label><label><input type="radio" name="inputMode" checked> 动态数据</label><label><input type="radio" name="inputMode"> 手工录入</label></div></div>',
            '<div class="form-row"><label class="form-label required">数据集</label>' + selectOptions(activeControl.dataset) + '</div>',
            '<div class="form-row top"><label class="form-label">控件数据</label><table class="config-table"><thead><tr><th style="width:160px;">编码</th><th>数据集字段</th></tr></thead><tbody><tr><td>编码</td><td>' + fieldSelect('id') + '</td></tr><tr><td>名称</td><td>' + fieldSelect('name') + '</td></tr>' + (includeParent ? '<tr><td>父类编码</td><td>' + fieldSelect('parent_id') + '</td></tr>' : '') + '</tbody></table></div>'
        ].join('');
    }

    function cascadeLevelConfig() {
        return '<div class="form-row top"><label class="form-label required">级别和参数</label><table class="config-table"><thead><tr><th style="width:120px;">级别</th><th>名称</th><th>参数</th><th style="width:90px;">操作</th></tr></thead><tbody><tr><td>一级</td><td><input class="qc-input" placeholder="请输入名称"></td><td><input class="qc-input" placeholder="请输入参数"></td><td><span class="table-action">＋ <span class="danger">□</span></span></td></tr></tbody></table></div>';
    }

    function dateQuickConfig(isRange) {
        if (!isRange) {
            return '<div class="form-row"><label class="form-label required">时间格式</label><select class="qc-select"><option>YYYY-MM-DD</option><option>YYYY/MM/DD</option><option>YYYY-MM</option></select></div><div class="form-row"><label class="form-label">快捷方式设置</label><div class="muted-bar">新增</div></div>';
        }
        const rows = ['今日', '昨日', '本周', '上周', '本月', '上月', '今年', '去年'];
        return '<div class="form-row"><label class="form-label required">时间格式</label><select class="qc-select"><option>YYYY-MM-DD</option><option>YYYY/MM/DD</option><option>YYYY-MM</option></select></div><div class="form-row top"><label class="form-label">快捷方式选择</label><table class="config-table"><thead><tr><th style="width:160px;">名称</th><th>快捷选择</th><th>设为默认值</th></tr></thead><tbody>' + rows.map(item => '<tr><td>' + item + '</td><td><input type="checkbox"></td><td><input type="radio" name="dateDefault"></td></tr>').join('') + '</tbody></table></div><div class="form-row"><label class="form-label">快捷方式设置</label><div class="muted-bar">新增</div></div>';
    }

    function renderTypeConfig() {
        const type = document.getElementById('controlType').value;
        let html = '';
        if (type === 'select') {
            html = dataConfig(false);
        } else if (type === 'text') {
            html = '';
        } else if (type === 'cascade' || type === 'linkage') {
            html = cascadeLevelConfig() + dataConfig(true);
        } else if (type === 'range') {
            html = '';
        } else if (type === 'date') {
            html = dateQuickConfig(false);
        } else if (type === 'dateRange') {
            html = dateQuickConfig(true);
        }
        document.getElementById('typeConfig').innerHTML = html;
    }

    function renderPreview() {
        const name = document.getElementById('controlName').value || '查询控件';
        const type = document.getElementById('controlType').value;
        const showName = document.getElementById('showName').checked;
        document.getElementById('previewName').textContent = showName ? name : '';
        let html = '';
        if (type === 'text') {
            html = '<input class="qc-input preview-control" placeholder="">';
        } else if (type === 'range') {
            html = '<div class="preview-control range-preview"><input class="qc-input"><span>-</span><input class="qc-input"></div>';
        } else if (type === 'date') {
            html = '<div class="preview-control narrow fake-control"><span>' + previewValues.date + '</span>' + controlIcon('date') + '</div>';
        } else if (type === 'dateRange') {
            html = '<div class="preview-control fake-control" style="width:290px;"><span>开始日期　→　结束日期</span>' + controlIcon('date') + '</div>';
        } else if (type === 'cascade') {
            html = '<span class="inline-colon">:</span><div class="preview-control narrow fake-control" style="display:inline-flex;"><span>请选择</span>' + controlIcon(type) + '</div>';
        } else {
            html = '<div class="preview-control fake-control"><span>' + (previewValues[type] || '请选择') + '</span>' + controlIcon(type) + '</div>';
        }
        document.getElementById('previewArea').innerHTML = html;
    }

    renderControls();

    document.getElementById('btnQuery').addEventListener('click', renderControls);
    document.getElementById('keywordInput').addEventListener('input', renderControls);
    document.getElementById('btnReset').addEventListener('click', () => {
        document.getElementById('keywordInput').value = '';
        renderControls();
    });

    document.getElementById('controlGrid').addEventListener('click', event => {
        const add = event.target.closest('#addControl');
        if (add) {
            openEdit(null);
            return;
        }
        const card = event.target.closest('[data-id]');
        if (!card) return;
        const control = controls.find(item => item.id === Number(card.dataset.id));
        openEdit(control);
    });

    document.getElementById('controlType').addEventListener('change', () => {
        renderTypeConfig();
        renderPreview();
    });
    document.getElementById('controlName').addEventListener('input', renderPreview);
    document.getElementById('showName').addEventListener('change', renderPreview);
    document.getElementById('tipText').addEventListener('input', event => {
        document.getElementById('tipCount').textContent = event.target.value.length;
    });
    document.getElementById('btnCancel').addEventListener('click', closeEdit);
    document.getElementById('btnSave').addEventListener('click', () => {
        showToast('已保存查询控件');
        closeEdit();
    });
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.view-btn').forEach(item => item.classList.remove('active'));
            btn.classList.add('active');
        });
    });
    </script>
</body>
</html>
