<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据集 - 仪表盘定制 - 龙岗数据聚合服务平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/admin-common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
.maintenance-content {
            height: calc(100vh - 64px);
            padding: 0;
            overflow: hidden;
            background: #f0f2f5;
        }

        .ds-page {
            height: 100%;
            min-width: 0;
        }

        .hidden {
            display: none !important;
        }

        .icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .icon-stroke {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .ds-btn {
            height: 32px;
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #303133;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .ds-btn:hover {
            color: var(--forest-green);
            border-color: var(--forest-green-200);
            background: var(--forest-green-50);
        }

        .ds-btn.primary {
            color: #fff;
            background: var(--forest-green);
            border-color: var(--forest-green);
            box-shadow: var(--shadow-green-glow);
        }

        .ds-btn.primary:hover {
            color: #fff;
            background: var(--forest-green-600);
            border-color: var(--forest-green-600);
        }

        .ds-btn.warn {
            color: #f56c6c;
        }

        .ds-input,
        .ds-select {
            height: 32px;
            padding: 0 10px;
            color: #303133;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .ds-input:focus,
        .ds-select:focus {
            border-color: var(--forest-green);
            box-shadow: 0 0 0 3px rgba(32, 165, 101, 0.12);
        }

        .list-view {
            height: 100%;
            display: grid;
            grid-template-columns: 252px 1fr;
            gap: 10px;
        }

        .catalog-panel {
            min-width: 0;
            background: #fff;
            border-right: 1px solid #e4e7ed;
            display: flex;
            flex-direction: column;
        }

        .catalog-head {
            height: 44px;
            padding: 0 14px 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e4e7ed;
        }

        .catalog-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #303133;
            font-size: 15px;
            font-weight: 700;
        }

        .catalog-add {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            background: var(--forest-green);
            border: 0;
            border-radius: 3px;
            cursor: pointer;
        }

        .catalog-search {
            padding: 14px 18px 8px;
        }

        .catalog-search .ds-input {
            width: 100%;
        }

        .catalog-tree {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 4px 16px 18px;
        }

        .catalog-row {
            height: 28px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #303133;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .catalog-row:hover {
            color: var(--forest-green);
            background: #f5f7fa;
        }

        .catalog-row.active {
            color: var(--forest-green);
            background: var(--forest-green-50);
            font-weight: 600;
        }

        .catalog-row.child {
            padding-left: 28px;
        }

        .catalog-row .folder {
            color: var(--accent-orange);
        }

        .list-main {
            min-width: 0;
            display: flex;
            flex-direction: column;
            padding: 14px 14px 0 6px;
            overflow: hidden;
        }

        .list-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar-icons {
            height: 36px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            color: #606266;
            border-bottom: 1px solid #ebeef5;
        }

        .toolbar-icon-btn {
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 0;
            color: inherit;
            cursor: pointer;
        }

        .dataset-card {
            flex: 1;
            min-height: 0;
            background: #fff;
            border: 1px solid #ebeef5;
            display: flex;
            flex-direction: column;
        }

        .dataset-table-wrap {
            min-height: 0;
            overflow: auto;
        }

        .dataset-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 13px;
        }

        .dataset-table th,
        .dataset-table td {
            height: 36px;
            padding: 0 16px;
            color: #303133;
            border-right: 1px solid #ebeef5;
            border-bottom: 1px solid #ebeef5;
            text-align: left;
            vertical-align: middle;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dataset-table th {
            height: 52px;
            background: #fafafa;
            color: #303133;
            font-weight: 700;
        }

        .dataset-table tr:hover td {
            background: #f9fbfa;
        }

        .dataset-table .check-col {
            width: 50px;
            text-align: center;
            padding: 0;
        }

        .dataset-table input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--forest-green);
        }

        .dataset-table .name-col {
            font-weight: 700;
        }

        .link-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            color: var(--forest-green);
            border-radius: 3px;
            cursor: pointer;
        }

        .link-action:hover {
            background: var(--forest-green-50);
        }

        .link-action.delete {
            color: #f56c6c;
        }

        .pager {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            padding: 0 16px;
            color: #303133;
            font-size: 13px;
        }

        .page-btn {
            min-width: 26px;
            height: 26px;
            padding: 0 8px;
            border: 1px solid #dcdfe6;
            background: #fff;
            border-radius: 3px;
            color: #606266;
            font-family: inherit;
            cursor: pointer;
        }

        .page-btn.active {
            color: #fff;
            background: var(--forest-green);
            border-color: var(--forest-green);
        }

        .page-jump {
            width: 44px;
            height: 26px;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
        }

        .edit-view {
            height: 100%;
            display: grid;
            grid-template-columns: 252px 1fr;
            gap: 10px;
        }

        .table-panel {
            position: relative;
            min-width: 0;
            background: #fff;
            border-right: 1px solid #e4e7ed;
            display: flex;
            flex-direction: column;
        }

        .table-panel-head {
            height: 50px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e4e7ed;
        }

        .table-panel-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 700;
            color: #303133;
        }

        .source-menu-pop {
            position: absolute;
            left: 8px;
            right: 8px;
            top: 56px;
            z-index: 90;
            padding: 10px;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
        }

        .source-menu-search {
            position: relative;
            margin-bottom: 10px;
        }

        .source-menu-search .ds-input {
            width: 100%;
            padding-left: 32px;
        }

        .source-menu-search .icon-stroke {
            position: absolute;
            left: 10px;
            top: 8px;
            color: #909399;
            pointer-events: none;
        }

        .source-tree {
            max-height: 380px;
            overflow: auto;
            padding: 2px 0;
        }

        .source-tree-node {
            margin-bottom: 2px;
        }

        .source-tree-row {
            height: 30px;
            width: 100%;
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #303133;
            background: transparent;
            border: 0;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            text-align: left;
            cursor: pointer;
        }

        .source-tree-row:hover {
            color: var(--forest-green);
            background: #f5f7fa;
        }

        .source-tree-row.active {
            color: var(--forest-green);
            background: var(--forest-green-50);
            font-weight: 700;
        }

        .source-tree-row .toggle {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #909399;
            transition: transform 0.15s;
        }

        .source-tree-row.collapsed .toggle {
            transform: rotate(-90deg);
        }

        .source-tree-row.leaf .toggle {
            visibility: hidden;
        }

        .source-tree-icon {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #8aa1b6;
            flex: 0 0 auto;
        }

        .source-tree-row.active .source-tree-icon,
        .source-tree-row:hover .source-tree-icon {
            color: var(--forest-green);
        }

        .source-tree-icon svg {
            width: 15px;
            height: 15px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .source-tree-label {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .source-tree-meta {
            min-width: 22px;
            padding: 1px 7px;
            color: #909399;
            background: #f2f3f5;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
        }

        .source-tree-row.active .source-tree-meta {
            color: var(--forest-green);
            background: rgba(32, 165, 101, 0.12);
        }

        .source-tree-children {
            padding-left: 18px;
        }

        .source-tree-node.collapsed > .source-tree-children {
            display: none;
        }

        .source-tree-empty,
        .schema-empty {
            padding: 18px 8px;
            color: #909399;
            font-size: 13px;
            text-align: center;
        }

        .table-list {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 8px 14px 18px;
        }

        .schema-node {
            margin-bottom: 2px;
        }

        .schema-row {
            width: 100%;
            min-height: 30px;
            padding: 0 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #303133;
            background: transparent;
            border: 0;
            border-radius: 3px;
            font-size: 13px;
            font-family: inherit;
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
        }

        .schema-row:hover,
        .schema-row.active {
            color: var(--forest-green);
            background: var(--forest-green-50);
        }

        .schema-table-toggle {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #909399;
            flex: 0 0 auto;
            transition: transform 0.15s;
        }

        .schema-node.collapsed .schema-table-toggle {
            transform: rotate(-90deg);
        }

        .schema-table-icon,
        .schema-field-icon {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .schema-table-icon {
            width: 16px;
            height: 16px;
            color: #5b8def;
        }

        .schema-table-icon svg {
            width: 15px;
            height: 15px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
        }

        .schema-field-icon {
            width: 16px;
            height: 16px;
            color: #fff;
            background: #72c4b8;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            transform: scale(0.82);
        }

        .schema-label {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .schema-field-row {
            padding-left: 40px;
            color: #303133;
        }

        .schema-fields {
            padding: 2px 0 4px;
        }

        .schema-node.collapsed .schema-fields {
            display: none;
        }

        .edit-main {
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: #f0f2f5;
            overflow: hidden;
        }

        .edit-head {
            height: 52px;
            padding: 0 14px 0 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e4e7ed;
        }

        .edit-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #303133;
            font-size: 15px;
            font-weight: 700;
        }

        .edit-title-input {
            width: 260px;
            height: 30px;
            padding: 0 8px;
            color: #303133;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
            outline: none;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
        }

        .edit-title-input:focus {
            border-color: var(--forest-green);
            box-shadow: 0 0 0 2px rgba(32, 165, 101, 0.12);
        }

        .title-edit-btn {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #606266;
            background: transparent;
            border: 0;
            border-radius: 3px;
            cursor: pointer;
        }

        .title-edit-btn:hover {
            color: var(--forest-green);
            background: var(--forest-green-50);
        }

        .title-edit-btn .icon-stroke {
            width: 15px;
            height: 15px;
        }

        .editor-area {
            display: grid;
            grid-template-columns: minmax(460px, 42%) minmax(360px, 1fr);
            gap: 12px;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #e4e7ed;
        }

        .sql-card {
            min-width: 0;
            background: #082f4d;
            border: 1px solid #dcdfe6;
            overflow: hidden;
        }

        .sql-editor {
            height: 345px;
            display: grid;
            grid-template-columns: 46px 1fr;
            background: #062b47;
            color: #c8f2ff;
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
            line-height: 22px;
        }

        .line-nums {
            padding: 10px 10px 10px 0;
            color: #a5c4d5;
            background: #05263f;
            text-align: right;
            user-select: none;
            border-right: 1px solid rgba(255, 255, 255, 0.24);
            overflow: hidden;
        }

        .sql-code-wrap {
            position: relative;
            min-width: 0;
            height: 100%;
            background: #062b47;
            overflow: hidden;
        }

        .sql-highlight,
        .sql-text {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 10px 12px;
            border: 0;
            font-family: inherit;
            font-size: 13px;
            line-height: 22px;
            white-space: pre;
            tab-size: 4;
            overflow: auto;
        }

        .sql-highlight {
            color: #c8f2ff;
            background: #062b47;
            pointer-events: none;
            overflow: hidden;
        }

        .sql-highlight code {
            display: block;
            min-width: 100%;
        }

        .sql-text {
            color: transparent;
            caret-color: #ffffff;
            background: transparent;
            resize: none;
            outline: none;
        }

        .sql-text::selection {
            background: rgba(125, 211, 252, 0.24);
        }

        .sql-keyword {
            color: #7dd3fc;
            font-weight: 700;
        }

        .sql-function {
            color: #fde68a;
            font-weight: 700;
        }

        .sql-string {
            color: #86efac;
        }

        .sql-number {
            color: #fca5a5;
        }

        .sql-param {
            color: #fbbf24;
            font-weight: 700;
        }

        .sql-comment {
            color: #8ea8bc;
            font-style: italic;
        }

        .sql-operator {
            color: #fda4af;
        }

        .sql-actions {
            height: 46px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            background: #0b2944;
        }

        .sql-run {
            color: #fff;
            background: var(--accent-orange);
            border-color: var(--accent-orange);
        }

        .param-card {
            min-width: 0;
            display: flex;
            flex-direction: column;
            border: 1px solid #ebeef5;
            background: #fff;
        }

        .param-title {
            height: 40px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #303133;
            font-size: 13px;
            font-weight: 700;
            border-bottom: 1px solid #ebeef5;
        }

        .param-table-wrap {
            flex: 1;
            min-height: 0;
            overflow: visible;
        }

        .param-table,
        .preview-table,
        .field-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 13px;
        }

        .param-table th,
        .param-table td,
        .preview-table th,
        .preview-table td,
        .field-table th,
        .field-table td {
            height: 38px;
            padding: 0 12px;
            border-right: 1px solid #ebeef5;
            border-bottom: 1px solid #ebeef5;
            text-align: left;
            color: #303133;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .param-table th,
        .preview-table th,
        .field-table th {
            height: 40px;
            background: #fafafa;
            font-weight: 700;
        }

        .param-table th.param-name-col {
            width: 260px;
        }

        .param-table th.param-action-col {
            width: 90px;
        }

        .field-table {
            min-width: 920px;
        }

        .field-table th.field-name-col {
            width: 168px;
        }

        .field-table th.field-alias-col {
            width: 250px;
        }

        .field-table th.field-type-col {
            width: 250px;
        }

        .field-table th.field-attr-col {
            width: auto;
        }

        .field-table td {
            height: 39px;
            background: #fff;
        }

        .field-table td.field-attr-cell {
            overflow: visible;
        }

        .field-table td.field-alias-cell {
            padding-top: 3px;
            padding-bottom: 3px;
        }

        .field-alias-input {
            width: 100%;
            height: 28px;
            min-width: 0;
        }

        .param-name-cell {
            overflow: visible !important;
        }

        .param-cell-editor {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .param-select-wrap {
            position: relative;
            flex: 1 1 auto;
            min-width: 0;
        }

        .param-name-trigger {
            width: 100%;
            height: 28px;
            padding: 0 28px 0 10px;
            display: flex;
            align-items: center;
            color: #303133;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
            font-size: 13px;
            font-family: inherit;
            text-align: left;
            cursor: pointer;
            position: relative;
        }

        .param-name-trigger.placeholder {
            color: #c0c4cc;
        }

        .param-name-trigger::after {
            content: "";
            position: absolute;
            right: 10px;
            top: 50%;
            width: 7px;
            height: 7px;
            border-right: 1px solid #a8abb2;
            border-bottom: 1px solid #a8abb2;
            transform: translateY(-65%) rotate(45deg);
        }

        .param-select-wrap.open .param-name-trigger {
            border-color: var(--forest-green);
            box-shadow: 0 0 0 2px rgba(32, 165, 101, 0.14);
        }

        .param-name-text {
            display: block;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .param-copy-btn {
            width: 24px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--forest-green);
            background: transparent;
            border: 0;
            border-radius: 3px;
            cursor: pointer;
            flex: 0 0 auto;
        }

        return !keyword

            || source.name.toLowerCase().includes(keyword)
            || source.type.toLowerCase().includes(keyword);
    }

            const sources = domain.sources.filter(source => sourceMatchesKeyword(domain, source, keyword));

            const collapsed = !keyword && collapsedSourceDomains.has(domain.id);
            const sourceHtml = sources.map(source => {
                const active = source.id === activeSourceId ? ' active' : '';
                return '<div class="source-tree-node" data-source-id="' + source.id + '">'
                    + '<button class="source-tree-row leaf' + active + '" type="button" data-source-id="' + source.id + '">'

                    + '<span class="source-tree-icon">' + sourceTreeIcons.source + '</span>'
                    + '<span class="source-tree-label" title="' + escapeHtml(source.name) + '">' + escapeHtml(source.name) + '</span>'

                    + '</button>'
                    + '</div>';
            }).join('');
            return '<div class="source-tree-node' + (collapsed ? ' collapsed' : '') + '" data-domain-id="' + domain.id + '">'

        }).join('');

            tableList.innerHTML = '<div class="schema-empty">请先选择数据源</div>';
            return;

        const tables = found.source.tables.filter(table => tableMatchesKeyword(table, keyword));
        if (!tables.length) {
            tableList.innerHTML = '<div class="schema-empty">没有匹配的表或字段</div>';
            return;
        }
        tableList.innerHTML = tables.map((table, index) => {
            const expanded = keyword || expandedSchemaTables.has(table.name) || (!expandedSchemaTables.size && index === 0);

                .filter(field => !keyword || table.name.toLowerCase().includes(keyword) || field.toLowerCase().includes(keyword))

    function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, ch => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[ch]));
    }

    function splitTopLevelCommas(value) {
        const parts = [];
        let buffer = '';
        let depth = 0;
        let quote = '';

        for (let i = 0; i < value.length; i++) {
            const ch = value[i];
            if (quote) {
                buffer += ch;
                if (ch === quote) {
                    if (value[i + 1] === quote) {
                        buffer += value[i + 1];
                        i++;
                    } else {
                        quote = '';
                    }
                }
                continue;
            }
            if (ch === '\'' || ch === '"') {
                quote = ch;
                buffer += ch;
                continue;
            }
            if (ch === '(') depth++;
            if (ch === ')' && depth > 0) depth--;
            if (ch === ',' && depth === 0) {
                parts.push(buffer.trim());
                buffer = '';
                continue;
            }
            buffer += ch;
        }

        if (buffer.trim()) parts.push(buffer.trim());
        return parts;
    }

    function upperSqlKeywords(value) {
        return value.replace(/\b(union\s+all|group\s+by|order\s+by|left\s+join|right\s+join|inner\s+join|full\s+join|select|from|where|having|limit|join|on|and|or|as|sum|count|avg|min|max|distinct|case|when|then|else|end|between|in|is|null|not|like)\b/gi, match => {
            return match.replace(/\s+/g, ' ').toUpperCase();
        });
    }

    function formatSql(sql) {
        let text = String(sql || '')
            .replace(/\r\n?/g, '\n')
            .replace(/\n+/g, ' ')
            .replace(/[ \t]+/g, ' ')
            .trim();

        if (!text) return '';

        text = text
            .replace(/\s*,\s*/g, ', ')
            .replace(/\s*(>=|<=|<>|!=|=|>|<)\s*/g, ' $1 ')
            .replace(/\s+/g, ' ')
            .replace(/\s+(union\s+all|union)\s+/gi, '\n$1\n')
            .replace(/\s+(from|where|having|limit)\s+/gi, '\n$1 ')
            .replace(/\s+(group\s+by|order\s+by)\s+/gi, '\n$1 ')
            .replace(/\s+(left\s+join|right\s+join|inner\s+join|full\s+join|join)\s+/gi, '\n$1 ')
            .replace(/\s+(on)\s+/gi, '\n  $1 ')
            .replace(/\s+(and|or)\s+/gi, '\n  $1 ');

        const lines = text.split('\n').map(line => line.trim()).filter(Boolean);
        const formatted = [];

        lines.forEach(line => {
            const selectMatch = line.match(/^select\b\s*(.*)$/i);
            if (selectMatch) {
                formatted.push('SELECT');
                const fields = splitTopLevelCommas(selectMatch[1] || '');
                fields.forEach((field, index) => {
                    formatted.push('    ' + upperSqlKeywords(field) + (index < fields.length - 1 ? ',' : ''));
                });
                return;
            }

            const indent = /^(and|or|on)\b/i.test(line) ? '  ' : '';
            formatted.push(indent + upperSqlKeywords(line));
        });

        return formatted.join('\n');
    }

    function wrapSqlToken(className, value) {
        return '<span class="' + className + '">' + escapeHtml(value) + '</span>';
    }

    function highlightSql(sql) {
        const keywords = new Set('SELECT FROM WHERE AND OR GROUP BY ORDER HAVING LIMIT JOIN LEFT RIGHT INNER FULL OUTER ON AS UNION ALL CASE WHEN THEN ELSE END DISTINCT BETWEEN IN IS NULL NOT LIKE ASC DESC'.split(' '));
        const functions = new Set('SUM COUNT AVG MIN MAX ROUND DATE_FORMAT CAST COALESCE NVL'.split(' '));
        let html = '';
        let i = 0;
        const source = String(sql || '');

        while (i < source.length) {
            const ch = source[i];
            const next = source[i + 1];

            if (ch === '-' && next === '-') {
                const end = source.indexOf('\n', i);
                const token = end === -1 ? source.slice(i) : source.slice(i, end);
                html += wrapSqlToken('sql-comment', token);
                i += token.length;
                continue;
            }

            if (ch === '\'' || ch === '"') {
                const quote = ch;
                let j = i + 1;
                while (j < source.length) {
                    if (source[j] === quote) {
                        if (source[j + 1] === quote) {
                            j += 2;
                            continue;
                        }
                        j++;
                        break;
                    }
                    j++;
                }
                html += wrapSqlToken('sql-string', source.slice(i, j));
                i = j;
                continue;
            }

            if (ch === '$' && next === '{') {
                const end = source.indexOf('}', i + 2);
                const token = end === -1 ? source.slice(i) : source.slice(i, end + 1);
                html += wrapSqlToken('sql-param', token);
                i += token.length;
                continue;
            }

            if (/[0-9]/.test(ch)) {
                const match = source.slice(i).match(/^\d+(?:\.\d+)?/);
                html += wrapSqlToken('sql-number', match[0]);
                i += match[0].length;
                continue;
            }

            if (/[A-Za-z_]/.test(ch)) {
                const match = source.slice(i).match(/^[A-Za-z_][A-Za-z0-9_]*/);
                const token = match[0];
                const upper = token.toUpperCase();
                if (keywords.has(upper)) {
                    html += wrapSqlToken('sql-keyword', token);
                } else if (functions.has(upper)) {
                    html += wrapSqlToken('sql-function', token);
                } else {
                    html += escapeHtml(token);
                }
                i += token.length;
                continue;
            }

            if (/[<>!=+\-*\/%]/.test(ch)) {
                html += wrapSqlToken('sql-operator', ch);
                i++;
                continue;
            }

            html += escapeHtml(ch);
            i++;
        }

        return html || '&nbsp;';
    }

        const start = typeof sqlText.selectionStart === 'number' ? sqlText.selectionStart : sqlText.value.length;
        const end = typeof sqlText.selectionEnd === 'number' ? sqlText.selectionEnd : start;
        sqlText.focus();
        if (typeof sqlText.setRangeText === 'function') {
            sqlText.setRangeText(token, start, end, 'end');
        } else {
            sqlText.value = sqlText.value.slice(0, start) + token + sqlText.value.slice(end);
            sqlText.selectionStart = sqlText.selectionEnd = start + token.length;

    });

    document.addEventListener('click', event => {
        if (openParamPicker === null || event.target.closest('.param-cell-editor')) return;
        openParamPicker = null;
        renderParams();
    });

    document.getElementById('fieldBody').addEventListener('click', event => {
        const valueOption = event.target.closest('[data-field-value-option]');
        if (valueOption) {
            const row = fieldRows[Number(valueOption.dataset.index)];
            if (row) row.attr.value = valueOption.dataset.value;
            openFieldPicker = null;
            renderFields();
            return;
        }

        const kindOption = event.target.closest('[data-field-kind-option]');
        if (kindOption) {
            const row = fieldRows[Number(kindOption.dataset.index)];
            if (row) {
                row.attr.kind = kindOption.dataset.value;
                row.attr.value = defaultFieldAttrValue(row.attr.kind);
            }
            openFieldPicker = null;
            renderFields();
            return;
        }

        const trigger = event.target.closest('[data-field-trigger]');
        if (trigger) {
            const index = Number(trigger.dataset.index);
            const role = trigger.dataset.role;
            const isSame = openFieldPicker && openFieldPicker.index === index && openFieldPicker.role === role;
            openFieldPicker = isSame ? null : { index, role };
            renderFields();
        }
    });

    document.getElementById('fieldBody').addEventListener('input', event => {
        const aliasInput = event.target.closest('[data-field-alias]');
        if (aliasInput) {
            const row = fieldRows[Number(aliasInput.dataset.fieldAlias)];
            if (row) row.alias = aliasInput.value;
            return;
        }

        const searchInput = event.target.closest('.field-menu-search-input');
        if (searchInput) {
            const keyword = searchInput.value.trim().toLowerCase();
            const menu = searchInput.closest('.field-select-menu');
            menu.querySelectorAll('[data-filter-text]').forEach(option => {
                option.classList.toggle('hidden', keyword && !option.dataset.filterText.includes(keyword));
            });
        }
    });

    document.addEventListener('click', event => {
        if (!openFieldPicker || event.target.closest('.field-select-wrap')) return;
        openFieldPicker = null;
        renderFields();
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(item => item.classList.remove('active'));
            tab.classList.add('active');
            const isPreview = tab.dataset.tab === 'preview';
            document.getElementById('previewPanel').classList.toggle('hidden', !isPreview);
            document.getElementById('fieldsPanel').classList.toggle('hidden', isPreview);
            document.getElementById('resultSummary').classList.toggle('hidden', !isPreview);
        });
    });
    </script>
</body>
</html>
