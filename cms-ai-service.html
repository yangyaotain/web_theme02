<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客服管理 - 运营中心 - 龙岗数据聚合服务平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/admin-common.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="js/global-dialog.js"></script>
    <style>
    .ai-service-page {
        height: calc(100vh - 64px); display: flex; flex-direction: column;
        background: #f5f7fa; overflow: hidden;
    }
    .ai-tabs {
        display: flex; align-items: flex-end; gap: 4px; height: 52px;
        padding: 0 20px; background: #fff; border-bottom: 1px solid #e4e7ed;
        flex-shrink: 0;
    }
    .ai-tab {
        height: 38px; padding: 0 18px; border: none; border-bottom: 3px solid transparent;
        background: transparent; color: #606266; font-size: 14px; font-weight: 600;
        cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: .15s;
    }
    .ai-tab svg { width: 16px; height: 16px; }
    .ai-tab:hover { color: var(--forest-green); background: #f5f7fa; }
    .ai-tab.active { color: var(--forest-green); border-bottom-color: var(--forest-green); background: #f0fdf4; }
    .ai-tab-panel { display: none; flex: 1; min-height: 0; overflow: hidden; }
    .ai-tab-panel.active { display: flex; }

    .kb-layout {
        display: flex; height: 100%; width: 100%; overflow: hidden;
    }
    .kb-tree {
        width: 240px; flex-shrink: 0; background: #fff; border-right: 1px solid #e4e7ed;
        display: flex; flex-direction: column; overflow: hidden;
    }
    .kb-tree-header {
        padding: 14px 14px 10px; border-bottom: 1px solid #f0f2f5;
        font-size: 14px; font-weight: 700; color: #303133;
        display: flex; align-items: center; gap: 8px;
    }
    .kb-tree-header svg { width: 18px; height: 18px; color: var(--forest-green); }
    .kb-tree-search {
        margin: 10px 12px 6px; padding: 6px 10px; font-size: 12px;
        border: 1px solid #dcdfe6; border-radius: 4px; width: calc(100% - 24px);
        box-sizing: border-box;
    }
    .kb-tree-search:focus { outline: none; border-color: var(--forest-green); }
    .kb-tree-body { flex: 1; overflow-y: auto; padding: 4px 0 12px; }

    .kb-node { user-select: none; }
    .kb-node-label {
        display: flex; align-items: center; gap: 5px;
        padding: 6px 12px 6px 12px; font-size: 13px; color: #303133;
        cursor: pointer; border-radius: 4px; margin: 0 6px; transition: .1s;
    }
    .kb-node-label:hover { background: #f5f7fa; color: var(--forest-green); }
    .kb-node-label.active { background: #e8f5e9; color: var(--forest-green); font-weight: 600; }
    .kb-node-label .kb-arrow {
        width: 12px; height: 12px; color: #909399; flex-shrink: 0; transition: transform .15s;
    }
    .kb-node-label .kb-arrow.open { transform: rotate(90deg); }
    .kb-node-label .kb-arrow.hidden { visibility: hidden; }
    .kb-node-label .kb-folder {
        width: 16px; height: 16px; color: #e6a23c; flex-shrink: 0;
    }
    .kb-node-label .kb-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .kb-node-children { padding-left: 16px; }
    .kb-node-children.collapsed { display: none; }

    /* 右键菜单 */
    .kb-ctx-menu {
        display: none; position: fixed; z-index: 9999;
        background: #fff; border: 1px solid #e4e7ed; border-radius: 6px;
        box-shadow: 0 4px 16px rgba(0,0,0,.12); padding: 4px 0; min-width: 120px;
    }
    .kb-ctx-menu.show { display: block; }
    .kb-ctx-item {
        padding: 7px 16px; font-size: 13px; color: #303133; cursor: pointer; transition: .1s;
    }
    .kb-ctx-item:hover { background: #f5f7fa; color: var(--forest-green); }
    .kb-ctx-item.danger { color: #f56c6c; }
    .kb-ctx-item.danger:hover { background: #fef0f0; }

    /* 右侧内容 */
    .kb-content {
        flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden;
        background: #f5f7fa;
    }
    .kb-toolbar {
        display: flex; align-items: center; gap: 10px;
        padding: 14px 20px; background: #fff; border-bottom: 1px solid #e4e7ed;
    }
    .kb-btn {
        padding: 6px 18px; font-size: 13px; border-radius: 4px; cursor: pointer;
        border: 1px solid #dcdfe6; background: #fff; color: #606266; transition: .15s;
    }
    .kb-btn:hover { color: var(--forest-green); border-color: var(--forest-green); }
    .kb-btn.primary { background: var(--forest-green); color: #fff; border-color: var(--forest-green); }
    .kb-btn.primary:hover { opacity: .88; }
    .kb-btn.danger { background: #f56c6c; color: #fff; border-color: #f56c6c; }
    .kb-btn.danger:hover { background: #f78989; border-color: #f78989; }
    .kb-btn svg { width: 14px; height: 14px; margin-right: 5px; vertical-align: -2px; }
    .kb-toolbar-sep { width: 1px; height: 22px; background: #e4e7ed; }
    .kb-toolbar-right {
        margin-left: auto; display: flex; align-items: center; gap: 8px;
    }
    .kb-filter-label { font-size: 13px; color: #606266; white-space: nowrap; }
    .kb-filter-input {
        padding: 5px 10px; font-size: 13px; border: 1px solid #dcdfe6; border-radius: 4px;
        width: 200px; outline: none;
    }
    .kb-filter-input:focus { border-color: var(--forest-green); }

    /* 表格 */
    .kb-table-wrap { flex: 1; overflow: auto; padding: 16px 20px; }
    .kb-table {
        width: 100%; border-collapse: collapse; background: #fff;
        border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .kb-table thead th {
        padding: 10px 14px; text-align: left; font-size: 13px; font-weight: 600;
        color: #303133; background: #f5f7fa; border-bottom: 1px solid #e4e7ed;
        white-space: nowrap;
    }
    .kb-table tbody td {
        padding: 9px 14px; font-size: 13px; color: #606266; border-bottom: 1px solid #f0f2f5;
    }
    .kb-table tbody tr:hover { background: #fafafa; }
    .kb-table .col-ck { width: 40px; text-align: center; }
    .kb-table .col-op { width: 100px; }
    .kb-table .col-op a {
        color: var(--forest-green); cursor: pointer; margin-right: 10px; font-size: 13px;
    }
    .kb-table .col-op a:hover { text-decoration: underline; }
    .kb-table .col-op a.op-danger { color: #f56c6c; }
    .kb-table .col-op a.op-danger:hover { color: #f56c6c; }
    .kb-file-icon {
        display: inline-flex; align-items: center; gap: 6px;
    }
    .kb-file-icon svg { width: 16px; height: 16px; color: #409eff; flex-shrink: 0; }

    /* 分页 */
    .kb-pagination {
        display: flex; align-items: center; gap: 6px;
        padding: 12px 20px; font-size: 12px; color: #909399; background: #fff;
        border-top: 1px solid #e4e7ed;
    }
    .kb-page-btn {
        padding: 3px 8px; border: 1px solid #dcdfe6; background: #fff; border-radius: 3px;
        font-size: 12px; cursor: pointer; color: #606266;
    }
    .kb-page-btn:hover { color: var(--forest-green); border-color: var(--forest-green); }
    .kb-page-btn.active { background: var(--forest-green); color: #fff; border-color: var(--forest-green); }

    /* 上传弹窗 */
    .kb-upload-mask {
        display: none; position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,.45); justify-content: center; align-items: center;
    }
    .kb-upload-mask.show { display: flex; }
    .kb-upload-box {
        width: 480px; background: #fff; border-radius: 8px;
        box-shadow: 0 12px 40px rgba(0,0,0,.18); padding: 0;
    }
    .kb-upload-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 24px; border-bottom: 1px solid #f0f2f5;
    }
    .kb-upload-title { font-size: 16px; font-weight: 700; color: #303133; }
    .kb-upload-close {
        width: 28px; height: 28px; border: none; background: none; cursor: pointer;
        color: #909399; display: flex; align-items: center; justify-content: center; border-radius: 4px;
    }
    .kb-upload-close:hover { color: #303133; background: #f5f7fa; }
    .kb-upload-close svg { width: 18px; height: 18px; stroke-width: 2; }
    .kb-upload-body { padding: 24px; }
    .kb-upload-hint {
        display: flex; align-items: flex-start; gap: 8px;
        font-size: 13px; color: #606266; margin-bottom: 6px;
    }
    .kb-upload-hint svg { width: 16px; height: 16px; color: #409eff; flex-shrink: 0; margin-top: 1px; }
    .kb-upload-hint-text { line-height: 1.6; }
    .kb-upload-row {
        display: flex; align-items: center; gap: 12px; margin-top: 20px;
    }
    .kb-upload-label { font-size: 13px; color: #303133; white-space: nowrap; font-weight: 500; }
    .kb-upload-file-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
    .kb-upload-file-btn {
        padding: 5px 14px; font-size: 13px; border: 1px solid #dcdfe6; border-radius: 4px;
        background: #fff; color: #606266; cursor: pointer; white-space: nowrap;
    }
    .kb-upload-file-btn:hover { border-color: var(--forest-green); color: var(--forest-green); }
    .kb-upload-file-name { font-size: 12px; color: #909399; }
    .kb-upload-progress {
        margin-top: 14px; height: 6px; background: #f0f2f5; border-radius: 3px; overflow: hidden;
    }
    .kb-upload-progress-bar {
        height: 100%; width: 15%; background: var(--forest-green); border-radius: 3px; transition: width .3s;
    }
    .kb-upload-status {
        margin-top: 10px; font-size: 13px;
    }
    .kb-upload-status .suc { color: var(--forest-green); font-weight: 600; }
    .kb-upload-status .fail { color: #f56c6c; font-weight: 600; }
    .kb-upload-footer {
        display: flex; justify-content: center; gap: 12px; padding: 0 24px 24px;
    }
    .kb-upload-footer .kb-btn { min-width: 80px; text-align: center; }

    /* 编辑弹窗 */
    .kb-edit-mask {
        display: none; position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,.45); justify-content: center; align-items: center;
    }
    .kb-edit-mask.show { display: flex; }
    .kb-edit-box {
        width: 400px; background: #fff; border-radius: 8px;
        box-shadow: 0 12px 40px rgba(0,0,0,.18);
    }
    .kb-edit-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 24px; border-bottom: 1px solid #f0f2f5;
    }
    .kb-edit-title { font-size: 16px; font-weight: 700; color: #303133; }
    .kb-edit-close {
        width: 28px; height: 28px; border: none; background: none; cursor: pointer;
        color: #909399; display: flex; align-items: center; justify-content: center; border-radius: 4px;
    }
    .kb-edit-close:hover { color: #303133; background: #f5f7fa; }
    .kb-edit-close svg { width: 18px; height: 18px; stroke-width: 2; }
    .kb-edit-body { padding: 24px; }
    .kb-edit-row { display: flex; align-items: center; gap: 12px; }
    .kb-edit-label { font-size: 13px; color: #303133; white-space: nowrap; font-weight: 500; }
    .kb-edit-input {
        flex: 1; padding: 7px 10px; font-size: 13px; border: 1px solid #dcdfe6;
        border-radius: 4px; outline: none;
    }
    .kb-edit-input:focus { border-color: var(--forest-green); }
    .kb-edit-footer {
        display: flex; justify-content: flex-end; gap: 10px; padding: 0 24px 20px;
    }

    /* 常见问题管理 */
    .faq-layout {
        display: flex; width: 100%; height: 100%; min-height: 0; overflow: hidden;
        background: #f5f7fa;
    }
    .faq-list-panel {
        width: 360px; flex-shrink: 0; background: #fff; border-right: 1px solid #e4e7ed;
        display: flex; flex-direction: column; min-height: 0;
    }
    .faq-list-header {
        padding: 16px 16px 12px; border-bottom: 1px solid #f0f2f5;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .faq-list-title { font-size: 15px; font-weight: 700; color: #303133; }
    .faq-list-sub { margin-top: 3px; font-size: 12px; color: #909399; }
    .faq-list-tools { padding: 12px 16px; border-bottom: 1px solid #f0f2f5; }
    .faq-search {
        width: 100%; box-sizing: border-box; padding: 7px 10px; font-size: 13px;
        border: 1px solid #dcdfe6; border-radius: 4px; outline: none;
    }
    .faq-search:focus { border-color: var(--forest-green); }
    .faq-list { flex: 1; overflow-y: auto; padding: 8px 10px 14px; }
    .faq-item {
        border: 1px solid #ebeef5; border-radius: 6px; background: #fff;
        padding: 10px 10px 9px; margin-bottom: 8px; cursor: grab; transition: .15s;
    }
    .faq-item:active { cursor: grabbing; }
    .faq-item:hover { border-color: #a5d6b8; box-shadow: 0 2px 8px rgba(45,106,79,.08); }
    .faq-item.active { border-color: var(--forest-green); background: #f0fdf4; }
    .faq-item.dragging { opacity: .55; box-shadow: 0 6px 18px rgba(45,106,79,.16); }
    .faq-item.drag-over { border-color: var(--forest-green); background: #eef8f1; }
    .faq-item-top { display: flex; align-items: center; gap: 8px; }
    .faq-drag-handle {
        width: 18px; height: 22px; color: #b0b3b8; flex-shrink: 0;
        display: inline-flex; align-items: center; justify-content: center;
    }
    .faq-drag-handle svg { width: 14px; height: 14px; }
    .faq-item-title { flex: 1; min-width: 0; font-size: 13px; font-weight: 600; color: #303133; line-height: 1.45; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .faq-status {
        display: inline-flex; align-items: center; height: 20px; padding: 0 7px;
        border-radius: 10px; font-size: 11px; flex-shrink: 0;
    }
    .faq-status.on { color: #059669; background: #d1fae5; }
    .faq-status.off { color: #909399; background: #f3f4f6; }
    .faq-item-meta { margin: 5px 0 0 26px; font-size: 12px; color: #909399; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .faq-editor-panel {
        flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden;
        padding: 16px 20px;
    }
    .faq-editor-card {
        flex: 1; min-height: 0; background: #fff; border: 1px solid #ebeef5;
        border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.05);
        display: flex; flex-direction: column; overflow: hidden;
    }
    .faq-editor-header {
        padding: 16px 20px; border-bottom: 1px solid #f0f2f5;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .faq-editor-title { font-size: 16px; font-weight: 700; color: #303133; margin-bottom: 4px; }
    .faq-editor-sub { font-size: 12px; color: #909399; }
    .faq-editor-body { flex: 1; min-height: 0; overflow-y: auto; padding: 18px 20px; }
    .faq-form-grid {
        display: grid; grid-template-columns: 1fr 180px; gap: 14px; margin-bottom: 16px;
    }
    .faq-form-item label {
        display: block; margin-bottom: 6px; font-size: 13px; color: #606266; font-weight: 500;
    }
    .faq-input, .faq-select {
        width: 100%; box-sizing: border-box; height: 34px; padding: 0 10px;
        border: 1px solid #dcdfe6; border-radius: 4px; outline: none;
        font-size: 13px; color: #303133; background: #fff;
    }
    .faq-input:focus, .faq-select:focus { border-color: var(--forest-green); }
    .faq-richtext {
        border: 1px solid #dcdfe6; border-radius: 6px; overflow: hidden; background: #fff;
    }
    .faq-editor-toolbar {
        display: flex; flex-direction: column; border-bottom: 1px solid #f0f2f5; background: #fbfcfd;
    }
    .faq-toolbar-row {
        display: flex; align-items: center; min-height: 40px; border-bottom: 1px solid #edf0f5;
        overflow-x: auto; overflow-y: hidden;
    }
    .faq-toolbar-row:last-child { border-bottom: none; }
    .faq-toolbar-group {
        display: inline-flex; align-items: center; gap: 2px; padding: 0 8px;
        border-right: 1px solid #edf0f5; min-height: 40px; flex-shrink: 0;
    }
    .faq-tool-btn {
        height: 30px; min-width: 30px; padding: 0 7px; border: 1px solid transparent;
        border-radius: 4px; background: transparent; color: #5f6c68; cursor: pointer;
        display: inline-flex; align-items: center; justify-content: center; gap: 4px;
        font-size: 12px; transition: .15s;
    }
    .faq-tool-btn:hover { color: var(--forest-green); background: #eef8f1; border-color: #cdebd8; }
    .faq-tool-btn svg { width: 16px; height: 16px; }
    .faq-tool-btn .caret { width: 9px; height: 9px; margin-left: 2px; color: #9aa5a0; }
    .faq-tool-select {
        height: 30px; min-width: 86px; padding: 0 8px; border: 1px solid transparent;
        border-radius: 4px; background: transparent; color: #303133; font-size: 13px; outline: none;
    }
    .faq-tool-select:hover { background: #eef8f1; border-color: #cdebd8; }
    .faq-answer-editor {
        min-height: 420px; padding: 16px 18px; outline: none; font-size: 14px;
        color: #303133; line-height: 1.75; overflow-y: auto;
    }
    .faq-answer-editor p { margin: 0 0 8px; }
    .faq-answer-editor ul, .faq-answer-editor ol { margin: 6px 0 8px 22px; padding: 0; }
    .faq-answer-editor:empty:before { content: attr(data-placeholder); color: #c0c4cc; }
    .faq-editor-footer {
        padding: 14px 20px; border-top: 1px solid #f0f2f5;
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .faq-footer-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>
    <header class="admin-topbar">
        <div class="topbar-left">
            <a href="index.html" class="topbar-logo">
                <img src="images/logo.png" alt="龙岗数据">
                龙岗数据聚合服务平台
            </a>
            <nav class="topbar-nav">
                <a href="operation-center.html" class="topbar-nav-item active">运营中心</a>
                <a href="maintenance-center.html" class="topbar-nav-item">运维中心</a>

                <a href="smart-report.html" class="topbar-nav-item" target="_blank">智能报告</a>
            </nav>
        </div>
        <div id="adminUserArea" class="topbar-right"></div>
    </header>

    <div class="admin-layout">
        <aside class="admin-sidebar" data-operation-sidebar></aside>

        <main class="admin-content" style="padding:0;">
            <div class="ai-service-page">
                <div class="ai-tabs">
                    <button class="ai-tab active" type="button" data-ai-tab="kb">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1z"/></svg>
                        知识库管理
                    </button>
                    <button class="ai-tab" type="button" data-ai-tab="faq">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM12 17H6v-2h6v2zm6-4H6v-2h12v2zm0-4H6V7h12v2z"/></svg>
                        常见问题管理
                    </button>
                </div>

                <section class="ai-tab-panel active" id="aiPanelKb" data-ai-panel="kb">
            <div class="kb-layout">
                <!-- 左侧目录树 -->
                <div class="kb-tree">
                    <div class="kb-tree-header">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/></svg>
                        智能客服知识库管理
                    </div>

    var faqActiveIndex = 0;

    var faqList = document.getElementById('faqList');
    var faqSearchInput = document.getElementById('faqSearchInput');
    var faqQuestionInput = document.getElementById('faqQuestionInput');
    var faqStatusSelect = document.getElementById('faqStatusSelect');
    var faqAnswerEditor = document.getElementById('faqAnswerEditor');
    var faqEditorTitle = document.getElementById('faqEditorTitle');
    var faqEditorSub = document.getElementById('faqEditorSub');
    var faqHeaderStatus = document.getElementById('faqHeaderStatus');
    var faqDragIndex = null;

    function nowText() {
        var d = new Date();
        var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function statusText(status) {
        return status === 'on' ? '启用' : '停用';
    }

    function renderFaqList() {
        var kw = faqSearchInput.value.trim().toLowerCase();
        var html = '';
        faqData.forEach(function(item, index) {
            if (kw && item.question.toLowerCase().indexOf(kw) === -1) return;
            var active = index === faqActiveIndex ? ' active' : '';
            var statusClass = item.status === 'on' ? 'on' : 'off';
            html += '<div class="faq-item' + active + '" data-index="' + index + '" draggable="true">' +
                '<div class="faq-item-top">' +
                    '<span class="faq-drag-handle" title="拖动排序">' + FAQ_DRAG_SVG + '</span>' +
                    '<div class="faq-item-title">' + escHtml(item.question) + '</div>' +
                    '<span class="faq-status ' + statusClass + '">' + statusText(item.status) + '</span>' +
                '</div>' +
                '<div class="faq-item-meta">拖动调整展示顺序 · 更新于 ' + item.updated + '</div>' +
            '</div>';
        });
        faqList.innerHTML = html || '<div style="padding:18px 10px;font-size:13px;color:#909399;text-align:center;">暂无匹配问题</div>';
    }

    function setHeaderStatus(status) {
        faqHeaderStatus.className = 'faq-status ' + (status === 'on' ? 'on' : 'off');
        faqHeaderStatus.textContent = statusText(status);
    }

    function renderFaqEditor(index) {
        if (!faqData.length) return;
        faqActiveIndex = Math.max(0, Math.min(index, faqData.length - 1));
        var item = faqData[faqActiveIndex];
        faqEditorTitle.textContent = item.question;
        faqEditorSub.textContent = '更新于 ' + item.updated + '，左侧拖动调整前台展示顺序';
        faqQuestionInput.value = item.question;
        faqStatusSelect.value = item.status;
        faqAnswerEditor.innerHTML = item.answer;
        setHeaderStatus(item.status);
        renderFaqList();
    }

    function moveFaq(from, to) {
        if (to < 0 || to >= faqData.length) return;
        var current = faqData.splice(from, 1)[0];
        faqData.splice(to, 0, current);
        renderFaqEditor(to);
    }

    faqList.addEventListener('click', function(e) {
        var itemEl = e.target.closest('.faq-item');
        if (!itemEl) return;
        var index = Number(itemEl.getAttribute('data-index'));
        renderFaqEditor(index);
    });

    faqList.addEventListener('dragstart', function(e) {
        var itemEl = e.target.closest('.faq-item');
        if (!itemEl) return;
        faqDragIndex = Number(itemEl.getAttribute('data-index'));
        itemEl.classList.add('dragging');
        if (e.dataTransfer) {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', faqDragIndex);
        }
    });

    faqList.addEventListener('dragover', function(e) {
        var itemEl = e.target.closest('.faq-item');
        if (!itemEl) return;
        e.preventDefault();
        faqList.querySelectorAll('.faq-item.drag-over').forEach(function(item) { item.classList.remove('drag-over'); });
        if (!itemEl.classList.contains('dragging')) itemEl.classList.add('drag-over');
    });

    faqList.addEventListener('dragleave', function(e) {
        var itemEl = e.target.closest('.faq-item');
        if (itemEl && !itemEl.contains(e.relatedTarget)) itemEl.classList.remove('drag-over');
    });

    faqList.addEventListener('drop', function(e) {
        var itemEl = e.target.closest('.faq-item');
        if (!itemEl) return;
        e.preventDefault();
        var targetIndex = Number(itemEl.getAttribute('data-index'));
        faqList.querySelectorAll('.faq-item').forEach(function(item) { item.classList.remove('drag-over', 'dragging'); });
        if (faqDragIndex !== null && faqDragIndex !== targetIndex) moveFaq(faqDragIndex, targetIndex);
        faqDragIndex = null;
    });

    faqList.addEventListener('dragend', function() {
        faqList.querySelectorAll('.faq-item').forEach(function(item) { item.classList.remove('drag-over', 'dragging'); });
        faqDragIndex = null;
    });

    faqSearchInput.addEventListener('input', renderFaqList);

    document.getElementById('faqAddBtn').addEventListener('click', function() {
        faqData.unshift({
            question: '新建常见问题',
            status: 'off',
            updated: nowText(),
            answer: '<p>请输入该问题在机器人弹窗中的回答内容。</p>'
        });
        faqSearchInput.value = '';
        renderFaqEditor(0);
        faqQuestionInput.focus();
        faqQuestionInput.select();
    });

    document.querySelectorAll('[data-faq-cmd]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var cmd = btn.getAttribute('data-faq-cmd');
            var value = btn.getAttribute('data-value');
            faqAnswerEditor.focus();
            if (cmd === 'createLink') {
                var link = window.prompt('请输入链接地址', 'https://');
                if (!link) return;
                document.execCommand(cmd, false, link);
            } else if (cmd === 'insertTable') {
                document.execCommand('insertHTML', false, '<table style="width:100%;border-collapse:collapse;margin:8px 0;"><tr><td style="border:1px solid #dcdfe6;padding:6px;">字段</td><td style="border:1px solid #dcdfe6;padding:6px;">说明</td></tr><tr><td style="border:1px solid #dcdfe6;padding:6px;">示例</td><td style="border:1px solid #dcdfe6;padding:6px;">内容</td></tr></table>');
            } else if (cmd === 'insertImage' || cmd === 'insertVideo') {
                GlobalDialog.info({ title: '原型提示', desc: '该按钮用于示意富文本媒体插入能力。' });
            } else if (cmd === 'insertTime') {
                document.execCommand('insertHTML', false, nowText());
            } else {
                document.execCommand(cmd, false, value || null);
            }
        });
    });

    document.querySelectorAll('[data-faq-select]').forEach(function(select) {
        select.addEventListener('change', function() {
            faqAnswerEditor.focus();
            var cmd = select.getAttribute('data-faq-select');
            var value = select.value;
            if (cmd === 'formatBlock') {
                document.execCommand(cmd, false, value);
            } else {
                document.execCommand(cmd, false, value);
            }
        });
    });

    faqQuestionInput.addEventListener('input', function() {
        faqEditorTitle.textContent = faqQuestionInput.value.trim() || '未命名问题';
    });
    faqStatusSelect.addEventListener('change', function() {

    });
    document.getElementById('faqCancelBtn').addEventListener('click', function() {
        renderFaqEditor(faqActiveIndex);
    });
    document.getElementById('faqDeleteBtn').addEventListener('click', function() {
        var item = faqData[faqActiveIndex];
        GlobalDialog.danger({
            title: '删除常见问题',
            desc: '您确定要删除【' + escHtml(item.question) + '】吗？删除后前台机器人侧栏将不再展示该问题。',
            confirmText: '确认删除',
            cancelText: '取消',
            onConfirm: function() {
                faqData.splice(faqActiveIndex, 1);
                if (!faqData.length) {
                    faqData.push({ question: '新建常见问题', status: 'off', updated: nowText(), answer: '<p>请输入回答内容。</p>' });
                }
                renderFaqEditor(Math.min(faqActiveIndex, faqData.length - 1));
            }
        });
    });
    document.getElementById('faqSaveBtn').addEventListener('click', function() {
        var title = faqQuestionInput.value.trim();
        if (!title) {
            GlobalDialog.info({ title: '请填写问题标题', desc: '问题标题会展示在门户右下角智能客服弹窗的常见问题列表中。' });
            faqQuestionInput.focus();
            return;
        }
        faqData[faqActiveIndex].question = title;
        faqData[faqActiveIndex].status = faqStatusSelect.value;
        faqData[faqActiveIndex].answer = faqAnswerEditor.innerHTML.trim() || '<p>暂无回答内容</p>';
        faqData[faqActiveIndex].updated = nowText();
        renderFaqEditor(faqActiveIndex);
        GlobalDialog.success({ title: '保存成功', desc: '常见问题及回答内容已更新。' });
    });

    // ====== 目录树数据 ======

    var ARROW_SVG = '<svg class="kb-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>';
    var FOLDER_SVG = '<svg class="kb-folder" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>';

    var activeTreeNode = null;
    var ctxTargetNode = null;

    function renderTree() {
        var body = document.getElementById('kbTreeBody');
        body.innerHTML = buildTreeNode(kbTreeData, 0);
        var firstLabel = body.querySelector('.kb-node-label');
        if (firstLabel) { firstLabel.classList.add('active'); activeTreeNode = firstLabel; }
    }

    function buildTreeNode(node, depth) {
        var hasChildren = node.children && node.children.length > 0;
        var isOpen = node.open !== false;
        var pad = depth * 16;
        var html = '<div class="kb-node" data-label="' + escHtml(node.label) + '">';
        html += '<div class="kb-node-label" style="padding-left:' + (12 + pad) + 'px" data-label="' + escHtml(node.label) + '">';
        if (hasChildren) {
            html += ARROW_SVG.replace('class="kb-arrow"', 'class="kb-arrow' + (isOpen ? ' open' : '') + '"');
        } else {
            html += ARROW_SVG.replace('class="kb-arrow"', 'class="kb-arrow hidden"');
        }
        html += FOLDER_SVG;
        html += '<span class="kb-text">' + escHtml(node.label) + '</span>';
        html += '</div>';
        if (hasChildren) {
            html += '<div class="kb-node-children' + (isOpen ? '' : ' collapsed') + '">';
            for (var i = 0; i < node.children.length; i++) {
                html += buildTreeNode(node.children[i], depth + 1);
            }
            html += '</div>';
        }
        html += '</div>';
        return html;
    }

    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    renderTree();

    // 点击展开/折叠 & 选中
    document.getElementById('kbTreeBody').addEventListener('click', function(e) {
        var label = e.target.closest('.kb-node-label');
        if (!label) return;
        var node = label.parentElement;
        var children = node.querySelector('.kb-node-children');
        var arrow = label.querySelector('.kb-arrow');
        if (children && arrow && !arrow.classList.contains('hidden')) {
            children.classList.toggle('collapsed');
            arrow.classList.toggle('open');
        }
        if (activeTreeNode) activeTreeNode.classList.remove('active');
        label.classList.add('active');
        activeTreeNode = label;
    });

    // ====== 右键菜单 ======
    var ctxMenu = document.getElementById('kbCtxMenu');

    document.getElementById('kbTreeBody').addEventListener('contextmenu', function(e) {
        var label = e.target.closest('.kb-node-label');
        if (!label) return;
        e.preventDefault();
        ctxTargetNode = label;
        if (activeTreeNode) activeTreeNode.classList.remove('active');
        label.classList.add('active');
        activeTreeNode = label;
        ctxMenu.style.left = e.clientX + 'px';
        ctxMenu.style.top = e.clientY + 'px';
        ctxMenu.classList.add('show');
    });

    document.addEventListener('click', function() { ctxMenu.classList.remove('show'); });

    ctxMenu.addEventListener('click', function(e) {
        var item = e.target.closest('.kb-ctx-item');
        if (!item) return;
        var action = item.getAttribute('data-action');
        var nodeName = ctxTargetNode ? ctxTargetNode.getAttribute('data-label') : '';
        ctxMenu.classList.remove('show');

        if (action === 'add') {
            openEditModal('新建分类', '');

        } else if (action === 'delete') {
            GlobalDialog.danger({
                title: '删除分类',
                desc: '您确定要删除分类【' + nodeName + '】吗？删除后该分类下的所有文档将被移除。'
            });

    });
