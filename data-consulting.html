<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据咨询服务 - 龙岗数据聚合服务平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .main-content {
            max-width: var(--content-max-width);
            margin: 0 auto;
            padding: 96px 32px 48px;
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 40px;
        }

        .service-sidebar {
            position: sticky;
            top: 96px;
            height: fit-content;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .service-sidebar.has-tree {
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            padding-right: 4px;
        }

        .service-sidebar.has-tree::-webkit-scrollbar {
            width: 6px;
        }

        .service-sidebar.has-tree::-webkit-scrollbar-thumb {
            background: rgba(32, 165, 101, 0.22);
            border-radius: 999px;
        }

        .service-tree {
            display: grid;
            gap: 14px;
        }

        .service-category {
            background: linear-gradient(180deg, rgba(240, 253, 246, 0.88) 0%, rgba(255, 255, 255, 0.72) 100%);
            border: 1px solid rgba(32, 165, 101, 0.14);
            border-radius: var(--radius-lg);
            box-shadow: none;
            overflow: hidden;
        }

        .category-toggle {
            width: 100%;
            border: none;
            background: transparent;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            transition: all var(--transition-fast);
        }

        .category-toggle:hover {
            background: rgba(32, 165, 101, 0.07);
        }

        .category-main {
            min-width: 0;
            flex: 1;
        }

        .category-title {
            display: block;
            font-size: 15px;
            line-height: 1.45;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .category-meta {
            display: block;
            margin-top: 3px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .category-arrow {
            width: 24px;
            height: 24px;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--transition-fast);
            flex-shrink: 0;
        }

        .category-arrow svg {
            width: 16px;
            height: 16px;
        }

        .service-category.collapsed .category-arrow {
            transform: rotate(-90deg);
        }

        .category-services {
            display: grid;
            gap: 10px;
            padding: 0 10px 12px;
        }

        .service-category.collapsed .category-services {
            display: none;
        }

        .service-card {
            background: var(--surface-elevated);
            border: 2px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 16px;
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            gap: 14px;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .service-card:hover {
            border-color: var(--forest-green-200);
            transform: translateX(4px);
        }

        .service-card.active {
            border-color: var(--forest-green);
            background: linear-gradient(135deg, var(--forest-green-50) 0%, rgba(32, 165, 101, 0.08) 100%);
            box-shadow: var(--shadow-glow);
        }

        .service-card.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 4px;
            background: var(--forest-green);
            border-radius: 0 2px 2px 0;
        }

        .service-card-icon {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-lg);
            background: #10261E;
            color: var(--forest-green);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .service-card-icon svg {
            width: 26px;
            height: 26px;
        }

        .service-card-content {
            flex: 1;
            min-width: 0;
            text-align: left;
        }

        .service-card-title {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 20px;
            height: 20px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .service-card.active .service-card-title {
            color: var(--forest-green-700);
        }

        .service-card-desc {
            font-size: 11px;
            color: var(--text-tertiary);
            line-height: 16px;
            height: 32px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .service-category .service-card {
            width: 100%;
            border-width: 2px;
            border-color: var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 16px;
            gap: 14px;
            background: var(--surface-elevated);
            box-shadow: var(--shadow-sm);
        }

        .service-category .service-card:hover {
            border-color: var(--forest-green-200);
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }

        .service-category .service-card-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, #1a2e35 0%, #0f1a1d 100%);
            overflow: hidden;
            position: relative;
        }

        .service-category .service-card-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(15, 31, 26, 0.02) 0%, rgba(15, 31, 26, 0.28) 100%);
            pointer-events: none;
        }

        .service-category .service-card-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: var(--radius-lg);
        }

        .content-area {
            min-width: 0;
        }

        .service-panel {
            display: none;
        }

        .service-panel.active {
            display: block;
        }

        .service-article {
            background: var(--surface-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .service-hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            min-height: 380px;
            background: #0F1F1A;
        }

        .service-hero-main {
            position: relative;
            min-height: 380px;
            background-image: linear-gradient(180deg, rgba(15, 31, 26, 0.08) 0%, rgba(15, 31, 26, 0.86) 100%), url('images/consult-governance.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
        }

        .service-hero-content {
            color: #fff;
            padding: 42px;
            max-width: 780px;
        }

        .service-kicker {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-md);
            background: rgba(32, 165, 101, 0.92);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .service-kicker svg,
        .action-button svg,
        .outline-button svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .service-title {
            font-size: 40px;
            font-weight: 800;
            line-height: 1.18;
            margin-bottom: 14px;
            text-shadow: 0 2px 18px rgba(0, 0, 0, 0.28);
        }

        .service-desc {
            max-width: 680px;
            font-size: 16px;
            line-height: 1.75;
            color: rgba(255, 255, 255, 0.86);
        }

        .service-action-card {
            background: #fff;
            padding: 30px 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 24px;
            border-left: 1px solid rgba(255, 255, 255, 0.12);
        }

        .price-label {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        .price-value {
            font-size: 34px;
            font-weight: 800;
            color: #E53935;
            line-height: 1.1;
        }

        .action-facts {
            display: grid;
            gap: 14px;
            padding: 18px 0;
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
        }

        .action-fact {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 13px;
        }

        .action-fact span:first-child {
            color: var(--text-tertiary);
        }

        .action-fact span:last-child {
            color: var(--text-primary);
            font-weight: 600;
            text-align: right;
        }

        .action-buttons {
            display: grid;
            gap: 12px;
        }

        .action-button,
        .outline-button {
            width: 100%;
            min-height: 44px;
            border-radius: var(--radius-lg);
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .action-button {
            color: #fff;
            background: linear-gradient(180deg, var(--forest-green) 0%, var(--forest-green-600) 100%);
            box-shadow: var(--shadow-sm);
        }

        .action-button:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-glow);
        }

        .outline-button {
            color: var(--forest-green);
            background: #fff;
            border: 1.5px solid var(--forest-green);
        }

        .outline-button:hover {
            background: var(--forest-green-50);
        }

        .service-body {
            padding: 42px;
        }

        .article-lead {
            font-size: 18px;
            line-height: 1.9;
            color: var(--text-secondary);
            border-left: 4px solid var(--forest-green);
            padding-left: 22px;
            margin-bottom: 42px;
        }

        .content-section {
            margin-bottom: 46px;
        }

        .content-section:last-child {
            margin-bottom: 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .section-number {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--forest-green);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .rich-copy {
            margin-left: 56px;
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.9;
        }

        .rich-copy p + p {
            margin-top: 12px;
        }

        .process-list {
            margin-left: 56px;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .process-card {
            background: var(--surface-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 20px;
            position: relative;
            min-height: 150px;
        }

        .process-index {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--forest-green-100);
            color: var(--forest-green-700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 14px;
        }

        .process-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .process-desc {
            font-size: 13px;
            line-height: 1.65;
            color: var(--text-secondary);
        }

        .advantage-grid {
            margin-left: 56px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .advantage-card {
            display: flex;
            gap: 16px;
            background: var(--surface-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 22px;
        }

        .advantage-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .advantage-icon img {
            width: 48px;
            height: 48px;
            display: block;
            object-fit: contain;
        }

        .advantage-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .advantage-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.65;
        }

        .case-list {
            margin-left: 56px;
            display: grid;
            gap: 16px;
        }

        .case-card {
            background: linear-gradient(135deg, var(--forest-green-50) 0%, rgba(32, 165, 101, 0.05) 100%);
            border: 1px solid rgba(32, 165, 101, 0.16);
            border-radius: var(--radius-xl);
            padding: 26px;
            display: grid;
            grid-template-columns: 180px minmax(0, 1fr);
            gap: 24px;
        }

        .case-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .case-content {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.85;
        }

        .consult-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }

        .consult-overlay.active {
            display: flex;
        }

        .consult-card {
            width: min(720px, 100%);
            background: var(--surface-elevated);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: 34px 38px 30px;
            position: relative;
            animation: consultIn 180ms ease-out;
        }

        @keyframes consultIn {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .consult-close {
            position: absolute;
            right: 18px;
            top: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .consult-close:hover {
            color: var(--text-primary);
            background: var(--gray-100);
        }

        .consult-close svg {
            width: 18px;
            height: 18px;
        }

        .consult-row {
            display: grid;
            grid-template-columns: 110px minmax(0, 1fr);
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .consult-label {
            padding-top: 9px;
            color: var(--text-secondary);
            font-size: 13px;
            text-align: right;
        }

        .consult-val {
            color: var(--text-primary);
            font-size: 14px;
            min-width: 0;
        }

        .consult-static {
            min-height: 38px;
            display: flex;
            align-items: center;
            font-weight: 700;
        }

        .consult-input {
            width: 100%;
            height: 38px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            padding: 0 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .consult-input:focus {
            border-color: var(--forest-green);
        }

        .consult-ta-wrap {
            position: relative;
        }

        .consult-textarea {
            width: 100%;
            min-height: 128px;
            resize: vertical;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            padding: 12px 14px 28px;
            font-size: 14px;
            font-family: inherit;
            line-height: 1.6;
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .consult-textarea:focus {
            border-color: var(--forest-green);
        }

        .consult-count {
            position: absolute;
            right: 12px;
            bottom: 8px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .consult-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding-top: 10px;
        }

        .consult-btn-ok,
        .consult-btn-cancel {
            min-width: 96px;
            height: 38px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .consult-btn-ok {
            border: none;
            color: #fff;
            background: var(--forest-green);
        }

        .consult-btn-ok:hover {
            background: var(--forest-green-600);
            box-shadow: var(--shadow-green-glow);
        }

        .consult-btn-cancel {
            color: var(--text-secondary);
            background: #fff;
            border: 1px solid var(--border-default);
        }

        .consult-btn-cancel:hover {
            color: var(--text-primary);
            border-color: var(--border-emphasis);
        }

        @media (max-width: 1280px) {
            .service-hero { grid-template-columns: 1fr; }
            .service-action-card {
                display: grid;
                grid-template-columns: 240px minmax(0, 1fr) 240px;
                align-items: center;
            }
            .process-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; }
            .service-sidebar {
                position: static;
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .service-sidebar.has-tree {
                display: block;
                max-height: none;
                overflow: visible;
                padding-right: 0;
            }
            .service-card:hover { transform: translateY(-2px); }
            .service-category .service-card:hover { transform: translateY(-2px); }
            .service-action-card { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .main-content { padding: 88px 16px 36px; }
            .service-sidebar { grid-template-columns: 1fr; }
            .service-hero-main { min-height: 320px; }
            .service-hero-content,
            .service-body { padding: 28px; }
            .service-title { font-size: 30px; }
            .process-list,
            .advantage-grid,
            .case-card { grid-template-columns: 1fr; }
            .rich-copy,
            .process-list,
            .advantage-grid,
            .case-list { margin-left: 0; }
            .consult-card { padding: 30px 20px 24px; }
            .consult-row { grid-template-columns: 1fr; gap: 8px; }
            .consult-label { text-align: left; padding-top: 0; }
        }
    </style>
    <script src="js/nav-bar.js"></script>
    <script src="js/site-footer.js" defer></script>
    <script src="js/smart-service.js" defer></script>
</head>
<body>
    <nav-bar active="consulting"></nav-bar>

    <main class="main-content">
        <aside class="service-sidebar" aria-label="数据咨询服务目录"></aside>
        <div class="content-area"></div>
    </main>
    <site-footer></site-footer>

    <div class="consult-overlay" id="consultOverlay">
        <div class="consult-card">
            <button class="consult-close" id="consultClose" title="关闭" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <form id="consultForm" autocomplete="off">
                <div class="consult-row">
                    <div class="consult-label">咨询对象</div>
                    <div class="consult-val consult-static" id="consultTarget">企业数据治理与合规咨询服务</div>
                </div>
                <div class="consult-row">
                    <div class="consult-label">咨询内容</div>
                    <div class="consult-val">
                        <div class="consult-ta-wrap">
                            <textarea class="consult-textarea" id="txtConsult" maxlength="500" placeholder="请输入您的咨询内容"></textarea>
                            <span class="consult-count"><span id="consultCount">0</span>/500</span>
                        </div>
                    </div>
                </div>
                <div class="consult-row">
                    <div class="consult-label">机构名称：</div>
                    <div class="consult-val consult-static" style="font-weight:400">智慧数据科技有限公司</div>
                </div>
                <div class="consult-row">
                    <div class="consult-label">联系人姓名：</div>
                    <div class="consult-val"><input type="text" class="consult-input" value="张三" placeholder="请输入姓名"></div>
                </div>
                <div class="consult-row">
                    <div class="consult-label">联系人电话：</div>
                    <div class="consult-val"><input type="tel" class="consult-input" value="15812343213" placeholder="请输入电话"></div>
                </div>
                <div class="consult-row">
                    <div class="consult-label">联系人邮箱：</div>
                    <div class="consult-val"><input type="email" class="consult-input" value="dianzyun001@cestc.cn" placeholder="请输入邮箱地址"></div>
                </div>
                <div class="consult-actions">
                    <button type="submit" class="consult-btn-ok">确定</button>
                    <button type="button" class="consult-btn-cancel" id="consultCancel">取消</button>
                </div>
            </form>

                        + '<button class="category-toggle" type="button" data-category-toggle="' + escapeHtml(group.id) + '" aria-expanded="' + (!collapsed) + '" title="' + escapeHtml(group.title) + '">'
                        + '<span class="category-main">'
                        + '<span class="category-title" title="' + escapeHtml(group.title) + '">' + escapeHtml(group.title) + '</span>'
                        + '<span class="category-meta">' + group.services.length + '项服务 · ' + escapeHtml(group.badge) + '</span>'
                        + '</span>'
                        + '<span class="category-arrow" aria-hidden="true">' + ICONS.arrow + '</span>'
                        + '</button>'
                        + '<div class="category-services">'
                        + group.services.map(function (service) {
                            var thumb = service.thumb || group.thumb || group.image;
                            var tooltip = service.title + '：' + service.focus;
                            return '<button class="service-card' + (service.id === activeServiceId ? ' active' : '') + '" type="button" data-service-id="' + escapeHtml(service.id) + '" title="' + escapeHtml(tooltip) + '">'
                                + '<span class="service-card-icon" aria-hidden="true"><img src="' + escapeHtml(thumb) + '" alt=""></span>'
                                + '<span class="service-card-content">'
                                + '<span class="service-card-title" title="' + escapeHtml(service.title) + '">' + escapeHtml(service.title) + '</span>'
                                + '<span class="service-card-desc" title="' + escapeHtml(service.focus) + '">' + escapeHtml(service.focus) + '</span>'
                                + '</span>'
                                + '</button>';
                        }).join('')
                        + '</div>'
                        + '</section>';
                }).join('')
                + '</div>';
        }

        function renderDetail(serviceId) {
            var found = findService(serviceId);
            var service = found.service;
            var group = found.group;
            var price = service.price || group.defaultPrice;
            var measure = service.measure || group.measure;
            var delivery = service.delivery || '线下交付';
            var lead = '本服务聚焦' + service.focus + '，结合' + group.title.replace('类', '') + '的实施要求，为客户形成' + service.output + '，支撑后续数据要素开发利用、合规流通与持续运营。';
            var heroSummary = buildHeroSummary(service, group);
            contentArea.innerHTML = '<section class="service-panel active" data-panel="' + escapeHtml(service.id) + '">'
                + '<article class="service-article">'
                + '<div class="service-hero">'
                + '<div class="service-hero-main" style="background-image: linear-gradient(180deg, rgba(15, 31, 26, 0.08) 0%, rgba(15, 31, 26, 0.86) 100%), url(' + escapeHtml(group.image) + ');">'
                + '<div class="service-hero-content">'
                + '<div class="service-kicker">' + getIcon(group.icon) + escapeHtml(group.badge) + '</div>'
                + '<h2 class="service-title">' + escapeHtml(service.title) + '</h2>'
                + '<p class="service-desc">' + escapeHtml(heroSummary) + '</p>'
                + '</div></div>'
                + '<aside class="service-action-card">'
                + '<div><div class="price-label">参考价</div><div class="price-value" data-price>' + escapeHtml(price) + '</div></div>'
                + '<div class="action-facts">'
                + '<div class="action-fact"><span>付费模式</span><span>预付费</span></div>'
                + '<div class="action-fact"><span>计量方式</span><span>' + escapeHtml(measure) + '</span></div>'
                + '<div class="action-fact"><span>交付方式</span><span>' + escapeHtml(delivery) + '</span></div>'
                + '</div>'
                + '<div class="action-buttons">'
                + '<button class="action-button" type="button" data-buy data-title="' + escapeHtml(service.title) + '" data-price="' + escapeHtml(price) + '">' + ICONS.cart + '立即购买</button>'
                + '<button class="outline-button" type="button" data-consult data-title="' + escapeHtml(service.title) + '">' + ICONS.chat + '服务咨询</button>'
                + '</div>'
                + '</aside>'
                + '</div>'
                + '<div class="service-body">'
                + '<p class="article-lead">' + escapeHtml(lead) + '</p>'
                + '<section class="content-section"><div class="section-header"><span class="section-number">1</span><h3 class="section-title">服务说明</h3></div><div class="rich-copy"><p>' + escapeHtml(service.desc) + '</p></div></section>'
                + '<section class="content-section"><div class="section-header"><span class="section-number">2</span><h3 class="section-title">服务流程</h3></div><div class="process-list">' + renderProcess(buildProcess(service, group)) + '</div></section>'
                + '<section class="content-section"><div class="section-header"><span class="section-number">3</span><h3 class="section-title">服务优势</h3></div><div class="advantage-grid">' + renderAdvantages(buildAdvantages(service, group)) + '</div></section>'
                + '<section class="content-section"><div class="section-header"><span class="section-number">4</span><h3 class="section-title">服务案例</h3></div><div class="case-list">' + renderCases(buildCases(service)) + '</div></section>'
                + '</div>'
                + '</article>'
                + '</section>';
        }

        function selectService(serviceId) {
            var found = findService(serviceId);
            activeServiceId = found.service.id;
            expandedCategories[found.group.id] = true;
            renderSidebar();
            renderDetail(activeServiceId);
        }

        sidebar.addEventListener('click', function (event) {
            var toggle = event.target.closest('[data-category-toggle]');
            var card = event.target.closest('[data-service-id]');
            if (toggle) {
                var categoryId = toggle.getAttribute('data-category-toggle');
                expandedCategories[categoryId] = !expandedCategories[categoryId];
                renderSidebar();
                return;
            }
            if (card) {
                selectService(card.getAttribute('data-service-id'));
            }
        });

        contentArea.addEventListener('click', function (event) {
            var buyButton = event.target.closest('[data-buy]');
            var consultButton = event.target.closest('[data-consult]');
            if (buyButton) {
                var title = buyButton.getAttribute('data-title') || serviceGroups[0].services[0].title;
                var price = buyButton.getAttribute('data-price') || '面议';
                var titleParam = '&title=' + encodeURIComponent(title);
                if (price === '面议') {
                    window.location.href = 'consulting-buy-negotiate.html?price=' + encodeURIComponent(price) + titleParam;
                } else {
                    window.location.href = 'consulting-buy.html?price=' + encodeURIComponent(price) + titleParam;
                }
                return;
            }
            if (consultButton) {
                consultTarget.textContent = consultButton.getAttribute('data-title') || serviceGroups[0].services[0].title;
                consultOverlay.classList.add('active');
            }
        });

        function closeConsult() {
            consultOverlay.classList.remove('active');
        }

        document.getElementById('consultClose').addEventListener('click', closeConsult);
        document.getElementById('consultCancel').addEventListener('click', closeConsult);
        consultOverlay.addEventListener('click', function (event) {
            if (event.target === consultOverlay) closeConsult();
        });

        consultTextarea.addEventListener('input', function () {
            consultCount.textContent = consultTextarea.value.length;
        });

        document.getElementById('consultForm').addEventListener('submit', function (event) {
            event.preventDefault();
            closeConsult();
            if (window.GlobalDialog) {
                GlobalDialog.success({
                    title: '提交成功',
                    desc: '您的咨询已提交，服务人员将尽快与您联系。',
                    duration: 1600
                });
            }
        });

        renderSidebar();
        renderDetail(activeServiceId);
    })();
    </script>
</body>
</html>
